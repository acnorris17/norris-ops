<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron C. Norris — Personal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #0000FF;
  --cyan: #06D0FF;
  --navy: #0a0e5c;
  --dark: #1a1a1a;
  --card-bg: #ffffff;
  --page-bg: #f0f2f8;
  --border: #e0e4ef;
  --red: #dc2626;
  --green: #16a34a;
  --yellow: #eab308;
}

body {
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  background: var(--page-bg);
  color: var(--dark);
  line-height: 1.5;
}

/* ── LOGIN GATE ── */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, #0a0e5c, #0033cc, #0066ee, #00aaff, #06D0FF);
  display: flex; align-items: center; justify-content: center;
}
#login-box {
  background: #fff; border-radius: 16px; padding: 48px 36px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.35); max-width: 380px; width: 90%;
}
#login-box img { width: 140px; margin-bottom: 20px; }
#login-box h1 { font-family: 'Lato', sans-serif; font-weight: 900; font-size: 22px; color: var(--navy); margin-bottom: 4px; }
#login-box .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }
#login-box input {
  width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: 'Lato', sans-serif; outline: none; transition: border .2s;
}
#login-box input:focus { border-color: var(--cyan); }
#login-box button {
  margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 8px;
  background: linear-gradient(135deg, #0033cc, #06D0FF); color: #fff;
  font-family: 'Lato', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer;
  transition: opacity .2s;
}
#login-box button:hover { opacity: .9; }
#login-error { color: var(--red); font-size: 13px; margin-top: 10px; display: none; }

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #0a0e5c, #0033cc, #0066ee, #00aaff, #06D0FF);
  padding: 36px 24px 60px; color: #fff; text-align: center; position: relative;
}
header h1 { font-weight: 900; font-size: 28px; letter-spacing: .5px; }
header .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: var(--cyan); font-size: 15px; margin-top: 4px; }
header .date { font-size: 13px; opacity: .75; margin-top: 8px; }
.chevron {
  position: relative; margin-top: -1px; width: 100%; overflow: hidden; line-height: 0;
}
.chevron svg { display: block; width: 100%; height: 50px; }

/* ── LAYOUT ── */
main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
.section-title {
  font-weight: 700; font-size: 24px; margin: 36px 0 16px; padding-left: 4px;
}
.section-title span:first-child { color: #0033cc; }
.section-title span:last-child { color: var(--dark); }

.card {
  background: var(--card-bg); border-radius: 12px; padding: 20px;
  box-shadow: 0 2px 10px rgba(0,0,0,.06); margin-bottom: 16px;
}

/* ── CRITICAL REMINDERS ── */
.card.critical {
  border: 2px solid var(--red); background: #fef2f2; position: sticky; top: 0; z-index: 50;
}
.card.critical h3 { color: var(--red); font-weight: 900; margin-bottom: 10px; font-size: 16px; }
.card.critical ul { list-style: none; padding: 0; }
.card.critical li { padding: 6px 0; border-bottom: 1px solid #fecaca; font-size: 14px; }
.card.critical li:last-child { border: none; }
.card.critical li::before { content: "\26A0\FE0F"; margin-right: 8px; }

/* ── TO-DO ── */
.todo-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.todo-controls input, .todo-controls select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Lato', sans-serif; font-size: 14px;
}
.todo-controls input[type="text"] { flex: 1; min-width: 160px; }
.todo-controls input[type="date"] { width: 150px; }
.btn {
  padding: 8px 18px; border: none; border-radius: 8px; font-family: 'Lato', sans-serif;
  font-weight: 700; font-size: 14px; cursor: pointer; color: #fff;
  background: linear-gradient(135deg, #0033cc, #06D0FF); transition: opacity .2s;
}
.btn:hover { opacity: .85; }
.btn.sm { padding: 4px 10px; font-size: 12px; }
.btn.danger { background: linear-gradient(135deg, #dc2626, #f87171); }

.todo-list { list-style: none; }
.todo-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); font-size: 14px;
}
.todo-item:last-child { border: none; }
.todo-item.done .todo-text { text-decoration: line-through; opacity: .5; }
.todo-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--blue); cursor: pointer; }
.todo-text { flex: 1; cursor: pointer; }
.todo-priority { font-size: 16px; flex-shrink: 0; }
.todo-due { font-size: 12px; color: #888; white-space: nowrap; }

/* ── DEALS ── */
.deals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.deal-card { position: relative; }
.deal-card h4 { font-weight: 900; font-size: 15px; margin-bottom: 2px; color: var(--navy); }
.deal-card .contact { font-size: 13px; color: #666; margin-bottom: 8px; }
.deal-card .value { font-weight: 700; color: #0033cc; font-size: 18px; margin-bottom: 8px; }
.deal-status {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #fff;
}
.status-Prospect { background: #6366f1; }
.status-Quoted { background: #eab308; color: #000; }
.status-Negotiating { background: #f97316; }
.status-Won { background: #16a34a; }
.status-Lost { background: #dc2626; }
.deal-card select {
  margin-top: 8px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-family: 'Lato', sans-serif;
}
.deal-card textarea {
  margin-top: 8px; width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-family: 'Lato', sans-serif; resize: vertical; min-height: 40px;
}
.deal-card .overdue-badge {
  position: absolute; top: 12px; right: 12px; background: var(--red); color: #fff;
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
}
.deal-card .deal-delete { position: absolute; top: 12px; right: 12px; }

/* ── QUICK LINKS ── */
.links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.link-btn {
  display: flex; align-items: center; justify-content: center; padding: 14px 12px;
  background: var(--card-bg); border: 2px solid var(--border); border-radius: 10px;
  text-decoration: none; color: var(--navy); font-weight: 700; font-size: 14px;
  transition: border-color .2s, box-shadow .2s;
}
.link-btn:hover { border-color: var(--cyan); box-shadow: 0 4px 16px rgba(6,208,255,.2); }

/* ── REMARKABLE ── */
.remark-info { font-size: 14px; color: #555; line-height: 1.7; }
.remark-info code { background: #e8eaf0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.empty-state { text-align: center; color: #aaa; padding: 30px 10px; font-size: 14px; }

/* ── FOOTER ── */
footer {
  background: linear-gradient(135deg, #060930, var(--navy)); text-align: center;
  padding: 28px 16px; margin-top: 40px;
}
footer .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: var(--cyan); font-size: 16px; }
footer .copy { color: rgba(255,255,255,.4); font-size: 12px; margin-top: 8px; }

/* ── ADD DEAL MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: 14px; padding: 28px; width: 90%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.modal h3 { font-weight: 900; margin-bottom: 16px; color: var(--navy); }
.modal label { display: block; font-weight: 700; font-size: 13px; margin: 10px 0 4px; }
.modal input, .modal select, .modal textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Lato', sans-serif; font-size: 14px;
}
.modal textarea { resize: vertical; min-height: 50px; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
.btn.secondary { background: #e5e7eb; color: var(--dark); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header h1 { font-size: 22px; }
  .section-title { font-size: 20px; }
  .deals-grid { grid-template-columns: 1fr; }
  .links-grid { grid-template-columns: repeat(2, 1fr); }
  .todo-controls { flex-direction: column; }
  .todo-controls input[type="date"] { width: 100%; }
  #login-box { padding: 32px 24px; }
}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){if(sessionStorage.getItem('nu_auth_2026')==='granted'&&sessionStorage.getItem('nu_role')==='aaron'){document.getElementById('auth-wall').style.display='none'}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
