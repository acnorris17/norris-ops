<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Calculator — Norris Utilities</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary-blue: #0000FF;
  --cyan: #06D0FF;
  --dark-navy: #0a0e5c;
  --mid-blue: #0033cc;
  --text-dark: #1a1a1a;
  --bg: #f4f6fa;
  --card-bg: #ffffff;
  --danger: #cc0000;
}

body {
  font-family: 'Lato', Arial, sans-serif;
  font-weight: 400;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #0a0e5c, #0033cc, #0066ee, #00aaff, #06D0FF);
  color: #fff;
  padding: 28px 24px 36px;
  text-align: center;
  position: relative;
}
.header h1 {
  font-family: 'Lato', sans-serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 0.5px;
}
.header .subtitle {
  font-weight: 400;
  font-size: 14px;
  opacity: 0.9;
  margin-top: 4px;
}

/* Chevron */
.chevron-wrap {
  display: block;
  width: 100%;
  line-height: 0;
  margin-top: -1px;
}
.chevron-wrap svg { display: block; width: 100%; height: auto; }

/* ===== CONFIDENTIAL BANNER ===== */
.confidential {
  background: var(--danger);
  color: #fff;
  text-align: center;
  font-weight: 700;
  font-size: 13px;
  padding: 8px 12px;
  letter-spacing: 0.5px;
}

/* ===== TABS ===== */
.tabs-container { max-width: 900px; width: 100%; margin: 0 auto; padding: 0 12px; }
.tab-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 20px;
  border-bottom: 3px solid var(--mid-blue);
  padding-bottom: 0;
}
.tab-btn {
  font-family: 'Lato', sans-serif;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 14px;
  border: none;
  background: #dde4f0;
  color: var(--dark-navy);
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
.tab-btn.active {
  background: var(--mid-blue);
  color: #fff;
}
.tab-btn:hover:not(.active) { background: #c5d0e8; }

/* ===== TAB PANEL ===== */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== CARD ===== */
.card {
  background: var(--card-bg);
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 24px;
  margin: 16px 0;
}
.card h2 {
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 16px;
}
.card h2 span.blue { color: var(--mid-blue); }

.sacred-label {
  display: inline-block;
  background: #cc0000;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
}

/* ===== FORM ===== */
.form-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 14px;
}
.form-group {
  flex: 1 1 200px;
  display: flex;
  flex-direction: column;
}
.form-group label {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 4px;
  color: #555;
}
.form-group input, .form-group select {
  font-family: 'Lato', sans-serif;
  font-size: 16px;
  padding: 10px 12px;
  border: 2px solid #ccd3e0;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--mid-blue); }

/* Slider */
.slider-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.slider-wrap input[type=range] {
  flex: 1;
  accent-color: var(--mid-blue);
  height: 6px;
}
.slider-val {
  font-weight: 900;
  font-size: 18px;
  color: var(--mid-blue);
  min-width: 48px;
  text-align: right;
}

/* ===== RESULTS ===== */
.results-box {
  background: linear-gradient(135deg, #f0f4ff, #e8f0ff);
  border-left: 5px solid var(--mid-blue);
  border-radius: 8px;
  padding: 20px;
  margin: 16px 0;
}
.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 16px;
}
.result-row.big {
  font-weight: 900;
  font-size: 26px;
  color: var(--mid-blue);
  border-top: 2px solid var(--mid-blue);
  margin-top: 8px;
  padding-top: 12px;
}
.result-label { font-weight: 700; color: #555; }

/* Three-channel */
.channels {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}
.channel-card {
  flex: 1 1 140px;
  background: #fff;
  border: 2px solid #dde4f0;
  border-radius: 8px;
  padding: 14px;
  text-align: center;
}
.channel-card .ch-label { font-weight: 700; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.channel-card .ch-price { font-weight: 900; font-size: 22px; color: var(--dark-navy); margin-top: 4px; }
.channel-card .ch-note { font-size: 11px; color: #999; margin-top: 2px; }

/* Buttons */
.btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.btn {
  font-family: 'Lato', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--mid-blue); color: #fff; }
.btn-primary:hover { box-shadow: 0 2px 10px rgba(0,51,204,0.3); }
.btn-outline { background: #fff; color: var(--mid-blue); border: 2px solid var(--mid-blue); }
.btn-outline:hover { background: #f0f4ff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { box-shadow: 0 2px 10px rgba(204,0,0,0.3); }

/* ===== LOG TABLE ===== */
.log-section { margin: 24px 0 40px; }
.log-section h2 { font-weight: 700; font-size: 20px; margin-bottom: 12px; }
.log-table-wrap { overflow-x: auto; }
.log-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.log-table th {
  background: var(--dark-navy);
  color: #fff;
  font-weight: 700;
  padding: 10px 8px;
  text-align: left;
  white-space: nowrap;
}
.log-table td {
  padding: 8px;
  border-bottom: 1px solid #e0e4ec;
}
.log-table tr:nth-child(even) { background: #f8f9fc; }
.log-totals td {
  font-weight: 900;
  background: #e8f0ff !important;
  border-top: 2px solid var(--mid-blue);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--dark-navy);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 1000;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ===== FOOTER ===== */
.footer {
  background: linear-gradient(135deg, #0a0e5c, #050830);
  color: #fff;
  text-align: center;
  padding: 28px 16px;
  margin-top: auto;
}
.footer .tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--cyan);
  font-size: 20px;
}
.footer .copy {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 8px;
}

/* ===== PRINT ===== */
@media print {
  .confidential { background: #000; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .header, .footer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .tab-bar, .btn-row, .toast, .log-section { display: none !important; }
  .tab-panel { display: block !important; }
  .tab-panel:not(.active) { display: none !important; }
  body { background: #fff; }
  .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .header h1 { font-size: 22px; }
  .tab-btn { font-size: 11px; padding: 8px 8px; }
  .card { padding: 16px; }
  .result-row.big { font-size: 22px; }
  .channel-card .ch-price { font-size: 18px; }
}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
