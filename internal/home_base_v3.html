<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Base v3 — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    /* ══ ROOT VARIABLES ══ */
    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --nu-accent-gold: #C9A84C;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ══ BASE ══ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER — Power Tower Infrastructure Overlay ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 48px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 320px;
    }

    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }

    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }

    .nu-header * { position: relative; z-index: 2; }

    /* ══ LIVE DATE PILL ══ */
    .nu-date-pill {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 20px;
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
    }

    /* ══ LOGO AREA ══ */
    .nu-phoenix-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
    }
    .nu-phoenix-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
    }

    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .nu-tagline {
      font-family: var(--font-primary);
      font-style: italic;
      font-weight: 300;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .nu-header-label {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 4px 16px;
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--nu-cyan);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* ══ WHITE CHEVRON TRANSITION ══ */
    .nu-chevron {
      position: relative;
      height: 50px;
      margin-top: -50px;
      z-index: 10;
    }
    .nu-chevron svg {
      width: 100%;
      height: 50px;
      display: block;
    }

    /* ══ GHOST PHOENIX WATERMARK ══ */
    .nu-content-area {
      position: relative;
      background: var(--nu-white);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    /* ══ MAIN CONTAINER ══ */
    .nu-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px 60px;
    }

    /* ══ PROGRESS BAR ══ */
    .nu-progress-section {
      margin-bottom: 48px;
    }
    .nu-progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .nu-progress-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--nu-dark-text);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .nu-progress-percent {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--nu-blue);
    }
    .nu-progress-bar-track {
      width: 100%;
      height: 12px;
      background: var(--nu-medium-gray);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .nu-progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--nu-blue) 0%, var(--nu-cyan) 100%);
      border-radius: 6px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .nu-progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 30px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
      border-radius: 0 6px 6px 0;
    }
    .nu-progress-sub {
      font-family: var(--font-primary);
      font-size: 0.85rem;
      color: #888;
      margin-top: 6px;
    }

    /* ══ SECTION HEADERS ══ */
    .nu-section-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--nu-blue);
      margin-bottom: 8px;
    }
    .nu-section-title span {
      color: var(--nu-dark-text);
      font-weight: 700;
    }
    .nu-section-desc {
      font-family: var(--font-primary);
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 24px;
    }

    /* ══ NAV GRID ══ */
    .nu-nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }

    /* ══ CHEVRON BADGES — Navigation Items ══ */
    .nu-badge {
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #1a1a3e 0%, #2a2a5e 100%);
      color: var(--nu-white);
      padding: 18px 28px 18px 20px;
      clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 50%, calc(100% - 24px) 100%, 0 100%, 24px 50%);
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      min-height: 64px;
    }
    .nu-badge:hover {
      background: linear-gradient(135deg, #0000CC 0%, #0033FF 100%);
      transform: translateX(4px);
    }
    .nu-badge-icon {
      width: 28px;
      height: 28px;
      margin-right: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .nu-badge-content {
      flex: 1;
      min-width: 0;
    }
    .nu-badge-label {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .nu-badge-sub {
      display: block;
      font-weight: 300;
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 2px;
    }
    .nu-badge-check {
      width: 20px;
      height: 20px;
      margin-left: 12px;
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .nu-badge-check:checked {
      background: var(--nu-cyan);
      border-color: var(--nu-cyan);
    }
    .nu-badge-check:checked::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 900;
      color: var(--nu-navy);
      line-height: 1;
    }

    .nu-badge.completed {
      background: linear-gradient(135deg, #1a3e1a 0%, #2a5e2a 100%);
    }

    /* ══ TRACKER SECTION ══ */
    .nu-tracker-section {
      margin-bottom: 48px;
    }

    .nu-tracker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ══ CARDS ══ */
    .nu-card {
      background: var(--nu-white);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .nu-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .nu-card-icon {
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    .nu-card-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1rem;
      color: var(--nu-dark-text);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .nu-card-desc {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.85rem;
      color: #777;
      line-height: 1.5;
    }
    .nu-card-status {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .nu-card-status.active {
      background: rgba(0, 200, 83, 0.1);
      color: #00C853;
    }
    .nu-card-status.pending {
      background: rgba(255, 193, 7, 0.1);
      color: #FFA000;
    }
    .nu-card-status.review {
      background: rgba(0, 0, 255, 0.08);
      color: var(--nu-blue);
    }

    /* ══ QUICK STATS ROW ══ */
    .nu-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }
    .nu-stat-card {
      background: var(--nu-light-gray);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      border: 1px solid var(--nu-medium-gray);
    }
    .nu-stat-value {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 2rem;
      color: var(--nu-blue);
      line-height: 1.2;
    }
    .nu-stat-label {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }

    /* ══ DIVIDER ══ */
    .nu-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--nu-medium-gray), transparent);
      margin: 48px 0;
    }

    /* ══ CONFETTI CANVAS ══ */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-style: italic;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 12px;
    }
    .nu-footer-contact {
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }
    .nu-footer-contact a:hover {
      text-decoration: underline;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 1024px) {
      .nu-tracker-grid { grid-template-columns: repeat(2, 1fr); }
      .nu-stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .nu-header { padding: 36px 20px 60px; min-height: 260px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .nu-container { padding: 32px 20px 40px; }
      .nu-nav-grid { grid-template-columns: 1fr; }
      .nu-badge {
        clip-path: none;
        border-radius: 8px;
        padding: 16px 20px;
      }
      .nu-tracker-grid { grid-template-columns: 1fr; }
      .nu-stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .nu-stats-row { grid-template-columns: 1fr; }
    }

    /* ══ PRINT ══ */
    @media print {
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nu-card { box-shadow: none; border: 1px solid #ccc; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #confetti-canvas { display: none; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
