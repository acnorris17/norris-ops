<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caroline Butler — Operations Dashboard | Norris Utilities</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: #f8f9ff;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ─── HEADER ─────────────────────────────────────────────── */
  .header {
    position: relative;
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    min-height: 280px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 40px 80px;
  }

  /* Ghost Phoenix Watermark */
  .header::before {
    content: '🦅';
    position: absolute;
    right: -20px;
    top: -20px;
    font-size: 380px;
    opacity: 0.07;
    line-height: 1;
    pointer-events: none;
    user-select: none;
    transform: scaleX(-1);
  }

  /* Infrastructure Silhouette SVG */
  .infra-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    opacity: 0.10;
    pointer-events: none;
  }

  .header-inner {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 20px;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-title {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .header-subtitle {
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  .header-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 50px;
    padding: 8px 20px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
    align-self: flex-start;
  }

  .header-meta {
    display: flex;
    gap: 30px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .header-meta-item {
    color: rgba(255,255,255,0.80);
    font-size: 13px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-meta-item span {
    color: #fff;
    font-weight: 700;
  }

  /* ─── CHEVRON DIVIDER ─────────────────────────────────────── */
  .chevron-divider {
    width: 100%;
    height: 60px;
    background: #f8f9ff;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    margin-top: -1px;
    position: relative;
    z-index: 3;
  }

  /* ─── MAIN CONTENT ────────────────────────────────────────── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* ─── STATS ROW ───────────────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 20px 18px;
    border-top: 4px solid #0000FF;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,0,255,0.14);
  }

  .stat-card.cyan { border-top-color: #06D0FF; }
  .stat-card.green { border-top-color: #22c55e; }
  .stat-card.amber { border-top-color: #f59e0b; }
  .stat-card.red { border-top-color: #ef4444; }

  .stat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #6b7280;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 900;
    color: #0000FF;
    line-height: 1;
  }

  .stat-card.cyan .stat-value { color: #06D0FF; }
  .stat-card.green .stat-value { color: #22c55e; }
  .stat-card.amber .stat-value { color: #f59e0b; }
  .stat-card.red .stat-value { color: #ef4444; }

  .stat-sub {
    font-size: 12px;
    color: #9ca3af;
    font-weight: 400;
  }

  /* ─── SECTION HEADERS ─────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #0000FF;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, #0000FF30, transparent);
  }

  /* ─── X SEPARATOR ─────────────────────────────────────────── */
  .x-separator {
    text-align: center;
    color: #06D0FF;
    font-size: 20px;
    opacity: 0.4;
    letter-spacing: 18px;
    margin: 28px 0;
    user-select: none;
  }

  /* ─── GRID LAYOUT ─────────────────────────────────────────── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 600px) {
    .grid-3 { grid-template-columns: 1fr; }
    .header { padding: 28px 20px 70px; }
    .main { padding: 16px 14px 50px; }
  }

  /* ─── CARDS ───────────────────────────────────────────────── */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 24px;
    border-left: 4px solid #0000FF;
  }

  .card.cyan-border { border-left-color: #06D0FF; }
  .card.green-border { border-left-color: #22c55e; }
  .card.amber-border { border-left-color: #f59e0b; }
  .card.full { border-left: none; border-top: 4px solid #0000FF; }
  .card.full.cyan-top { border-top-color: #06D0FF; }

  /* ─── TASK BOARD ──────────────────────────────────────────── */
  .task-columns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  @media (max-width: 800px) {
    .task-columns { grid-template-columns: 1fr; }
  }

  .task-col {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    overflow: hidden;
  }

  .task-col-header {
    padding: 14px 18px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .task-col-header.todo { background: linear-gradient(90deg, #6b7280, #9ca3af); }
  .task-col-header.inprogress { background: linear-gradient(90deg, #0000FF, #06D0FF); }
  .task-col-header.done { background: linear-gradient(90deg, #059669, #22c55e); }

  .col-count {
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 900;
  }

  .task-list {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-item {
    background: #f8f9ff;
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 3px solid #0000FF;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
  }

  .task-item:hover {
    box-shadow: 0 4px 12px rgba(0,0,255,0.12);
    transform: translateX(3px);
  }

  .task-item.priority-high { border-left-color: #ef4444; }
  .task-item.priority-med { border-left-color: #f59e0b; }
  .task-item.priority-low { border-left-color: #06D0FF; }
  .task-item.done-item { border-left-color: #22c55e; opacity: 0.75; }

  .task-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .task-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .task-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tag-admin { background: #ede9fe; color: #7c3aed; }
  .tag-customer { background: #dbeafe; color: #1d4ed8; }
  .tag-ops { background: #dcfce7; color: #15803d; }
  .tag-billing { background: #fef3c7; color: #b45309; }
  .tag-urgent { background: #fee2e2; color: #dc2626; }
  .tag-comms { background: #e0f2fe; color: #0369a1; }

  .task-due {
    font-size: 10px;
    color: #9ca3af;
    font-weight: 400;
    margin-left: auto;
  }

  /* ─── TIER 1 ACTIONS ──────────────────────────────────────── */
  .tier1-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .action-card {
    background: #fff;
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: 0 2px 14px rgba(0,0,255,0.07);
    border-top: 3px solid #06D0FF;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .action-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 22px rgba(0,0,255,0.13);
  }

  .action-icon {
    font-size: 26px;
    line-height: 1;
  }

  .action-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .action-desc {
    font-size: 12px;
    color: #6b7280;
    font-weight: 400;
    line-height: 1.5;
  }

  .action-btn {
    display: inline-block;
    margin-top: 6px;
    background: linear-gradient(90deg, #0000FF, #06D0FF);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    width: fit-content;
    transition: opacity 0.2s;
  }

  .action-btn:hover { opacity: 0.85; }

  /* ─── CUSTOMER QUEUE TABLE ────────────────────────────────── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    font-size: 13px;
  }

  thead {
    background: linear-gradient(90deg, #0000FF, #06D0FF);
  }

  thead th {
    padding: 13px 16px;
    text-align: left;
    color: #fff;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #f1f5f9;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #f8f9ff; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 12px 16px;
    color: #1a1a2e;
    vertical-align: middle;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .badge-new { background: #dbeafe; color: #1d4ed8; }
  .badge-pending { background: #fef3c7; color: #b45309; }
  .badge-review { background: #ede9fe; color: #7c3aed; }
  .badge-urgent { background: #fee2e2; color: #dc2626; }
  .badge-resolved { background: #dcfce7; color: #15803d; }
  .badge-info { background: #e0f2fe; color: #0369a1; }

  .review-btn {
    background: transparent;
    border: 1.5px solid #0000FF;
    color: #0000FF;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }

  .review-btn:hover {
    background: #0000FF;
    color: #fff;
  }

  .flag-icon { font-size: 16px; }

  /* ─── PRIORITY DOT ────────────────────────────────────────── */
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot-red { background: #ef4444; }
  .dot-amber { background: #f59e0b; }
  .dot-green { background: #22c55e; }
  .dot-blue { background: #0000FF; }

  /* ─── WELCOME BANNER ──────────────────────────────────────── */
  .welcome-banner {
    background: linear-gradient(135deg, #0000FF08, #06D0FF12);
    border: 1px solid #06D0FF40;
    border-radius: 12px;
    padding: 18px 24px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
  }

  .welcome-text {
    font-size: 15px;
    color: #1a1a2e;
  }

  .welcome-text strong {
    color: #0000FF;
    font-weight: 900;
  }

  .timestamp {
    font-size: 12px;
    color: #6b7280;
    font-weight: 300;
  }

  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.8s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* ─── FOOTER ──────────────────────────────────────────────── */
  .footer {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    padding: 28px 40px;
    text-align: center;
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.5px;
    margin-top: 40px;
  }

  .footer strong {
    color: #fff;
    font-weight: 700;
  }

  .footer-divider {
    color: rgba(255,255,255,0.3);
    margin: 0 8px;
  }

  /* ─── NOTE BOX ────────────────────────────────────────────── */
  .note-box {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-left: 4px solid #f59e0b;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: #92400e;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .note-box strong { color: #b45309; }

  /* ─── PROGRESS BAR ────────────────────────────────────────── */
  .progress-wrap {
    margin-top: 6px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 5px;
  }

  .progress-bar {
    height: 6px;
    background: #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, #0000FF, #06D0FF);
  }

  .mb-6 { margin-bottom: 24px; }
  .mb-8 { margin-bottom: 32px; }
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>
