<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Notes &mdash; Norris Utilities&reg;</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Lato',sans-serif;background:#f5f6fa;color:#1a1a1a}

/* LOGIN */
.login-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%)}
.login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:90%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0000FF,#06D0FF)}
.login-title{font-weight:900;font-size:22px;color:#0a0e5c;margin-bottom:4px}
.login-sub{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px;margin-bottom:28px}
.login-input{width:100%;padding:14px 18px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:'Lato',sans-serif;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#0033cc}
.login-input.error{border-color:#cc0000;animation:shake .4s ease}
.login-btn{width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer}
.login-error{color:#cc0000;font-size:13px;font-weight:700;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}}

/* HEADER */
.header{background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%);padding:28px 32px;text-align:center}
.header h1{font-weight:900;font-size:22px;color:#fff;letter-spacing:2px}
.header p{font-family:'Playfair Display',serif;font-style:italic;color:rgba(255,255,255,0.8);font-size:14px;margin-top:4px}
.back-link{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;font-weight:700}
.back-link:hover{color:#fff}

/* LAYOUT */
.app{display:flex;min-height:calc(100vh - 80px)}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;padding:16px 0}
.sidebar h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#888;padding:12px 20px 8px;margin-top:8px}
.sidebar h3:first-child{margin-top:0}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;font-size:14px;font-weight:600;color:#333;cursor:pointer;transition:background .15s,color .15s;border-left:3px solid transparent}
.sb-item:hover{background:#f0f4ff;color:#0033cc}
.sb-item.active{background:#e8f0ff;color:#0033cc;border-left-color:#0033cc;font-weight:700}
.sb-count{background:#0033cc;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center}
.sb-count.zero{background:#e0e0e0;color:#999}

/* MAIN */
.main{flex:1;padding:32px;overflow-y:auto}
.page-title{font-size:22px;font-weight:900;color:#0a0e5c;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.page-title span{font-size:14px;font-weight:400;color:#888}

/* TOOLBAR */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:24px}
.filter-btn{padding:8px 16px;border:2px solid #e0e0e0;border-radius:8px;background:#fff;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;color:#666;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:#0033cc;color:#0033cc}
.filter-btn.active{background:#0033cc;border-color:#0033cc;color:#fff}
.toolbar-spacer{flex:1}
.action-btn{padding:8px 18px;border:none;border-radius:8px;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.action-btn.primary{background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff}
.action-btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,51,204,0.3)}
.action-btn.danger{background:#fde8e8;color:#cc0000;border:1px solid #fcc}
.action-btn.danger:hover{background:#cc0000;color:#fff}
.action-btn.export{background:#e6f9ee;color:#00802b;border:1px solid #b8e6c8}
.action-btn.export:hover{background:#00802b;color:#fff}

/* ADD FORM */
.add-form{background:#fff;border-radius:12px;padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid #eee}
.add-form h4{font-size:14px;font-weight:700;color:#0033cc;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#888}
.form-group select,.form-group textarea{font-family:'Lato',sans-serif;font-size:14px;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;outline:none;transition:border-color .2s}
.form-group select:focus,.form-group textarea:focus{border-color:#0033cc}
.form-group textarea{min-height:80px;resize:vertical;width:100%}
.form-group.full{flex:1;min-width:100%}

/* NOTES LIST */
.note-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid #eee;display:flex;gap:16px;align-items:flex-start;transition:all .2s}
.note-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.note-card.done{opacity:0.6;background:#f9fdf9}
.note-priority{width:6px;min-height:50px;border-radius:3px;flex-shrink:0}
.note-priority.high{background:#cc0000}
.note-priority.medium{background:#ffaa00}
.note-priority.low{background:#00aa44}
.note-body{flex:1;min-width:0}
.note-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.note-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:3px 8px;border-radius:4px}
.note-type.bug{background:#fde8e8;color:#cc0000}
.note-type.change{background:#fff8e1;color:#b38600}
.note-type.improvement{background:#e8f0ff;color:#0033cc}
.note-type.feature{background:#e6f9ee;color:#00802b}
.note-time{font-size:11px;color:#aaa;margin-left:auto;white-space:nowrap}
.note-desc{font-size:14px;color:#333;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.note-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.note-actions button{padding:5px 12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;font-family:'Lato',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.note-actions button:hover{border-color:#0033cc;color:#0033cc}
.note-actions button.del:hover{border-color:#cc0000;color:#cc0000}
.status-badge{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:4px;letter-spacing:0.5px}
.status-badge.open{background:#fde8e8;color:#cc0000}
.status-badge.in-progress{background:#fff8e1;color:#b38600}
.status-badge.done{background:#e6f9ee;color:#00802b}
.empty-state{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}

/* FOOTER */
.footer{background:linear-gradient(135deg,#0a0e5c 0%,#001144 100%);padding:20px;text-align:center}
.footer p{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px}
.footer small{color:rgba(255,255,255,0.4);font-size:11px;display:block;margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a0e5c;color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,0.25);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:100%;border-right:none;border-bottom:1px solid #e0e0e0;max-height:200px}
  .main{padding:20px}
  .form-row{flex-direction:column}
}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){if(sessionStorage.getItem('nu_auth_2026')==='granted'&&sessionStorage.getItem('nu_role')==='aaron'){document.getElementById('auth-wall').style.display='none'}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
