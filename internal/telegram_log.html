<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norris Utilities&reg; &mdash; Telegram Message Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#f5f6fa;color:#1a1a1a;min-height:100vh}
.header{background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%);padding:32px 24px;text-align:center;position:relative;overflow:hidden}
.header h1{font-weight:900;font-size:24px;color:#fff;letter-spacing:2px}
.header p{font-family:'Playfair Display',serif;font-style:italic;color:rgba(255,255,255,0.8);font-size:14px;margin-top:4px}
.chevron{line-height:0;margin-top:-1px}
.chevron svg{display:block;width:100%}
.controls{max-width:1200px;margin:24px auto;padding:0 20px}
.search-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;align-items:center}
.search-box{flex:1;min-width:200px;padding:12px 18px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:'Lato',sans-serif;outline:none}
.search-box:focus{border-color:#0033cc}
.date-input{padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-family:'Lato',sans-serif;font-size:14px}
.date-input:focus{border-color:#0033cc;outline:none}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.filter-btn{padding:7px 16px;border:2px solid #e0e0e0;border-radius:8px;background:#fff;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;color:#666;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:0.5px}
.filter-btn:hover{border-color:#0033cc;color:#0033cc}
.filter-btn.active{background:#0033cc;border-color:#0033cc;color:#fff}
.stats-bar{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:3px solid #0033cc}
.stat .num{font-size:22px;color:#0033cc;font-weight:900}
.msg-list{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.msg-card{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid #eee;cursor:pointer;transition:all .2s}
.msg-card:hover{border-color:#0033cc;box-shadow:0 4px 16px rgba(0,51,204,0.08)}
.msg-card.expanded{border-color:#06D0FF}
.msg-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.msg-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.msg-time{font-size:12px;color:#888;font-weight:400;white-space:nowrap}
.msg-source{font-size:11px;color:#aaa;margin-left:auto;white-space:nowrap}
.msg-preview{font-size:14px;color:#444;margin-top:8px;line-height:1.5;overflow:hidden;max-height:2.8em}
.msg-card.expanded .msg-preview{max-height:none}
.msg-full{display:none;margin-top:12px;padding:12px 16px;background:#f8f9fc;border-radius:8px;font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg-card.expanded .msg-full{display:block}
.msg-status{font-size:10px;margin-top:4px}
.msg-status.sent{color:#00802b}
.msg-status.failed{color:#cc0000}
.empty{text-align:center;padding:60px 20px;color:#888;font-size:16px}
.tag-BRIEF{background:#fff8e1;color:#b38600}.tag-EOD{background:#e8e0ff;color:#5500aa}
.tag-EMAIL{background:#e8f0ff;color:#0033cc}.tag-SAMSON{background:#f0e8ff;color:#6600cc}
.tag-AP{background:#fff3e0;color:#cc6600}.tag-BUILD{background:#e6f9ee;color:#00802b}
.tag-FAILED{background:#fde8e8;color:#cc0000}.tag-WATCHDOG{background:#fef2f2;color:#cc3300}
.tag-REMARKABLE{background:#e0f7fa;color:#006064}.tag-DRAFT{background:#f3e8ff;color:#7700aa}
.tag-VOICE{background:#fce4ec;color:#c62828}.tag-INVOICE{background:#fff8e1;color:#b38600}
.tag-SHIPPING{background:#e8f5e9;color:#2e7d32}.tag-BACKUP{background:#f0f0f0;color:#555}
.tag-FEEDBACK{background:#e0f2f1;color:#00695c}.tag-SYSTEM{background:#eceff1;color:#455a64}
.tag-QB{background:#e8f5e9;color:#1b5e20}.tag-NEWS{background:#e3f2fd;color:#0d47a1}
.tag-DIGEST{background:#fff3e0;color:#e65100}.tag-URGENT{background:#fde8e8;color:#cc0000}
.footer{background:linear-gradient(135deg,#0a0e5c,#001144);padding:24px;text-align:center}
.footer p{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px}
.footer small{color:rgba(255,255,255,0.3);font-size:11px;display:block;margin-top:6px}
@media(max-width:600px){.header h1{font-size:18px}.msg-header{gap:8px}.msg-source{margin-left:0}}
</style>
</head>
<body>
<div class="header">
  <h1>Telegram Message Log</h1>
  <p>A Legacy of Commitment&reg;</p>
</div>
<div class="chevron"><svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,0 547,0 547,40 0,0" fill="#06D0FF" opacity="0.15"/><polygon points="0,0 547,40 1440,0" fill="#f5f6fa"/></svg></div>

<div class="controls">
  <div class="search-row">
    <input type="text" class="search-box" id="searchBox" placeholder="Search messages by content, category, or source...">
    <input type="date" class="date-input" id="dateFrom" title="From date">
    <span style="color:#888;font-size:13px">to</span>
    <input type="date" class="date-input" id="dateTo" title="To date">
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="ALL">All</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="msg-list" id="msgList">
  <div class="empty" id="loadingMsg">Loading messages...</div>
</div>

<footer class="footer">
  <p>A Legacy of Commitment&reg;</p>
  <small>&copy; 2026 Norris Utilities, LLC &mdash; Internal Use Only</small>
</footer>

<script>
(function(){
  'use strict';
  var allMessages = [];
  var activeCat = 'ALL';
  var CATEGORIES = [
    'BRIEF','EOD','DIGEST','EMAIL','SAMSON','AP','BUILD','FAILED',
    'WATCHDOG','REMARKABLE','DRAFT','VOICE','INVOICE','SHIPPING',
    'BACKUP','FEEDBACK','SYSTEM','QB','NEWS','URGENT'
  ];
  var CAT_ICONS = {
    BRIEF:'\u2600\uFE0F',EOD:'\uD83C\uDF19',DIGEST:'\uD83D\uDCCA',EMAIL:'\uD83D\uDCEC',
    SAMSON:'\uD83E\uDDF5',AP:'\uD83D\uDCB0',BUILD:'\u2705',FAILED:'\u274C',
    WATCHDOG:'\u26A0\uFE0F',REMARKABLE:'\uD83D\uDCCB',DRAFT:'\u270D\uFE0F',VOICE:'\uD83C\uDFA4',
    INVOICE:'\uD83D\uDCB0',SHIPPING:'\uD83D\uDCE6',BACKUP:'\uD83D\uDCBE',FEEDBACK:'\uD83D\uDCDD',
    SYSTEM:'\uD83D\uDD27',QB:'\uD83D\uDCCA',NEWS:'\uD83D\uDCE1',URGENT:'\uD83D\uDEA8'
  };

  function stripHtml(s){return (s||'').replace(/<[^>]+>/g,'').replace(/\n/g,' ').trim();}
  function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function loadData(){
    fetch('/data/telegram_log.json')
      .then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})
      .then(function(data){
        allMessages = (data.messages||[]).slice().reverse();
        buildFilterBar();
        render();
      })
      .catch(function(e){
        document.getElementById('loadingMsg').textContent =
          'Could not load telegram_log.json. Run portal_data_sync.py to push data.';
      });
  }

  function buildFilterBar(){
    var bar = document.getElementById('filterBar');
    var seen = {};
    allMessages.forEach(function(m){seen[m.category]=true;});
    CATEGORIES.forEach(function(cat){
      if(!seen[cat]) return;
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = cat;
      btn.textContent = (CAT_ICONS[cat]||'') + ' ' + cat;
      btn.addEventListener('click',function(){
        bar.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');
        activeCat = cat;
        render();
      });
      bar.appendChild(btn);
    });
    bar.querySelector('[data-cat="ALL"]').addEventListener('click',function(){
      bar.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      activeCat = 'ALL';
      render();
    });
  }

  function getFiltered(){
    var q = document.getElementById('searchBox').value.toLowerCase();
    var from = document.getElementById('dateFrom').value;
    var to = document.getElementById('dateTo').value;
    return allMessages.filter(function(m){
      if(activeCat !== 'ALL' && m.category !== activeCat) return false;
      if(q){
        var text = (m.message||'').toLowerCase() + ' ' + (m.category||'').toLowerCase() + ' ' + (m.source||'').toLowerCase();
        if(!text.includes(q)) return false;
      }
      if(from && (m.timestamp||'').slice(0,10) < from) return false;
      if(to && (m.timestamp||'').slice(0,10) > to) return false;
      return true;
    });
  }

  function render(){
    var filtered = getFiltered();
    var list = document.getElementById('msgList');
    var statsBar = document.getElementById('statsBar');
    var catCounts = {};
    filtered.forEach(function(m){catCounts[m.category]=(catCounts[m.category]||0)+1;});
    statsBar.innerHTML =
      '<div class="stat"><div class="num">'+filtered.length+'</div>messages</div>' +
      (activeCat==='ALL' ? '<div class="stat"><div class="num">'+Object.keys(catCounts).length+'</div>categories</div>' : '');

    if(filtered.length===0){
      list.innerHTML='<div class="empty">No messages match your filters.</div>';
      return;
    }

    var html = '';
    var show = filtered.slice(0,200);
    show.forEach(function(m){
      var cat = m.category||'SYSTEM';
      var ts = m.timestamp||'';
      var dateStr = ts.slice(0,10);
      var timeStr = ts.slice(11,19);
      var preview = stripHtml(m.message).slice(0,150);
      var full = escHtml(m.message||'');
      var sent = m.telegram_sent !== false;

      html += '<div class="msg-card" onclick="this.classList.toggle(\'expanded\')">';
      html += '<div class="msg-header">';
      html += '<span class="msg-tag tag-'+cat+'">'+(CAT_ICONS[cat]||'')+' '+cat+'</span>';
      html += '<span class="msg-time">'+dateStr+' '+timeStr+'</span>';
      html += '<span class="msg-source">'+escHtml(m.source||'')+'</span>';
      html += '</div>';
      html += '<div class="msg-preview">'+escHtml(preview)+'</div>';
      html += '<div class="msg-full">'+full+'</div>';
      html += '<div class="msg-status '+(sent?'sent':'failed')+'">'+(sent?'\u2705 Sent':'\u274C Failed to send')+'</div>';
      html += '</div>';
    });

    if(filtered.length > 200){
      html += '<div class="empty">Showing 200 of '+filtered.length+' messages. Narrow your search.</div>';
    }

    list.innerHTML = html;
  }

  document.getElementById('searchBox').addEventListener('input', render);
  document.getElementById('dateFrom').addEventListener('change', render);
  document.getElementById('dateTo').addEventListener('change', render);

  loadData();
})();
</script>
</body>
</html>
