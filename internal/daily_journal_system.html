<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Daily Journal — Norris Utilities LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: #f0f4ff;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════
     HEADER
  ═══════════════════════════════════════ */
  .header {
    position: relative;
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    min-height: 300px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 40px 20px 80px;
  }

  /* Ghost Phoenix Watermark */
  .phoenix-watermark {
    position: absolute;
    right: -20px;
    top: -20px;
    font-size: 420px;
    opacity: 0.07;
    line-height: 1;
    pointer-events: none;
    user-select: none;
    filter: grayscale(1) brightness(2);
    z-index: 0;
  }

  /* Power Tower SVG Overlay */
  .tower-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 120px;
    opacity: 0.10;
    pointer-events: none;
    z-index: 0;
  }

  .header-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-bottom: 10px;
  }

  .header-wordmark {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ffffff;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .header-wordmark span {
    color: #ffffff;
    opacity: 0.85;
    font-weight: 300;
    font-size: clamp(18px, 3vw, 32px);
    letter-spacing: 6px;
    display: block;
    margin-top: 4px;
  }

  .header-subtitle {
    margin-top: 14px;
    font-size: clamp(13px, 2vw, 15px);
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    letter-spacing: 2px;
  }

  .header-badge {
    display: inline-block;
    margin-top: 16px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 30px;
    padding: 6px 22px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffff;
  }

  /* ═══════════════════════════════════════
     CHEVRON DIVIDER
  ═══════════════════════════════════════ */
  .chevron-divider {
    width: 100%;
    height: 62px;
    background: #f0f4ff;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    margin-top: -1px;
    position: relative;
    z-index: 3;
  }

  /* ═══════════════════════════════════════
     MAIN LAYOUT
  ═══════════════════════════════════════ */
  .main-wrapper {
    max-width: 1140px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ═══════════════════════════════════════
     DATE NAVIGATION BAR
  ═══════════════════════════════════════ */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 16px 24px;
    margin-bottom: 28px;
    border-left: 5px solid #0000FF;
    flex-wrap: wrap;
    gap: 12px;
  }

  .date-nav-arrows {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .nav-btn {
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    color: white;
    border: none;
    border-radius: 8px;
    width: 38px;
    height: 38px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    transition: opacity 0.2s;
  }
  .nav-btn:hover { opacity: 0.82; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }

  .date-display {
    text-align: center;
    flex: 1;
  }

  .date-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #06D0FF;
  }

  .date-main {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 900;
    color: #0000FF;
    letter-spacing: 1px;
  }

  .date-entry-num {
    font-size: 12px;
    font-weight: 300;
    color: #888;
    margin-top: 2px;
  }

  .date-picker-btn {
    background: #f0f4ff;
    border: 2px solid #0000FF;
    color: #0000FF;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .date-picker-btn:hover { background: #e8eeff; }

  /* ═══════════════════════════════════════
     X-SEPARATOR
  ═══════════════════════════════════════ */
  .x-separator {
    text-align: center;
    color: #06D0FF;
    font-size: 20px;
    opacity: 0.45;
    letter-spacing: 18px;
    margin: 26px 0;
  }

  /* ═══════════════════════════════════════
     STATS ROW
  ═══════════════════════════════════════ */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 18px 20px;
    border-top: 4px solid #0000FF;
    text-align: center;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-3px); }
  .stat-card.cyan { border-top-color: #06D0FF; }
  .stat-card.green { border-top-color: #00c48c; }
  .stat-card.orange { border-top-color: #ff9800; }

  .stat-value {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 900;
    color: #0000FF;
    line-height: 1;
  }
  .stat-card.cyan .stat-value { color: #06D0FF; }
  .stat-card.green .stat-value { color: #00c48c; }
  .stat-card.orange .stat-value { color: #ff9800; }

  .stat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-top: 6px;
  }

  /* ═══════════════════════════════════════
     TWO-COLUMN LAYOUT
  ═══════════════════════════════════════ */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    margin-bottom: 22px;
  }
  @media(max-width: 760px) {
    .two-col { grid-template-columns: 1fr; }
  }

  /* ═══════════════════════════════════════
     JOURNAL CARDS
  ═══════════════════════════════════════ */
  .card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,255,0.08);
    overflow: hidden;
    margin-bottom: 22px;
  }

  .card-header {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-header-icon {
    font-size: 22px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }

  .card-header-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: white;
  }

  .card-header-sub {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.8);
    margin-top: 1px;
    letter-spacing: 0.5px;
  }

  .card-body {
    padding: 22px;
  }

  /* ═══════════════════════════════════════
     NARRATIVE ENTRY (MAIN JOURNAL)
  ═══════════════════════════════════════ */
  .journal-card { border-left: 5px solid #0000FF; }

  .journal-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px dashed #e0e8ff;
  }

  .meta-tag {
    background: #f0f4ff;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: 700;
    color: #0000FF;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .meta-tag.cyan { background: #e6faff; color: #06acd0; }
  .meta-tag.green { background: #e6fff6; color: #00a876; }

  .journal-narrative {
    font-size: 15px;
    line-height: 1.85;
    color: #1a1a2e;
    font-weight: 400;
  }

  .journal-narrative p { margin-bottom: 14px; }
  .journal-narrative p:last-child { margin-bottom: 0; }

  .journal-narrative strong { color: #0000FF; font-weight: 700; }

  .journal-quote {
    border-left: 4px solid #06D0FF;
    margin: 18px 0;
    padding: 12px 18px;
    background: #f0f4ff;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    font-size: 14px;
    color: #444;
  }

  /* ═══════════════════════════════════════
     TASK / ACTIVITY LOG TABLE
  ═══════════════════════════════════════ */
  .activity-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .activity-table th {
    background: #f0f4ff;
    color: #0000FF;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 11px;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid #e0e8ff;
  }

  .activity-table td {
    padding: 12px 14px;
    border-bottom: 1px solid #f0f4ff;
    color: #1a1a2e;
    vertical-align: top;
  }

  .activity-table tr:last-child td { border-bottom: none; }
  .activity-table tr:hover td { background: #fafbff; }

  .status-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge-done { background: #e6fff6; color: #00a876; }
  .badge-ip   { background: #fff8e6; color: #cc7a00; }
  .badge-plan { background: #f0f4ff; color: #0000FF; }
  .badge-block{ background: #ffe6e6; color: #cc0000; }

  .time-col { font-weight: 700; color: #0000FF; white-space: nowrap; }
  .cat-col  { font-weight: 300; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ═══════════════════════════════════════
     PRIORITY / DECISIONS
  ═══════════════════════════════════════ */
  .priority-list { list-style: none; }

  .priority-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 13px 0;
    border-bottom: 1px dashed #e8eeff;
  }
  .priority-item:last-child { border-bottom: none; }

  .priority-num {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    color: white;
    font-weight: 900;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .priority-text { font-size: 14px; line-height: 1.5; }
  .priority-text strong { color: #0000FF; }
  .priority-text .sub { font-size: 12px; color: #888; margin-top: 2px; }

  /* ═══════════════════════════════════════
     DECISION LOG
  ═══════════════════════════════════════ */
  .decision-item {
    background: #f8f9ff;
    border-radius: 10px;
    border-left: 4px solid #0000FF;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .decision-item:last-child { margin-bottom: 0; }
  .decision-item.cyan-border { border-left-color: #06D0FF; }

  .decision-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #0000FF;
    margin-bottom: 5px;
  }
  .decision-item.cyan-border .decision-label { color: #06acd0; }

  .decision-text {
    font-size: 14px;
    color: #1a1a2e;
    line-height: 1.55;
  }

  .decision-outcome {
    margin-top: 8px;
    font-size: 12px;
    color: #00a876;
    font-weight: 700;
  }

  /* ═══════════════════════════════════════
     METRICS / KPI MINI CARDS
  ═══════════════════════════════════════ */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
  }

  .kpi-mini {
    background: #f8f9ff;
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    border: 1px solid #e0e8ff;
  }

  .kpi-val {
    font-size: 24px;
    font-weight: 900;
    color: #0000FF;
    line-height: 1;
  }
  .kpi-val.cyan { color: #06D0FF; }
  .kpi-val.green { color: #00c48c; }

  .kpi-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #aaa;
    margin-top: 5px;
  }

  .kpi-delta {
    font-size: 11px;
    font-weight: 700;
    margin-top: 4px;
  }
  .kpi-delta.up { color: #00a876; }
  .kpi-delta.down { color: #cc3333; }
  .kpi-delta.flat { color: #888; }

  /* ═══════════════════════════════════════
     MOOD / FOCUS INDICATOR
  ═══════════════════════════════════════ */
  .focus-bar-wrap {
    margin-bottom: 14px;
  }

  .focus-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: #555;
    margin-bottom: 6px;
  }
  .focus-bar-label span:last-child { color: #0000FF; }

  .focus-bar-bg {
    background: #e8eeff;
    border-radius: 20px;
    height: 10px;
    overflow: hidden;
  }

  .focus-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, #0000FF, #06D0FF);
    transition: width 0.6s ease;
  }

  /* ═══════════════════════════════════════
     TOMORROW PREVIEW
  ═══════════════════════════════════════ */
  .tomorrow-list { list-style: none; }
  .tomorrow-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f4ff;
    font-size: 14px;
  }
  .tomorrow-item:last-child { border-bottom: none; }
  .tomorrow-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════
     SYSTEM STATUS
  ═══════════════════════════════════════ */
  .sys-status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid #f0f4ff;
    font-size: 13px;
  }
  .sys-status-row:last-child { border-bottom: none; }

  .sys-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sys-dot.ok     { background: #00c48c; box-shadow: 0 0 6px #00c48c88; }
  .sys-dot.warn   { background: #ffb700; box-shadow: 0 0 6px #ffb70088; }
  .sys-dot.err    { background: #ff3333; box-shadow: 0 0 6px #ff333388; }
  .sys-dot.idle   { background: #aaa; }

  .sys-name { flex: 1; font-weight: 700; color: #1a1a2e; }
  .sys-state { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .sys-state.ok   { color: #00a876; }
  .sys-state.warn { color: #cc7a00; }
  .sys-state.err  { color: #cc0000; }
  .sys-state.idle { color: #888; }

  /* ═══════════════════════════════════════
     FOOTER
  ═══════════════════════════════════════ */
  .footer {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    padding: 30px 20px;
    text-align: center;
    color: white;
    margin-top: 40px;
  }

  .footer-brand {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .footer-tagline {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    opacity: 0.85;
    margin-top: 4px;
  }

  .footer-contact {
    margin-top: 14px;
    font-size: 12px;
    opacity: 0.75;
    letter-spacing: 0.5px;
    line-height: 1.8;
  }

  .footer-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.2);
    margin: 14px auto;
    width: 60%;
  }

  .footer-note {
    font-size: 10px;
    opacity: 0.5;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════
     RESPONSIVE
  ═══════════════════════════════════════ */
  @media(max-width: 600px) {
    .date-nav { flex-direction: column; align-items: stretch; text-align: center; }
    .date-display { border-top: 1px dashed #e0e8ff; border-bottom: 1px dashed #e0e8ff; padding: 10px 0; }
    .date-nav-arrows { justify-content: center; }
    .date-picker-btn { width: 100%; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .card-body { padding: 16px; }
    .activity-table th:nth-child(3),
    .activity-table td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>
