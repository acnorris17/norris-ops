<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>2025 Goodwill Donations — With Estimates</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Lato',sans-serif; color:#1a1a2e; background:#fff; max-width:900px; margin:0 auto; padding:36px; }
.header { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; padding-bottom:16px; margin-bottom:20px; border-bottom:1px solid #ccc; }
.header-logo { flex:0 0 45%; }
.header-logo img { width:100%; height:auto; display:block; }
.header-info { text-align:right; font-size:11px; color:#555; line-height:2; }
.header-info strong { font-size:13px; font-weight:900; color:#1a1a2e; display:block; margin-bottom:4px; }
h1 { font-size:18px; font-weight:900; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
.subtitle { font-size:11px; color:#888; margin-bottom:20px; }
.note { background:#fff8e1; border:1px solid #ffe082; border-radius:4px; padding:12px 16px; font-size:11px; color:#555; margin-bottom:20px; line-height:1.8; }
table { width:100%; border-collapse:collapse; font-size:11px; margin-bottom:20px; }
thead tr { background:#f2f2f2; }
thead th { padding:8px 10px; text-align:left; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; border-bottom:2px solid #ccc; }
thead th.right { text-align:right; }
tbody tr { border-bottom:1px solid #f0f0f0; }
tbody tr:hover { background:#fafafa; }
tbody td { padding:8px 10px; vertical-align:top; }
tbody td.right { text-align:right; font-weight:700; }
tbody td.cat { font-size:10px; color:#888; }
tbody td.date { font-size:10px; color:#0000FF; font-weight:700; white-space:nowrap; }
.subtotal { background:#f5f5f5; font-weight:700; }
.total-row td { padding:12px 10px; font-weight:900; font-size:14px; border-top:2px solid #1a1a2e; }
.total-row td.right { color:#0000FF; font-size:16px; }
.footer { display:flex; justify-content:space-between; align-items:center; padding-top:14px; border-top:1px solid #ddd; margin-top:8px; }
.footer img { height:30px; }
.footer-tag { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; }
@media print { @page { margin:0.5in; size:letter; } .note { display:none; } }
</style></head><body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body></html>
