<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Improvement Log &mdash; Norris Utilities&reg;</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#f5f6fa;color:#1a1a1a;min-height:100vh}

/* LOGIN */
.login-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%)}
.login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:90%;max-width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0000FF,#06D0FF)}
.login-title{font-weight:900;font-size:22px;color:#0a0e5c;margin-bottom:4px}
.login-sub{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px;margin-bottom:28px}
.login-input{width:100%;padding:14px 18px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:'Lato',sans-serif;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#0033cc}
.login-input.error{border-color:#cc0000;animation:shake .4s ease}
.login-btn{width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer}
.login-error{color:#cc0000;font-size:13px;font-weight:700;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}}

/* HEADER */
.header{background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%);padding:32px 24px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:65%;padding-bottom:65%;background:url('../assets/phoenix-icon.svg') center/contain no-repeat;opacity:0.07;pointer-events:none}
.header h1{font-weight:900;font-size:22px;color:#fff;letter-spacing:2px;position:relative}
.header p{font-family:'Playfair Display',serif;font-style:italic;color:rgba(255,255,255,0.8);font-size:14px;margin-top:4px;position:relative}
.chevron{line-height:0;margin-top:-1px}
.chevron svg{display:block;width:100%}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:24px 20px 60px}

/* TOOLBAR */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:24px}
.toolbar h2{font-weight:900;font-size:20px;margin-right:auto}
.toolbar h2 .blue{color:#0033cc}
.filter-sel{padding:8px 14px;border:2px solid #e0e0e0;border-radius:8px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;background:#fff;cursor:pointer;outline:none}
.filter-sel:focus{border-color:#0033cc}
.search-box{padding:8px 14px;border:2px solid #e0e0e0;border-radius:8px;font-family:'Lato',sans-serif;font-size:13px;outline:none;min-width:180px}
.search-box:focus{border-color:#0033cc}
.btn{padding:9px 18px;border:none;border-radius:8px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,51,204,0.3)}
.btn-export{background:#fff;color:#00802b;border:2px solid #00802b}
.btn-export:hover{background:#e6f9ee}

/* ADD FORM */
.add-form{background:#fff;border-radius:12px;padding:24px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:2px solid #06D0FF;display:none}
.add-form.visible{display:block}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-row select,.form-row input,.form-row textarea{padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-family:'Lato',sans-serif;font-size:14px;outline:none;flex:1;min-width:120px}
.form-row select:focus,.form-row input:focus,.form-row textarea:focus{border-color:#0033cc}
.form-row textarea{width:100%;min-height:70px;resize:vertical}
.form-actions{display:flex;gap:10px;justify-content:flex-end}

/* LOG TABLE */
.log-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.log-table th{background:#f5f6fa;padding:12px 16px;text-align:left;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#888;border-bottom:2px solid #e0e0e0}
.log-table td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:14px;vertical-align:top}
.log-table tr:hover{background:#f8f9ff}
.cat-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.cat-navigation{background:#e8f0ff;color:#0033cc}
.cat-design{background:#f3e8ff;color:#7700aa}
.cat-data{background:#e6f9ee;color:#00802b}
.cat-functionality{background:#fff8e1;color:#b38600}
.cat-content{background:#e0f7fa;color:#006064}
.cat-bugfix{background:#fde8e8;color:#cc0000}
.status-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.status-complete{background:#e6f9ee;color:#00802b}
.status-inprogress{background:#fff8e1;color:#b38600}
.status-planned{background:#e8f0ff;color:#0033cc}
.empty-state{text-align:center;padding:40px;color:#888;font-size:14px}
.stats-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:14px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:3px solid #0033cc;flex:1;min-width:120px}
.stat-card .num{font-size:24px;font-weight:900;color:#0033cc}
.stat-card .label{font-size:12px;color:#888;font-weight:700}

/* FOOTER */
.footer{background:linear-gradient(135deg,#0a0e5c,#001144);padding:24px;text-align:center}
.footer p{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px}
.footer small{color:rgba(255,255,255,0.3);font-size:11px;display:block;margin-top:6px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#00802b;color:#fff;padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:768px){
  .log-table{font-size:12px}
  .log-table th,.log-table td{padding:8px 10px}
  .header h1{font-size:18px}
}
</style>
</head>
<body>
<!-- AUTH GATE -->
<div id="nuAuthOverlay" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e5c,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF)">
<div style="background:#fff;border-radius:16px;padding:48px 40px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative;overflow:hidden">
<div style="position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0000FF,#06D0FF)"></div>
<div style="font-family:Lato,sans-serif;font-weight:900;font-size:22px;color:#0a0e5c;margin-bottom:4px">Norris Utilities&reg;</div>
<div style="font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px;margin-bottom:28px">A Legacy of Commitment&reg;</div>
<input type="password" id="nuAuthInput" placeholder="Enter password" autocomplete="off" autofocus style="width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:Lato,sans-serif;outline:none">
<button id="nuAuthBtn" style="width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer">ACCESS</button>
<div id="nuAuthErr" style="color:#cc0000;font-size:12px;margin-top:10px;min-height:18px;font-weight:700"></div>
</div></div>
<div id="nuAuthContent" style="display:none">



<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">Norris Utilities&reg;</div>
    <div class="login-sub">A Legacy of Commitment&reg;</div>
    <input type="password" class="login-input" id="loginInput" placeholder="Enter password" autocomplete="off" autofocus>
    <button class="login-btn" id="loginBtn">ACCESS LOG</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="portalContent" style="display:none">

<div class="header">
  <h1>Improvement Log &amp; Change Tracker</h1>
  <p>A Legacy of Commitment&reg;</p>
</div>
<div class="chevron"><svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,0 547,0 547,40 0,0" fill="#06D0FF" opacity="0.15"/><polygon points="0,0 547,40 1440,0" fill="#f5f6fa"/></svg></div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>
  <div class="toolbar" id="toolbar">
    <h2><span class="blue">Change</span> Log</h2>
    <input type="text" class="search-box" id="searchBox" placeholder="Search changes...">
    <select class="filter-sel" id="catFilter"><option value="all">All Categories</option></select>
    <select class="filter-sel" id="statusFilter"><option value="all">All Status</option><option value="Complete">Complete</option><option value="In Progress">In Progress</option><option value="Planned">Planned</option></select>
    <button class="btn btn-primary" id="addBtn">+ Add Entry</button>
    <button class="btn btn-export" id="exportBtn">Export</button>
  </div>

  <div class="add-form" id="addForm">
    <div class="form-row">
      <input type="date" id="formDate">
      <input type="text" id="formPhase" placeholder="Phase (e.g. Phase 1)">
      <select id="formCat"><option value="Navigation">Navigation</option><option value="Design">Design</option><option value="Data">Data</option><option value="Functionality">Functionality</option><option value="Content">Content</option><option value="Bug Fix">Bug Fix</option></select>
      <select id="formStatus"><option value="Complete">Complete</option><option value="In Progress">In Progress</option><option value="Planned">Planned</option></select>
    </div>
    <div class="form-row"><textarea id="formDesc" placeholder="Description of the change..."></textarea></div>
    <div class="form-actions">
      <button class="btn" style="background:#eee;color:#666" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save</button>
    </div>
  </div>

  <table class="log-table">
    <thead><tr><th>Date</th><th>Phase</th><th>Category</th><th>Description</th><th>Status</th></tr></thead>
    <tbody id="logBody"></tbody>
  </table>
</div>

<footer class="footer">
  <p>A Legacy of Commitment&reg;</p>
  <small>&copy; 2026 Norris Utilities, LLC &mdash; Aaron Only</small>
</footer>

<div class="toast" id="toast"></div>

</div><!-- /portalContent -->

<script>
(function(){
  /* PASSWORD */
  var o=document.getElementById('loginOverlay'),p=document.getElementById('portalContent'),
      i=document.getElementById('loginInput'),b=document.getElementById('loginBtn'),
      e=document.getElementById('loginError'),K='nu_implog_auth';
  if(sessionStorage.getItem(K)==='granted'){o.classList.add('hidden');p.style.display='block';init()}
  function doLogin(){
    if(i.value==='norris2026'){sessionStorage.setItem(K,'granted');o.classList.add('hidden');p.style.display='block';init()}
    else{i.classList.add('error');e.textContent='Access Denied.';setTimeout(function(){i.classList.remove('error')},500)}
  }
  b.addEventListener('click',doLogin);
  i.addEventListener('keydown',function(ev){if(ev.key==='Enter')doLogin()});

  var STORE='nu_improvement_log';
  var CATEGORIES=['Navigation','Design','Data','Functionality','Content','Bug Fix'];

  // Pre-populated entries from today's build
  var DEFAULT_ENTRIES=[
    {date:'2026-04-07',phase:'Phase 1',category:'Navigation',description:'Global navigation bar injected into all 69 portal pages. Dark navy fixed bar with role-based links, active page cyan highlighting.',status:'Complete'},
    {date:'2026-04-07',phase:'Phase 2',category:'Content',description:'Team page updated: Claude (Deep Reasoning, purple glow) and MK Smith (Creative Director, paint trail) added. 17 total members. Key 7 highlighted first in order.',status:'Complete'},
    {date:'2026-04-07',phase:'Phase 3',category:'Functionality',description:'Celebrations enhanced: toast notifications with random messages, subtle ding sound via Web Audio API. 7 celebration types verified working.',status:'Complete'},
    {date:'2026-04-07',phase:'Phase 4',category:'Design',description:'SVG brand assets created: logo-text.svg, phoenix-icon.svg, tagline.svg in /assets/ directory.',status:'Complete'},
    {date:'2026-04-07',phase:'Phase 5',category:'Data',description:'Document management system: docs/ directory structure (guides, templates, reports, specs), manifest.json for auto-linking, README with instructions.',status:'Complete'},
    {date:'2026-04-07',phase:'Phase 6',category:'Functionality',description:'Improvement log and change tracker built at /internal/improvement_log.html. Searchable, filterable, exportable.',status:'Complete'},
    {date:'2026-04-07',phase:'Phase 7',category:'Design',description:'Google Fonts CDN verified on all pages. Lato (400/700/900) + Playfair Display italic loaded everywhere.',status:'Complete'},
    {date:'2026-04-07',phase:'Fix',category:'Bug Fix',description:'Password gate restored on telegram_log.html (legacy2026). Session storage auth with branded login.',status:'Complete'},
    {date:'2026-04-07',phase:'Fix',category:'Bug Fix',description:'EOD recap double tag fixed: was "EOD — EOD Recap — Monday" now "EOD — Monday, April 7, 2026".',status:'Complete'},
    {date:'2026-04-07',phase:'Fix',category:'Design',description:'Pricing Tools quick link icon changed from barely-visible money sign to calculator emoji for clarity.',status:'Complete'},
    {date:'2026-04-07',phase:'Fix',category:'Data',description:'Portal data sync verified: telegram_log.json, team_status.json, remarkable_organized.json all syncing correctly.',status:'Complete'},
    {date:'2026-04-06',phase:'Launch',category:'Functionality',description:'Ops portal live on GitHub Pages at ops.norrisutilities.com. Full deployment verified.',status:'Complete'},
  ];

  function loadEntries(){
    try{
      var d=JSON.parse(localStorage.getItem(STORE));
      if(d && d.length) return d;
    }catch(e){}
    // First load — seed with defaults
    localStorage.setItem(STORE,JSON.stringify(DEFAULT_ENTRIES));
    return DEFAULT_ENTRIES;
  }
  function saveEntries(entries){localStorage.setItem(STORE,JSON.stringify(entries))}

  function render(){
    var entries=loadEntries();
    var q=document.getElementById('searchBox').value.toLowerCase();
    var catF=document.getElementById('catFilter').value;
    var statF=document.getElementById('statusFilter').value;

    var filtered=entries.filter(function(e){
      if(catF!=='all' && e.category!==catF) return false;
      if(statF!=='all' && e.status!==statF) return false;
      if(q){
        var text=(e.description+' '+e.phase+' '+e.category+' '+e.date).toLowerCase();
        if(!text.includes(q)) return false;
      }
      return true;
    });

    // Stats
    var total=entries.length;
    var complete=entries.filter(function(e){return e.status==='Complete'}).length;
    var inprog=entries.filter(function(e){return e.status==='In Progress'}).length;
    var planned=entries.filter(function(e){return e.status==='Planned'}).length;
    document.getElementById('statsRow').innerHTML=
      '<div class="stat-card"><div class="num">'+total+'</div><div class="label">Total Changes</div></div>'+
      '<div class="stat-card"><div class="num" style="color:#00802b">'+complete+'</div><div class="label">Complete</div></div>'+
      '<div class="stat-card"><div class="num" style="color:#b38600">'+inprog+'</div><div class="label">In Progress</div></div>'+
      '<div class="stat-card"><div class="num" style="color:#0033cc">'+planned+'</div><div class="label">Planned</div></div>';

    // Table
    var body=document.getElementById('logBody');
    if(filtered.length===0){
      body.innerHTML='<tr><td colspan="5" class="empty-state">No entries match your filters.</td></tr>';
      return;
    }
    var html='';
    filtered.forEach(function(e){
      var catCls='cat-'+e.category.toLowerCase().replace(' ','');
      var statCls='status-'+e.status.toLowerCase().replace(' ','');
      html+='<tr>';
      html+='<td style="white-space:nowrap;font-weight:700;font-size:13px">'+esc(e.date)+'</td>';
      html+='<td style="font-weight:700;font-size:13px;color:#0033cc">'+esc(e.phase)+'</td>';
      html+='<td><span class="cat-badge '+catCls+'">'+esc(e.category)+'</span></td>';
      html+='<td>'+esc(e.description)+'</td>';
      html+='<td><span class="status-badge '+statCls+'">'+esc(e.status)+'</span></td>';
      html+='</tr>';
    });
    body.innerHTML=html;
  }

  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function toast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show')},2500);
  }

  function init(){
    // Populate category filter
    var cf=document.getElementById('catFilter');
    CATEGORIES.forEach(function(c){
      var o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o);
    });

    // Set default date
    document.getElementById('formDate').value=new Date().toISOString().slice(0,10);

    // Event listeners
    document.getElementById('searchBox').addEventListener('input',render);
    document.getElementById('catFilter').addEventListener('change',render);
    document.getElementById('statusFilter').addEventListener('change',render);

    document.getElementById('addBtn').addEventListener('click',function(){
      document.getElementById('addForm').classList.toggle('visible');
    });
    document.getElementById('cancelBtn').addEventListener('click',function(){
      document.getElementById('addForm').classList.remove('visible');
    });
    document.getElementById('saveBtn').addEventListener('click',function(){
      var desc=document.getElementById('formDesc').value.trim();
      if(!desc) return;
      var entries=loadEntries();
      entries.unshift({
        date:document.getElementById('formDate').value,
        phase:document.getElementById('formPhase').value||'Manual',
        category:document.getElementById('formCat').value,
        description:desc,
        status:document.getElementById('formStatus').value
      });
      saveEntries(entries);
      document.getElementById('addForm').classList.remove('visible');
      document.getElementById('formDesc').value='';
      document.getElementById('formPhase').value='';
      render();
      toast('Entry added');
    });

    document.getElementById('exportBtn').addEventListener('click',function(){
      var entries=loadEntries();
      var lines=['NORRIS UTILITIES IMPROVEMENT LOG','Exported: '+new Date().toLocaleString(),''];
      entries.forEach(function(e){
        lines.push('['+e.status+'] '+e.date+' | '+e.phase+' | '+e.category+' | '+e.description);
      });
      navigator.clipboard.writeText(lines.join('\n')).then(function(){toast('Copied to clipboard')});
    });

    render();
  }
})();
</script>
<script src="/components/nav.js"></script>

</div><!-- /nuAuthContent -->
<script>
(function(){var K='nu_auth_2026',o=document.getElementById('nuAuthOverlay'),c=document.getElementById('nuAuthContent'),i=document.getElementById('nuAuthInput'),b=document.getElementById('nuAuthBtn'),e=document.getElementById('nuAuthErr');
if(sessionStorage.getItem(K)==='granted'){o.style.display='none';c.style.display='block';return}
function a(){var pw=i.value,role=null;if(pw==='norris2026')role='aaron';else if(pw==='legacy2026')role='cb';
if(role){sessionStorage.setItem(K,'granted');sessionStorage.setItem('nu_role',role);o.style.display='none';c.style.display='block'}else{e.textContent='Access Denied';i.style.borderColor='#cc0000';setTimeout(function(){i.style.borderColor=''},500)}}
b.addEventListener('click',a);i.addEventListener('keydown',function(ev){if(ev.key==='Enter')a()})})();
</script>

</body>
</html>
