<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexPro Armor Bucket Covers — Norris Utilities, LLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/brand.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
    }

    /* ============================================================
       HEADER / HERO
    ============================================================ */
    .site-header {
      position: relative;
      background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
      overflow: hidden;
      padding: 0;
    }

    /* Infrastructure SVG overlay */
    .header-svg-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Top nav bar */
    .top-bar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 48px 18px;
    }

    .logo-wrap img {
      height: 68px;
      width: auto;
      display: block;
    }

    .top-bar-tagline {
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-align: right;
    }
    .top-bar-tagline strong {
      color: #fff;
      font-weight: 700;
    }

    /* Hero content */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 52px 32px 80px;
    }

    .hero-eyebrow {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 18px;
      margin-bottom: 22px;
    }

    .hero-title {
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 2px 24px rgba(0,0,0,0.18);
    }

    .hero-subtitle {
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: 20px;
    }

    .hero-tagline {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.06em;
      margin-bottom: 36px;
    }

    .btn-primary {
      display: inline-block;
      background: #0000FF;
      color: #fff;
      font-family: 'Lato', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 15px 40px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }
    .btn-primary:hover {
      background: rgba(0,0,200,0.9);
      border-color: rgba(255,255,255,0.7);
      transform: translateY(-1px);
    }

    .btn-outline {
      display: inline-block;
      background: transparent;
      color: #0000FF;
      font-family: 'Lato', Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 11px 28px;
      border-radius: 4px;
      border: 2px solid #0000FF;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .btn-outline:hover {
      background: #0000FF;
      color: #fff;
      transform: translateY(-1px);
    }

    /* ============================================================
       CHEVRON TRANSITION
    ============================================================ */
    .chevron-divider {
      display: block;
      width: 100%;
      margin-top: -2px;
      line-height: 0;
    }
    .chevron-divider svg {
      display: block;
      width: 100%;
    }

    /* ============================================================
       BODY SECTIONS
    ============================================================ */
    .section {
      padding: 72px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 30px;
      font-weight: 900;
      color: #0000FF;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .section-rule {
      width: 56px;
      height: 4px;
      background: linear-gradient(90deg, #0000FF, #06D0FF);
      border-radius: 2px;
      margin-bottom: 36px;
    }

    /* ============================================================
       PRODUCT GRID
    ============================================================ */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    .product-card {
      background: #fff;
      border: 1px solid #e8ecf4;
      border-radius: 8px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 16px rgba(0,0,200,0.06);
      transition: box-shadow 0.2s, transform 0.18s;
    }
    .product-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,200,0.13);
      transform: translateY(-3px);
    }

    .sku-badge {
      display: inline-block;
      background: linear-gradient(90deg, #0000FF, #06D0FF);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 11px;
      border-radius: 3px;
      margin-bottom: 14px;
      align-self: flex-start;
    }

    .product-name {
      font-size: 17px;
      font-weight: 900;
      color: #111;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .product-dims {
      font-size: 22px;
      font-weight: 700;
      color: #0000FF;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .product-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.55;
      margin-bottom: 14px;
      flex-grow: 1;
    }

    .made-in-usa {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f4ff;
      border: 1px solid #c8d4ff;
      border-radius: 4px;
      color: #0000FF;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 11px;
      margin-bottom: 18px;
      align-self: flex-start;
    }
    .made-in-usa svg {
      flex-shrink: 0;
    }

    .product-price {
      font-size: 13px;
      color: #888;
      font-weight: 400;
      margin-bottom: 16px;
    }
    .product-price span {
      font-weight: 700;
      color: #333;
    }

    .card-footer {
      margin-top: auto;
    }
    .card-footer .btn-outline {
      width: 100%;
      text-align: center;
    }

    /* ============================================================
       WHY SECTION
    ============================================================ */
    .why-section {
      background: linear-gradient(135deg, #f4f7ff 0%, #eef6ff 100%);
      padding: 72px 0;
    }
    .why-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px;
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      margin-top: 8px;
    }

    .why-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dde6ff;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 1px 8px rgba(0,0,200,0.06);
    }

    .why-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0000FF, #06D0FF);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .why-icon svg {
      fill: #fff;
    }

    .why-title {
      font-size: 15px;
      font-weight: 900;
      color: #0000FF;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .why-text {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }

    /* ============================================================
       QUOTE FORM SECTION
    ============================================================ */
    .form-section {
      padding: 72px 48px;
      max-width: 860px;
      margin: 0 auto;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      color: #444;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      font-family: 'Lato', Arial, sans-serif;
      font-size: 14px;
      color: #222;
      padding: 11px 14px;
      border: 1.5px solid #d0d8ef;
      border-radius: 4px;
      background: #f9faff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #0000FF;
      box-shadow: 0 0 0 3px rgba(0,0,255,0.08);
      background: #fff;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 110px;
    }

    .form-note {
      font-size: 11px;
      color: #aaa;
      margin-top: 12px;
    }

    .form-submit-wrap {
      margin-top: 28px;
    }
    .btn-submit {
      display: inline-block;
      background: linear-gradient(90deg, #0000FF, #06D0FF);
      color: #fff;
      font-family: 'Lato', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 15px 48px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,200,0.2);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .site-footer {
      background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
      padding: 48px 48px 32px;
      text-align: center;
      position: relative;
    }

    .footer-chevron {
      display: block;
      width: 100%;
      line-height: 0;
      margin-bottom: 0;
    }
    .footer-chevron svg {
      display: block;
      width: 100%;
    }

    .footer-logo img {
      height: 52px;
      width: auto;
      margin: 0 auto 14px;
      display: block;
      opacity: 0.92;
    }

    .footer-tagline {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .footer-tagline strong {
      color: #fff;
    }

    .footer-copy {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .footer-divider {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 1px;
      margin: 18px auto;
    }

    /* ============================================================
       SECTION WRAPPER FOR FULL-BLEED
    ============================================================ */
    .full-bleed { width: 100%; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 768px) {
      .top-bar { padding: 18px 24px 14px; flex-direction: column; gap: 12px; text-align: center; }
      .hero-content { padding: 40px 20px 64px; }
      .section { padding: 52px 24px; }
      .form-section { padding: 52px 24px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .why-inner { padding: 0 24px; }
      .site-footer { padding: 36px 24px 24px; }
      .top-bar-tagline { text-align: center; }
    }

    @media (max-width: 480px) {
      .product-grid { grid-template-columns: 1fr; }
      .why-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
