<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB Onboarding Document — Norris Utilities®</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap');
<link rel="stylesheet" href="/css/brand.css">

    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, #0a0e5c 0%, #0033cc 30%, #0066ee 60%, #00aaff 85%, #06D0FF 100%);
      padding: 60px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 300px;
    }
    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }
    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }
    .nu-header * { position: relative; z-index: 2; }

    .nu-header-badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--nu-cyan);
      margin-bottom: 24px;
    }

    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .nu-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .nu-header-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 2rem;
      color: var(--nu-white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 16px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .nu-header-subtitle {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 1rem;
      color: rgba(255,255,255,0.85);
      margin-top: 8px;
    }

    /* ══ CHEVRON ══ */
    .nu-chevron {
      position: relative;
      height: 50px;
      margin-top: -50px;
      z-index: 10;
    }
    .nu-chevron svg {
      width: 100%;
      height: 50px;
      display: block;
    }

    /* ══ CONTENT AREA ══ */
    .nu-content-area {
      position: relative;
      background: var(--nu-white);
    }
    .nu-content-area::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 65%;
      height: 65%;
      background: radial-gradient(circle, rgba(0,0,255,0.018) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    .nu-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 40px 80px;
    }

    /* ══ TABLE OF CONTENTS ══ */
    .toc {
      background: var(--nu-light-gray);
      border-radius: 12px;
      padding: 32px 36px;
      margin-bottom: 56px;
      border-left: 4px solid var(--nu-blue);
    }
    .toc-title {
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--nu-dark-text);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
    .toc ol {
      list-style: none;
      counter-reset: toc-counter;
      padding: 0;
    }
    .toc li {
      counter-increment: toc-counter;
      margin-bottom: 8px;
    }
    .toc li a {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--nu-body-text);
      font-weight: 400;
      font-size: 0.95rem;
      padding: 6px 0;
      transition: color 0.2s;
    }
    .toc li a:hover { color: var(--nu-blue); }
    .toc li a::before {
      content: counter(toc-counter);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--nu-blue);
      color: var(--nu-white);
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.8rem;
      margin-right: 14px;
      flex-shrink: 0;
    }

    /* ══ SECTION HEADERS ══ */
    .nu-section {
      margin-bottom: 56px;
    }
    .nu-section-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--nu-medium-gray);
    }
    .nu-section-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033cc 100%);
      color: var(--nu-white);
      border-radius: 10px;
      font-weight: 900;
      font-size: 1.2rem;
      margin-right: 16px;
      flex-shrink: 0;
    }
    .nu-section-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--nu-blue);
      line-height: 1.3;
    }
    .nu-section-title span {
      color: var(--nu-dark-text);
      font-weight: 700;
    }

    /* ══ CARDS ══ */
    .nu-card {
      background: var(--nu-white);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
      margin-bottom: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .nu-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    }
    .nu-card h3 {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--nu-dark-text);
      margin-bottom: 12px;
    }
    .nu-card p, .nu-card li {
      font-size: 0.92rem;
      color: var(--nu-body-text);
      line-height: 1.7;
    }

    /* ══ STEP LIST ══ */
    .step-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .step-item {
      display: flex;
      align-items: flex-start;
      padding: 20px 0;
      border-bottom: 1px solid var(--nu-medium-gray);
    }
    .step-item:last-child { border-bottom: none; }
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #0a0e5c, #0033cc);
      color: var(--nu-white);
      border-radius: 50%;
      font-weight: 900;
      font-size: 0.85rem;
      margin-right: 16px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .step-content h4 {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--nu-dark-text);
      margin-bottom: 4px;
    }
    .step-content p {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.6;
    }

    /* ══ INFO BOX ══ */
    .info-box {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
      border-left: 4px solid var(--nu-blue);
      border-radius: 0 8px 8px 0;
      padding: 20px 24px;
      margin: 20px 0;
    }
    .info-box p {
      font-size: 0.9rem;
      color: var(--nu-dark-text);
    }
    .info-box strong {
      color: var(--nu-blue);
    }

    /* ══ WARNING BOX ══ */
    .warning-box {
      background: linear-gradient(135deg, #fff5f5 0%, #ffe8e8 100%);
      border-left: 4px solid #cc0000;
      border-radius: 0 8px 8px 0;
      padding: 20px 24px;
      margin: 20px 0;
    }
    .warning-box .warning-title {
      font-weight: 900;
      font-size: 0.95rem;
      color: #cc0000;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .warning-box p, .warning-box li {
      font-size: 0.9rem;
      color: #4a1a1a;
      line-height: 1.7;
    }
    .warning-box ul {
      margin: 8px 0 0 20px;
    }

    /* ══ CONTACTS TABLE ══ */
    .contacts-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    .contacts-table thead th {
      background: linear-gradient(135deg, #0a0e5c, #0033cc);
      color: var(--nu-white);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 12px 16px;
      text-align: left;
    }
    .contacts-table thead th:first-child { border-radius: 8px 0 0 0; }
    .contacts-table thead th:last-child { border-radius: 0 8px 0 0; }
    .contacts-table tbody td {
      padding: 12px 16px;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--nu-medium-gray);
      color: var(--nu-body-text);
    }
    .contacts-table tbody tr:nth-child(even) td {
      background: var(--nu-light-gray);
    }
    .contacts-table tbody tr:hover td {
      background: #e8f0ff;
    }
    .contacts-table a {
      color: var(--nu-blue);
      text-decoration: none;
    }
    .contacts-table a:hover { text-decoration: underline; }

    /* ══ FOLDER TREE ══ */
    .folder-tree {
      font-family: 'Lato', monospace;
      font-size: 0.88rem;
      line-height: 2;
      padding: 20px 24px;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 10px;
      overflow-x: auto;
    }
    .folder-tree .folder {
      color: var(--nu-cyan);
      font-weight: 700;
    }
    .folder-tree .file {
      color: #aaa;
      font-weight: 400;
    }
    .folder-tree .indent { margin-left: 24px; }
    .folder-tree .indent2 { margin-left: 48px; }

    /* ══ BADGE PILL ══ */
    .badge-pill {
      display: inline-block;
      background: var(--nu-blue);
      color: var(--nu-white);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      vertical-align: middle;
      margin-left: 6px;
    }
    .badge-pill.cyan {
      background: var(--nu-cyan);
      color: var(--nu-navy);
    }
    .badge-pill.red {
      background: #cc0000;
      color: var(--nu-white);
    }

    /* ══ CHECKLIST ══ */
    .checklist {
      list-style: none;
      padding: 0;
    }
    .checklist li {
      display: flex;
      align-items: flex-start;
      padding: 8px 0;
      font-size: 0.92rem;
    }
    .checklist li::before {
      content: '☐';
      font-size: 1.1rem;
      margin-right: 12px;
      color: var(--nu-blue);
      flex-shrink: 0;
    }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 48px 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.2rem;
      color: var(--nu-cyan);
      margin-bottom: 16px;
    }
    .nu-footer-contact {
      font-size: 0.88rem;
      line-height: 2;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }
    .nu-footer-contact a:hover { text-decoration: underline; }
    .nu-footer-legal {
      margin-top: 20px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 240px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .nu-header-title { font-size: 1.4rem; }
      .nu-container { padding: 40px 20px 60px; }
      .nu-section-title { font-size: 1.2rem; }
      .contacts-table { font-size: 0.8rem; }
      .contacts-table thead th, .contacts-table tbody td { padding: 8px 10px; }
      .step-item { flex-direction: column; }
      .step-number { margin-bottom: 8px; }
    }

    @media print {
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nu-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nu-section { break-inside: avoid; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
