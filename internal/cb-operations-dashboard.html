<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Dashboard — Caroline Butler | Norris Utilities®</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap');
<link rel="stylesheet" href="/css/brand.css">

:root {
  --nu-blue: #0000FF;
  --nu-cyan: #06D0FF;
  --nu-navy: #000033;
  --nu-white: #FFFFFF;
  --nu-light-gray: #F5F5F7;
  --nu-medium-gray: #E8E8EC;
  --nu-dark-text: #1A1A2E;
  --nu-body-text: #333333;
  --nu-accent-gold: #C9A84C;
  --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-primary);
  color: var(--nu-body-text);
  background: var(--nu-white);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ══ HEADER ══ */
.nu-header {
  position: relative;
  background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
  padding: 60px 40px 80px;
  text-align: center;
  overflow: hidden;
  min-height: 280px;
}

.nu-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
  background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
  z-index: 1;
  opacity: 0.6;
}

.nu-header::after {
  content: '';
  position: absolute;
  top: -50%; right: -20%;
  width: 80%; height: 200%;
  background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
  z-index: 1;
}

.nu-header * { position: relative; z-index: 2; }

.nu-phoenix-icon {
  width: 80px;
  height: 80px;
  margin: 0 auto 16px;
  fill: var(--nu-white);
  filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
}

.nu-logo-text {
  font-family: var(--font-primary);
  font-weight: 900;
  font-size: 3.2rem;
  color: var(--nu-white);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-bottom: 4px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.nu-logo-subtitle {
  font-family: var(--font-primary);
  font-weight: 900;
  font-size: 1.4rem;
  color: var(--nu-white);
  letter-spacing: 0.8em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.nu-tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.3rem;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.05em;
  margin-bottom: 16px;
}

.nu-page-title {
  font-family: var(--font-primary);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--nu-cyan);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: rgba(0,0,0,0.15);
  display: inline-block;
  padding: 8px 24px;
  border-radius: 4px;
  margin-top: 8px;
}

/* ══ CHEVRON ══ */
.nu-chevron {
  position: relative;
  height: 50px;
  margin-top: -50px;
  z-index: 10;
}
.nu-chevron svg {
  width: 100%;
  height: 50px;
  display: block;
}

/* ══ CONTENT AREA ══ */
.nu-content-area {
  position: relative;
  background: var(--nu-white);
}
.nu-content-area::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 0;
}
.nu-content-area > * { position: relative; z-index: 1; }

.content-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 40px;
}

/* ══ SECTION HEADERS ══ */
.nu-section-title {
  font-family: var(--font-primary);
  font-weight: 900;
  font-size: 1.5rem;
  color: var(--nu-blue);
  margin-bottom: 8px;
}
.nu-section-title span {
  color: var(--nu-dark-text);
  font-weight: 700;
}

/* ══ STATUS BAR ══ */
.status-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 48px;
}

.status-card {
  background: var(--nu-white);
  border-radius: 8px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border: 1px solid var(--nu-medium-gray);
  text-align: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.status-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

.status-number {
  font-family: var(--font-primary);
  font-weight: 900;
  font-size: 2.4rem;
  color: var(--nu-blue);
  line-height: 1;
  margin-bottom: 6px;
}
.status-number.green { color: #22c55e; }
.status-number.amber { color: #f59e0b; }
.status-number.red { color: #ef4444; }

.status-label {
  font-family: var(--font-primary);
  font-weight: 700;
  font-size: 0.8rem;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ══ DASHBOARD GRID ══ */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-bottom: 48px;
}

.dash-panel {
  background: var(--nu-white);
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border: 1px solid var(--nu-medium-gray);
  overflow: hidden;
}

.panel-header {
  background: var(--nu-light-gray);
  padding: 16px 24px;
  border-bottom: 2px solid var(--nu-blue);
  display: flex;
  align-items: center;
  gap: 10px;
}

.panel-header-icon {
  width: 22px;
  height: 22px;
  fill: var(--nu-blue);
  flex-shrink: 0;
}

.panel-header h3 {
  font-family: var(--font-primary);
  font-weight: 900;
  font-size: 0.95rem;
  color: var(--nu-dark-text);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.panel-body {
  padding: 24px;
}

/* ══ TASK LIST ══ */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--nu-medium-gray);
}
.task-item:last-child { border-bottom: none; }

.task-checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid var(--nu-blue);
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  margin-top: 2px;
}
.task-checkbox:hover {
  background: rgba(0, 0, 255, 0.08);
}
.task-checkbox.checked {
  background: var(--nu-blue);
  border-color: var(--nu-blue);
}
.task-checkbox.checked::after {
  content: '';
  width: 6px;
  height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}

.task-content {
  flex: 1;
}
.task-title {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--nu-dark-text);
  line-height: 1.4;
}
.task-item.completed .task-title {
  text-decoration: line-through;
  color: #999;
}
.task-meta {
  font-size: 0.8rem;
  color: #888;
  margin-top: 2px;
}

.task-priority {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  margin-top: 2px;
}
.priority-high { background: #fef2f2; color: #dc2626; }
.priority-medium { background: #fffbeb; color: #d97706; }
.priority-normal { background: #f0f9ff; color: #0369a1; }

/* ══ SHIPPING TABLE ══ */
.ship-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}
.ship-table th {
  text-align: left;
  font-weight: 700;
  font-size: 0.75rem;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 8px 12px;
  border-bottom: 2px solid var(--nu-medium-gray);
}
.ship-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--nu-medium-gray);
  vertical-align: top;
}
.ship-table tr:last-child td { border-bottom: none; }

.ship-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 700;
}
.ship-pending { background: #fffbeb; color: #92400e; }
.ship-shipped { background: #ecfdf5; color: #065f46; }
.ship-processing { background: #eff6ff; color: #1e40af; }

/* ══ INVOICE LIST ══ */
.invoice-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--nu-medium-gray);
}
.invoice-item:last-child { border-bottom: none; }

.invoice-customer {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--nu-dark-text);
}
.invoice-detail {
  font-size: 0.8rem;
  color: #888;
  margin-top: 2px;
}
.invoice-amount {
  font-weight: 900;
  font-size: 1.1rem;
  color: var(--nu-blue);
  text-align: right;
}
.invoice-due {
  font-size: 0.75rem;
  color: #dc2626;
  font-weight: 700;
  text-align: right;
}

/* ══ INBOX MONITOR ══ */
.inbox-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--nu-medium-gray);
}
.inbox-row:last-child { border-bottom: none; }

.inbox-source {
  display: flex;
  align-items: center;
  gap: 10px;
}
.inbox-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-green { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.dot-amber { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.4); }

.inbox-label {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--nu-dark-text);
}
.inbox-sub {
  font-size: 0.8rem;
  color: #888;
}
.inbox-count {
  font-weight: 900;
  font-size: 1.4rem;
  color: var(--nu-blue);
}

/* ══ FULL-WIDTH PANEL ══ */
.full-width-panel {
  margin-bottom: 48px;
}

/* ══ QUICK ACTIONS ══ */
.quick-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.nu-btn-primary {
  display: inline-block;
  background: var(--nu-blue);
  color: var(--nu-white);
  padding: 12px 28px;
  border: none;
  border-radius: 4px;
  font-family: var(--font-primary);
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
}
.nu-btn-primary:hover {
  background: #0000CC;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(0,0,255,0.3);
}

.nu-btn-secondary {
  display: inline-block;
  background: transparent;
  color: var(--nu-blue);
  padding: 12px 28px;
  border: 2px solid var(--nu-blue);
  border-radius: 4px;
  font-family: var(--font-primary);
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
}
.nu-btn-secondary:hover {
  background: var(--nu-blue);
  color: var(--nu-white);
}

/* ══ FOOTER ══ */
.nu-footer {
  background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
  color: rgba(255,255,255,0.8);
  padding: 40px;
  text-align: center;
  font-family: var(--font-primary);
}
.nu-footer-tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.1rem;
  color: var(--nu-cyan);
  margin-bottom: 12px;
}
.nu-footer-contact {
  font-size: 0.9rem;
  line-height: 1.8;
}
.nu-footer-contact a {
  color: var(--nu-cyan);
  text-decoration: none;
}

/* ══ RESPONSIVE ══ */
@media (max-width: 768px) {
  .nu-header { padding: 40px 20px 60px; min-height: 200px; }
  .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
  .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
  .nu-tagline { font-size: 1rem; }
  .status-bar { grid-template-columns: repeat(2, 1fr); }
  .dashboard-grid { grid-template-columns: 1fr; }
  .content-wrapper { padding: 40px 20px; }
  .ship-table { font-size: 0.8rem; }
  .ship-table th, .ship-table td { padding: 8px 6px; }
  .quick-actions { flex-direction: column; }
  .nu-btn-primary, .nu-btn-secondary { text-align: center; }
}

@media (max-width: 480px) {
  .status-bar { grid-template-columns: 1fr; }
  .nu-page-title { font-size: 0.85rem; padding: 6px 16px; }
}

/* ══ PRINT ══ */
@media print {
  .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .dash-panel { box-shadow: none; border: 1px solid #ccc; }
  .status-card { box-shadow: none; border: 1px solid #ccc; }
  .task-checkbox { print-color-adjust: exact; }
}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

<script src="/celebrations.js"></script>
</body>
</html>
