<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS Expense Report — Bay Shore Systems | Norris Utilities LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: #f0f4ff;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ─── HEADER ─────────────────────────────────────────────── */
  .header {
    position: relative;
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    min-height: 260px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 40px 80px;
  }

  /* Ghost Phoenix Watermark */
  .phoenix-watermark {
    position: absolute;
    right: -20px;
    top: -30px;
    font-size: 340px;
    opacity: 0.07;
    line-height: 1;
    pointer-events: none;
    user-select: none;
    filter: grayscale(1) brightness(10);
  }

  /* Power Tower SVG Overlay */
  .tower-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    opacity: 0.10;
    pointer-events: none;
  }

  .header-content {
    position: relative;
    z-index: 2;
  }

  .header-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  .header h1 {
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .header h2 {
    font-size: clamp(13px, 2.5vw, 18px);
    font-weight: 300;
    color: rgba(255,255,255,0.88);
    letter-spacing: 1.5px;
    margin-bottom: 20px;
  }

  .header-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 10px;
  }

  .meta-chip {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.30);
    border-radius: 8px;
    padding: 7px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .meta-chip span {
    font-weight: 300;
    opacity: 0.85;
    margin-left: 6px;
  }

  /* ─── CHEVRON DIVIDER ─────────────────────────────────────── */
  .chevron-divider {
    width: 100%;
    height: 60px;
    background: #f0f4ff;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    margin-top: -1px;
  }

  /* ─── MAIN CONTENT ────────────────────────────────────────── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ─── SUMMARY STATS ────────────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
    margin-top: -10px;
  }

  .stat-card {
    background: #fff;
    border-radius: 14px;
    padding: 22px 18px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.09);
    border-top: 4px solid #0000FF;
    text-align: center;
    transition: transform 0.2s;
  }

  .stat-card:hover { transform: translateY(-3px); }
  .stat-card.accent { border-top-color: #06D0FF; }
  .stat-card.green  { border-top-color: #00c853; }
  .stat-card.orange { border-top-color: #ff6d00; }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0000FF;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 900;
    color: #1a1a2e;
    line-height: 1;
  }

  .stat-sub {
    font-size: 11px;
    color: #888;
    margin-top: 5px;
    font-weight: 300;
  }

  /* ─── SECTION ─────────────────────────────────────────────── */
  .section {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    margin-bottom: 28px;
    overflow: hidden;
  }

  .section-header {
    background: linear-gradient(90deg, #0000FF 0%, #06D0FF 100%);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title svg {
    width: 18px; height: 18px; fill: rgba(255,255,255,0.85);
  }

  .section-amount {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
  }

  .section-body {
    padding: 0;
    overflow-x: auto;
  }

  /* ─── TABLES ──────────────────────────────────────────────── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 560px;
  }

  thead tr {
    background: #f0f4ff;
  }

  thead th {
    padding: 11px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #0000FF;
    border-bottom: 2px solid #e0e8ff;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #f0f4ff;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #f8f9ff; }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 12px 16px;
    vertical-align: middle;
    color: #1a1a2e;
    line-height: 1.4;
  }

  td.amount {
    font-weight: 700;
    color: #0000FF;
    text-align: right;
    white-space: nowrap;
  }

  td.amount.negative { color: #d32f2f; }
  td.amount.positive { color: #00c853; }

  td.center { text-align: center; }
  td.right  { text-align: right; }

  .tfoot-row td {
    background: #f0f4ff;
    font-weight: 900;
    font-size: 14px;
    color: #0000FF;
    padding: 14px 16px;
    border-top: 2px solid #c0d0ff;
  }

  /* ─── STATUS BADGES ───────────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .badge-paid    { background: #e8f5e9; color: #2e7d32; }
  .badge-paid::before    { background: #2e7d32; }
  .badge-pending { background: #fff8e1; color: #f57f17; }
  .badge-pending::before { background: #f57f17; }
  .badge-due     { background: #fce4ec; color: #c62828; }
  .badge-due::before     { background: #c62828; }
  .badge-submitted { background: #e3f2fd; color: #1565c0; }
  .badge-submitted::before { background: #1565c0; }

  /* ─── X-SEPARATOR ─────────────────────────────────────────── */
  .x-separator {
    text-align: center;
    color: #06D0FF;
    font-size: 20px;
    opacity: 0.45;
    letter-spacing: 22px;
    margin: 26px 0;
  }

  /* ─── INFO GRID ───────────────────────────────────────────── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
  }

  .info-item {
    padding: 16px 24px;
    border-right: 1px solid #f0f4ff;
    border-bottom: 1px solid #f0f4ff;
  }

  .info-item:last-child { border-right: none; }

  .info-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #0000FF;
    margin-bottom: 5px;
  }

  .info-value {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .info-value.highlight {
    color: #0000FF;
    font-size: 16px;
  }

  /* ─── RECEIPTS SECTION ────────────────────────────────────── */
  .receipt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    padding: 20px;
  }

  .receipt-card {
    border: 2px dashed #c0d0ff;
    border-radius: 12px;
    padding: 18px;
    background: #f8f9ff;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s, background 0.2s;
  }

  .receipt-card:hover {
    border-color: #0000FF;
    background: #f0f4ff;
  }

  .receipt-card.attached {
    border-style: solid;
    border-color: #06D0FF;
    background: #f0fdff;
  }

  .receipt-icon {
    font-size: 28px;
    line-height: 1;
  }

  .receipt-name {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .receipt-detail {
    font-size: 11px;
    color: #666;
    font-weight: 300;
  }

  .receipt-amount {
    font-size: 15px;
    font-weight: 900;
    color: #0000FF;
    margin-top: 4px;
  }

  .receipt-status {
    margin-top: 4px;
  }

  /* ─── NOTES BOX ───────────────────────────────────────────── */
  .notes-box {
    padding: 20px 24px;
    border-top: 1px solid #f0f4ff;
  }

  .notes-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0000FF;
    margin-bottom: 10px;
  }

  .notes-text {
    font-size: 13px;
    color: #444;
    line-height: 1.7;
    font-weight: 300;
    padding: 14px;
    background: #f8f9ff;
    border-radius: 8px;
    border-left: 4px solid #06D0FF;
  }

  /* ─── SIGNATURE BLOCK ─────────────────────────────────────── */
  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 24px;
  }

  @media (max-width: 480px) {
    .sig-grid { grid-template-columns: 1fr; }
  }

  .sig-block {
    border-top: 2px solid #1a1a2e;
    padding-top: 10px;
  }

  .sig-name {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .sig-title {
    font-size: 11px;
    color: #666;
    font-weight: 300;
    margin-top: 3px;
  }

  /* ─── FOOTER ──────────────────────────────────────────────── */
  .footer {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    text-align: center;
    padding: 28px 20px;
    margin-top: 40px;
    position: relative;
    overflow: hidden;
  }

  .footer-brand {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .footer-tagline {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.8);
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .footer-contact {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .footer-contact a {
    color: rgba(255,255,255,0.9);
    text-decoration: none;
    font-weight: 700;
  }

  /* ─── PRINT BUTTON ────────────────────────────────────────── */
  .action-bar {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    max-width: 1100px;
    margin: 20px auto 0;
    padding: 0 20px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    color: #fff;
    box-shadow: 0 4px 14px rgba(0,0,255,0.3);
  }

  .btn-primary:hover {
    box-shadow: 0 6px 20px rgba(0,0,255,0.45);
    transform: translateY(-1px);
  }

  .btn-outline {
    background: #fff;
    color: #0000FF;
    border: 2px solid #0000FF;
  }

  .btn-outline:hover {
    background: #f0f4ff;
  }

  /* ─── PERIOD BANNER ───────────────────────────────────────── */
  .period-banner {
    background: linear-gradient(90deg, rgba(0,0,255,0.07), rgba(6,208,255,0.07));
    border: 1px solid rgba(0,0,255,0.12);
    border-radius: 10px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }

  .period-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0000FF;
  }

  .period-value {
    font-size: 18px;
    font-weight: 900;
    color: #1a1a2e;
    margin-top: 2px;
  }

  .period-right {
    text-align: right;
  }

  .period-report-num {
    font-size: 11px;
    color: #888;
    font-weight: 300;
  }

  .period-report-id {
    font-size: 18px;
    font-weight: 900;
    color: #0000FF;
    font-family: monospace;
  }

  @media print {
    .action-bar { display: none; }
    .footer { margin-top: 20px; }
    body { background: white; }
    .section { box-shadow: none; border: 1px solid #e0e8ff; }
    .stat-card { box-shadow: none; border: 1px solid #e0e8ff; }
  }

  @media (max-width: 600px) {
    .header { padding: 30px 20px 70px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .info-item { border-right: none; }
    .receipt-grid { grid-template-columns: 1fr; }
    .period-banner { flex-direction: column; gap: 6px; }
    .period-right { text-align: left; }
    td, th { padding: 9px 10px; }
  }
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>
