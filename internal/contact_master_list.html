<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norris Utilities — Contact Master List</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: #f0f2ff;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    min-height: 260px;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 40px 40px 80px;
  }

  /* Ghost phoenix watermark */
  .phoenix-watermark {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 320px;
    opacity: 0.07;
    line-height: 1;
    user-select: none;
    pointer-events: none;
    filter: brightness(10);
  }

  /* Power tower silhouette */
  .tower-silhouette {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    opacity: 0.10;
    pointer-events: none;
  }

  .header-content {
    position: relative;
    z-index: 2;
    flex: 1;
  }

  .header-eyebrow {
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-logo {
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .header-logo span {
    color: #06D0FF;
  }

  .header-tagline {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .header-tool-title {
    margin-top: 18px;
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-tool-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 24px;
    background: #06D0FF;
    border-radius: 2px;
  }

  .header-meta {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
  }

  /* Chevron divider */
  .chevron-divider {
    width: 100%;
    height: 60px;
    background: #f0f2ff;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    margin-top: -2px;
  }

  /* ── MAIN WRAPPER ── */
  .main-wrapper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    margin: -30px auto 30px;
    position: relative;
    z-index: 10;
  }

  .stat-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.10);
    padding: 20px 18px;
    text-align: center;
    border-top: 4px solid #0000FF;
    transition: transform 0.2s;
  }

  .stat-card:hover { transform: translateY(-3px); }
  .stat-card.cyan { border-top-color: #06D0FF; }

  .stat-number {
    font-size: 32px;
    font-weight: 900;
    color: #0000FF;
    line-height: 1;
  }

  .stat-card.cyan .stat-number { color: #06D0FF; }

  .stat-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #666;
    margin-top: 6px;
  }

  /* ── X SEPARATOR ── */
  .x-separator {
    text-align: center;
    color: #06D0FF;
    font-size: 20px;
    opacity: 0.45;
    letter-spacing: 18px;
    margin: 28px 0;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0000FF;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 16px;
    background: linear-gradient(180deg, #0000FF, #06D0FF);
    border-radius: 2px;
  }

  /* ── CONTROLS ── */
  .controls-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px;
    border: 2px solid #e0e4ff;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.2s;
    background: #fff;
  }

  .search-box:focus { border-color: #0000FF; }

  .filter-btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: 2px solid #e0e4ff;
    background: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: #0000FF;
    color: #0000FF;
    background: #f0f2ff;
  }

  .filter-btn.active { background: #0000FF; color: #fff; border-color: #0000FF; }

  .add-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.2s;
  }

  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* ── TABLE CARD ── */
  .table-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,255,0.08);
    overflow: hidden;
  }

  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }

  thead tr {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
  }

  thead th {
    padding: 14px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
  }

  thead th:first-child { padding-left: 20px; }

  tbody tr {
    border-bottom: 1px solid #f0f2ff;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #f8f9ff; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 14px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  tbody td:first-child { padding-left: 20px; }

  .contact-name {
    font-weight: 700;
    color: #1a1a2e;
    font-size: 14px;
  }

  .contact-role {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .company-name {
    font-weight: 700;
    color: #0000FF;
    font-size: 13px;
  }

  .company-type {
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
  }

  /* Tier badges */
  .tier-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .tier-strategic {
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    color: #fff;
  }

  .tier-partner {
    background: #e8f4ff;
    color: #0050cc;
    border: 1px solid #b3d4ff;
  }

  .tier-prospect {
    background: #fff3e0;
    color: #e65100;
    border: 1px solid #ffcc80;
  }

  .tier-vendor {
    background: #e8ffe8;
    color: #1b5e20;
    border: 1px solid #a5d6a7;
  }

  .tier-dormant {
    background: #f5f5f5;
    color: #757575;
    border: 1px solid #ddd;
  }

  /* Status dot */
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .dot-green { background: #22c55e; }
  .dot-yellow { background: #f59e0b; }
  .dot-red { background: #ef4444; }
  .dot-gray { background: #9ca3af; }

  .last-contact {
    font-size: 12px;
    color: #555;
  }

  .days-ago {
    font-size: 10px;
    color: #aaa;
    margin-top: 2px;
  }

  /* Next action badge */
  .action-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .action-call { background: #eff6ff; color: #1d4ed8; border-left: 3px solid #1d4ed8; }
  .action-email { background: #f0fdf4; color: #15803d; border-left: 3px solid #15803d; }
  .action-meeting { background: #fdf4ff; color: #7e22ce; border-left: 3px solid #7e22ce; }
  .action-proposal { background: #fff7ed; color: #c2410c; border-left: 3px solid #c2410c; }
  .action-followup { background: #fefce8; color: #854d0e; border-left: 3px solid #854d0e; }
  .action-nurture { background: #f1f5f9; color: #475569; border-left: 3px solid #475569; }

  .action-due {
    font-size: 10px;
    color: #aaa;
    margin-top: 3px;
  }

  .action-due.overdue { color: #ef4444; font-weight: 700; }

  /* Contact icons cell */
  .contact-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #e0e4ff;
    background: #f8f9ff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    text-decoration: none;
  }

  .icon-btn:hover { background: #0000FF; border-color: #0000FF; }

  /* Priority indicator */
  .priority-bar {
    display: flex;
    gap: 2px;
  }

  .priority-pip {
    width: 8px;
    height: 12px;
    border-radius: 2px;
    background: #e0e4ff;
  }

  .priority-pip.filled { background: #0000FF; }
  .priority-pip.filled.high { background: linear-gradient(135deg, #0000FF, #06D0FF); }

  /* ── DETAIL PANEL / QUICK VIEW ── */
  .detail-panel {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,255,0.08);
    padding: 28px;
    border-left: 4px solid #06D0FF;
    margin-top: 24px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 16px;
  }

  .detail-item label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 4px;
  }

  .detail-item p {
    font-size: 14px;
    color: #1a1a2e;
    font-weight: 400;
  }

  /* ── LEGEND ── */
  .legend-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,255,0.08);
    padding: 24px;
    margin-top: 24px;
  }

  .legend-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
  }

  /* ── FOOTER ── */
  .footer {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    color: #fff;
    text-align: center;
    padding: 28px 20px;
    margin-top: 50px;
  }

  .footer-logo {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .footer-tagline {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }

  .footer-contact {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 10px;
  }

  .footer-contact a { color: #fff; text-decoration: none; }

  .footer-copy {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 12px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .header { padding: 28px 20px 70px; }
    .main-wrapper { padding: 0 14px 40px; }
    .stats-bar { margin-top: -20px; grid-template-columns: repeat(2, 1fr); }
    .controls-row { flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; }
    .filter-btn, .add-btn { width: 100%; text-align: center; }
  }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat-number { font-size: 26px; }
  }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; }
    .add-btn, .controls-row, .icon-btn { display: none; }
    .table-card { box-shadow: none; border: 1px solid #ddd; }
  }

  /* ── HIGHLIGHT ROW ── */
  .row-highlight { background: linear-gradient(90deg, rgba(0,0,255,0.04) 0%, transparent 100%) !important; }

  .updated-label {
    font-size: 11px;
    color: #aaa;
    font-style: italic;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>
