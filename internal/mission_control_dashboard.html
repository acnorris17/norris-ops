<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Legacy Task Dashboard | Norris Utilities LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: #f8f9ff;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ─── HEADER ─────────────────────────────────────────── */
  .header {
    position: relative;
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    min-height: 280px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 40px 80px;
  }

  /* Ghost Phoenix Watermark */
  .header::before {
    content: '🔥';
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 420px;
    opacity: 0.055;
    pointer-events: none;
    line-height: 1;
    filter: grayscale(1) brightness(10);
  }

  /* Power Tower SVG Silhouette */
  .tower-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    opacity: 0.10;
    pointer-events: none;
  }

  .header-inner {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .header-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .brand-block {}

  .wordmark {
    font-size: 38px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }

  .tagline {
    font-size: 13px;
    font-weight: 300;
    color: #b8f0ff;
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .header-title-block {
    text-align: right;
  }

  .header-title-block h1 {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .header-title-block .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: #b8f0ff;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 20px;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #39ff14;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* Timestamp row */
  .header-meta {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .meta-chip {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 12px;
    font-weight: 400;
    padding: 5px 14px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }

  .meta-chip span {
    font-weight: 700;
    color: #b8f0ff;
  }

  /* ─── CHEVRON DIVIDER ─────────────────────────────────── */
  .chevron-divider {
    width: 100%;
    height: 60px;
    background: #f8f9ff;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    margin-top: -1px;
    position: relative;
    z-index: 3;
  }

  /* ─── MAIN CONTENT ────────────────────────────────────── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* ─── STAT BAR ────────────────────────────────────────── */
  .stat-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 36px;
  }

  .stat-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 20px 18px;
    border-top: 4px solid #0000FF;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,0,255,0.14);
  }

  .stat-card.cyan { border-top-color: #06D0FF; }
  .stat-card.green { border-top-color: #00c853; }
  .stat-card.orange { border-top-color: #ff6d00; }
  .stat-card.purple { border-top-color: #7c4dff; }

  .stat-num {
    font-size: 36px;
    font-weight: 900;
    color: #0000FF;
    line-height: 1;
  }

  .stat-card.cyan .stat-num { color: #06D0FF; }
  .stat-card.green .stat-num { color: #00c853; }
  .stat-card.orange .stat-num { color: #ff6d00; }
  .stat-card.purple .stat-num { color: #7c4dff; }

  .stat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #888;
    margin-top: 6px;
  }

  /* ─── X SEPARATOR ─────────────────────────────────────── */
  .x-separator {
    text-align: center;
    color: #06D0FF;
    font-size: 22px;
    opacity: 0.4;
    letter-spacing: 24px;
    margin: 28px 0;
  }

  /* ─── SECTION LABEL ───────────────────────────────────── */
  .section-label {
    color: #0000FF;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 13px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, #0000FF22, transparent);
    border-radius: 2px;
  }

  /* ─── ACTIVE NOW BANNER ───────────────────────────────── */
  .active-banner {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 30px;
    box-shadow: 0 6px 24px rgba(0,0,255,0.25);
    flex-wrap: wrap;
  }

  .active-banner-icon {
    font-size: 36px;
    flex-shrink: 0;
  }

  .active-banner-text h3 {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .active-banner-text p {
    font-size: 13px;
    color: #b8f0ff;
    margin-top: 3px;
    font-weight: 300;
  }

  .active-banner-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 6px 16px;
    border-radius: 20px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ─── TWO-COLUMN GRID ─────────────────────────────────── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 28px;
  }

  @media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
  }

  /* ─── TASK CARD ───────────────────────────────────────── */
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 22px;
    border-left: 4px solid #0000FF;
  }

  .card.cyan-border { border-left-color: #06D0FF; }
  .card.green-border { border-left-color: #00c853; }
  .card.orange-border { border-left-color: #ff6d00; }
  .card.full { grid-column: 1 / -1; }

  /* ─── TASK LIST ───────────────────────────────────────── */
  .task-list { list-style: none; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #f0f0f8;
  }

  .task-item:last-child { border-bottom: none; }

  .task-priority {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .priority-high { background: #ff1744; box-shadow: 0 0 6px #ff174466; }
  .priority-med  { background: #ff6d00; }
  .priority-low  { background: #00c853; }
  .priority-info { background: #06D0FF; }

  .task-content { flex: 1; }

  .task-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.3;
  }

  .task-title.done {
    text-decoration: line-through;
    color: #aaa;
    font-weight: 400;
  }

  .task-meta {
    font-size: 11px;
    color: #888;
    margin-top: 3px;
    font-weight: 300;
  }

  .task-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 9px;
    border-radius: 10px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .badge-active   { background: #e3f2fd; color: #0000FF; }
  .badge-pending  { background: #fff3e0; color: #ff6d00; }
  .badge-done     { background: #e8f5e9; color: #00c853; }
  .badge-blocked  { background: #fce4ec; color: #ff1744; }
  .badge-review   { background: #f3e5f5; color: #7c4dff; }
  .badge-draft    { background: #e0f7fa; color: #06D0FF; }

  /* ─── PIPELINE TABLE ──────────────────────────────────── */
  .pipeline-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .pipeline-table thead tr {
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    color: #fff;
  }

  .pipeline-table thead th {
    padding: 11px 14px;
    text-align: left;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .pipeline-table thead th:first-child { border-radius: 8px 0 0 0; }
  .pipeline-table thead th:last-child  { border-radius: 0 8px 0 0; }

  .pipeline-table tbody tr {
    transition: background 0.15s;
  }

  .pipeline-table tbody tr:nth-child(even) { background: #f8f9ff; }
  .pipeline-table tbody tr:hover { background: #eef0ff; }

  .pipeline-table td {
    padding: 11px 14px;
    border-bottom: 1px solid #e8e8f0;
    vertical-align: middle;
  }

  .pipeline-table td:first-child { font-weight: 700; color: #0000FF; }

  /* ─── PROGRESS BAR ────────────────────────────────────── */
  .progress-wrap {
    background: #f0f0f8;
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
    width: 100%;
    min-width: 80px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #0000FF, #06D0FF);
    transition: width 0.6s ease;
  }

  .progress-fill.done  { background: linear-gradient(90deg, #00c853, #69f0ae); }
  .progress-fill.warn  { background: linear-gradient(90deg, #ff6d00, #ffab40); }

  /* ─── CALENDAR STRIP ──────────────────────────────────── */
  .calendar-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
  }

  .cal-day {
    flex-shrink: 0;
    background: #f8f9ff;
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 64px;
  }

  .cal-day:hover { border-color: #06D0FF; background: #eef0ff; }

  .cal-day.today {
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    border-color: transparent;
    color: #fff;
  }

  .cal-day.has-event { border-color: #06D0FF; }

  .cal-day .day-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 4px;
  }

  .cal-day.today .day-name { color: #b8f0ff; }

  .cal-day .day-num {
    font-size: 20px;
    font-weight: 900;
    color: #0000FF;
    line-height: 1;
  }

  .cal-day.today .day-num { color: #fff; }

  .cal-day .day-dot {
    width: 6px;
    height: 6px;
    background: #06D0FF;
    border-radius: 50%;
    margin: 5px auto 0;
  }

  .cal-day.today .day-dot { background: #fff; }

  /* ─── NEXT ACTIONS ────────────────────────────────────── */
  .next-action-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    background: #f8f9ff;
    border-radius: 10px;
    margin-bottom: 10px;
    border-left: 3px solid #0000FF;
    transition: transform 0.15s;
  }

  .next-action-item:hover { transform: translateX(4px); }
  .next-action-item.cyan-border-l { border-left-color: #06D0FF; }
  .next-action-item.green-border-l { border-left-color: #00c853; }
  .next-action-item.orange-border-l { border-left-color: #ff6d00; }

  .action-icon { font-size: 22px; flex-shrink: 0; }

  .action-text { flex: 1; }
  .action-text strong {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
    display: block;
  }
  .action-text span {
    font-size: 11px;
    color: #888;
    font-weight: 300;
  }

  .action-due {
    font-size: 11px;
    font-weight: 700;
    color: #0000FF;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  .action-due.urgent { color: #ff1744; }
  .action-due.soon   { color: #ff6d00; }

  /* ─── TIMELINE ────────────────────────────────────────── */
  .timeline { position: relative; padding-left: 24px; }

  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: linear-gradient(180deg, #0000FF, #06D0FF);
    border-radius: 2px;
  }

  .tl-item {
    position: relative;
    margin-bottom: 18px;
  }

  .tl-item::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 5px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #0000FF;
    border: 2px solid #fff;
    box-shadow: 0 0 0 2px #0000FF;
  }

  .tl-item.cyan-dot::before { background: #06D0FF; box-shadow: 0 0 0 2px #06D0FF; }
  .tl-item.green-dot::before { background: #00c853; box-shadow: 0 0 0 2px #00c853; }
  .tl-item.done-dot::before { background: #ccc; box-shadow: 0 0 0 2px #ccc; }

  .tl-date {
    font-size: 10px;
    font-weight: 700;
    color: #06D0FF;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }

  .tl-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .tl-desc {
    font-size: 12px;
    color: #888;
    font-weight: 300;
    margin-top: 2px;
  }

  /* ─── FOOTER ──────────────────────────────────────────── */
  .footer {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    color: #fff;
    text-align: center;
    padding: 28px 24px;
    margin-top: 40px;
  }

  .footer-brand {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .footer-tagline {
    font-size: 12px;
    font-weight: 300;
    color: #b8f0ff;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .footer-contact {
    margin-top: 12px;
    font-size: 12px;
    color: #d0f4ff;
    font-weight: 300;
  }

  .footer-contact a { color: #fff; text-decoration: none; font-weight: 700; }

  /* ─── RESPONSIVE ──────────────────────────────────────── */
  @media (max-width: 600px) {
    .header { padding: 28px 20px 70px; }
    .wordmark { font-size: 26px; letter-spacing: 2px; }
    .header-title-block h1 { font-size: 20px; }
    .main { padding: 16px 14px 40px; }
    .stat-bar { grid-template-columns: repeat(2, 1fr); }
    .active-banner-badge { margin-left: 0; }
    .header-top-row { flex-direction: column; }
    .header-title-block { text-align: left; }
  }
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>
