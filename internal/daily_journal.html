<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Journal — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap');
<link rel="stylesheet" href="/css/brand.css">

    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 60px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 280px;
    }
    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }
    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }
    .nu-header * { position: relative; z-index: 2; }

    .nu-phoenix-icon { width: 80px; height: 80px; margin: 0 auto 16px; }
    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .nu-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
    }
    .nu-page-title {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 16px;
    }

    /* ══ CHEVRON ══ */
    .nu-chevron { position: relative; height: 50px; margin-top: -50px; z-index: 10; }
    .nu-chevron svg { width: 100%; height: 50px; display: block; }

    /* ══ CONTENT ══ */
    .nu-content-area {
      position: relative;
      background: var(--nu-white);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    .journal-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 40px 60px;
    }

    /* ══ STATS BAR ══ */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--nu-light-gray);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      border: 1px solid var(--nu-medium-gray);
    }
    .stat-number {
      font-weight: 900;
      font-size: 2rem;
      color: var(--nu-blue);
      line-height: 1;
    }
    .stat-number.success { color: #16a34a; }
    .stat-number.fail { color: #dc2626; }
    .stat-label {
      font-weight: 700;
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* ══ DAY SECTIONS ══ */
    .day-section {
      margin-bottom: 16px;
      border: 1px solid var(--nu-medium-gray);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .day-section.today { border-color: var(--nu-cyan); border-width: 2px; }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: var(--nu-light-gray);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }
    .day-header:hover { background: var(--nu-medium-gray); }
    .day-section.today .day-header {
      background: linear-gradient(135deg, #eef0ff 0%, #e6f9ff 100%);
    }

    .day-date {
      font-weight: 900;
      font-size: 1.2rem;
      color: var(--nu-dark-text);
    }
    .day-section.today .day-date { color: var(--nu-blue); }
    .today-badge {
      display: inline-block;
      background: var(--nu-cyan);
      color: var(--nu-navy);
      font-weight: 900;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 12px;
      vertical-align: middle;
    }

    .day-summary {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .day-count {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 12px;
    }
    .day-count.completed { background: #dcfce7; color: #166534; }
    .day-count.failed { background: #fecaca; color: #991b1b; }

    .chevron-icon {
      width: 20px;
      height: 20px;
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }
    .day-section.open .chevron-icon { transform: rotate(180deg); }

    .day-entries {
      display: none;
      padding: 0 24px 24px;
      background: var(--nu-white);
    }
    .day-section.open .day-entries { display: block; }

    /* ══ ENTRY ITEMS ══ */
    .entry {
      display: flex;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      align-items: flex-start;
    }
    .entry:last-child { border-bottom: none; }

    .entry-time {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      min-width: 70px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .entry-status {
      display: inline-block;
      font-weight: 900;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
      min-width: 80px;
      text-align: center;
      flex-shrink: 0;
    }
    .entry-status.completed { background: #dcfce7; color: #166534; }
    .entry-status.failed { background: #fecaca; color: #991b1b; }
    .entry-status.note { background: #e0e7ff; color: #3730a3; }

    .entry-content { flex: 1; }
    .entry-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--nu-dark-text);
      margin-bottom: 2px;
    }
    .entry-detail {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.5;
    }
    .entry-detail .error-text { color: #dc2626; font-weight: 600; }
    .entry-detail .path-text { color: #6366f1; font-family: 'Courier New', monospace; font-size: 0.8rem; }

    /* ══ NARRATIVE BLOCK ══ */
    .narrative-block {
      background: #fffbeb;
      border-left: 4px solid #f59e0b;
      padding: 16px 20px;
      margin: 16px 0;
      border-radius: 0 8px 8px 0;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #92400e;
    }
    .narrative-block strong { color: #78350f; }

    /* ══ DECISIONS NEEDED ══ */
    .decisions-section {
      background: linear-gradient(135deg, #fef3c7 0%, #fef9c3 100%);
      border: 2px solid #f59e0b;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 40px;
    }
    .decisions-title {
      font-weight: 900;
      font-size: 1.1rem;
      color: #92400e;
      margin-bottom: 12px;
    }
    .decision-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(245, 158, 11, 0.3);
      font-size: 0.9rem;
      color: #78350f;
    }
    .decision-item:last-child { border-bottom: none; }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 12px;
    }
    .nu-footer-contact {
      font-size: 0.95rem;
      line-height: 1.8;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 200px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .journal-container { padding: 24px 16px 40px; }
      .day-header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
      .day-summary { gap: 8px; }
      .entry { flex-direction: column; gap: 8px; }
      .entry-time { min-width: auto; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-number { font-size: 1.5rem; }
    }

    @media print {
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .day-entries { display: block !important; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
