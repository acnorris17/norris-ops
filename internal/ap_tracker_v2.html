<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norris Utilities — A/P Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: #f0f2ff;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .header {
    position: relative;
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
    min-height: 260px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 40px 20px 80px;
  }

  /* Ghost Phoenix Watermark */
  .phoenix-watermark {
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 340px;
    line-height: 1;
    opacity: 0.07;
    color: white;
    pointer-events: none;
    user-select: none;
  }

  /* Power Tower SVG Overlay */
  .tower-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    opacity: 0.10;
    pointer-events: none;
  }

  .header-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .header-eyebrow {
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-wordmark {
    color: #ffffff;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 6px;
  }

  .header-tagline {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .header-tool-title {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 30px;
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 24px;
    margin-top: 6px;
  }

  /* ─── CHEVRON DIVIDER ─── */
  .chevron-divider {
    width: 100%;
    height: 60px;
    background: #f0f2ff;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    margin-top: -1px;
    position: relative;
    z-index: 3;
  }

  /* ─── MAIN CONTAINER ─── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* ─── STATS ROW ─── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,255,0.08);
    padding: 20px 18px;
    border-left: 4px solid #0000FF;
    position: relative;
    overflow: hidden;
  }

  .stat-card.cyan { border-left-color: #06D0FF; }
  .stat-card.danger { border-left-color: #FF3B3B; }
  .stat-card.warning { border-left-color: #FF9500; }
  .stat-card.success { border-left-color: #34C759; }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 900;
    color: #1a1a2e;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-value.blue { color: #0000FF; }
  .stat-value.danger { color: #FF3B3B; }
  .stat-value.warning { color: #FF9500; }
  .stat-value.success { color: #34C759; }

  .stat-sub {
    font-size: 11px;
    color: #aaa;
    font-weight: 300;
  }

  /* ─── AGING ANALYSIS ─── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #0000FF;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, #0000FF33, transparent);
  }

  .aging-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .aging-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,255,0.07);
    padding: 14px 16px;
    text-align: center;
  }

  .aging-badge {
    display: inline-block;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 12px;
    margin-bottom: 8px;
  }

  .badge-current  { background: #e6f9ed; color: #34C759; }
  .badge-1-30     { background: #fff7e6; color: #FF9500; }
  .badge-31-60    { background: #fff0e6; color: #FF6200; }
  .badge-61-90    { background: #ffe6e6; color: #FF3B3B; }
  .badge-90plus   { background: #2a0000; color: #FF3B3B; }

  .aging-amount {
    font-size: 20px;
    font-weight: 900;
    color: #1a1a2e;
    margin-bottom: 2px;
  }

  .aging-count {
    font-size: 11px;
    color: #aaa;
  }

  .aging-bar-wrap {
    height: 5px;
    background: #f0f0f0;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
  }

  .aging-bar {
    height: 100%;
    border-radius: 10px;
  }

  /* ─── X-SEPARATOR ─── */
  .x-separator {
    text-align: center;
    color: #06D0FF;
    font-size: 20px;
    opacity: 0.45;
    letter-spacing: 18px;
    margin: 24px 0;
  }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    background: white;
    border: 1.5px solid #e0e4ff;
    border-radius: 8px;
    padding: 0 12px;
    gap: 8px;
    flex: 1;
    min-width: 200px;
    max-width: 320px;
    box-shadow: 0 2px 8px rgba(0,0,255,0.05);
  }

  .search-wrap input {
    border: none;
    outline: none;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #1a1a2e;
    padding: 9px 0;
    background: transparent;
    flex: 1;
  }

  .search-icon { color: #0000FF; font-size: 15px; }

  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: white;
    border: 1.5px solid #e0e4ff;
    border-radius: 20px;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #888;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: #0000FF;
    border-color: #0000FF;
    color: white;
  }

  .btn-add {
    background: linear-gradient(135deg, #0000FF, #06D0FF);
    border: none;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: white;
    padding: 9px 20px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,255,0.25);
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .btn-add:hover { opacity: 0.88; }

  /* ─── TABLE ─── */
  .table-wrap {
    background: white;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,255,0.08);
    overflow: hidden;
  }

  .table-scroll {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }

  thead tr {
    background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
  }

  thead th {
    color: white;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 14px 16px;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  thead th:hover { background: rgba(255,255,255,0.12); }

  thead th .sort-arrow { margin-left: 4px; opacity: 0.6; font-size: 9px; }

  tbody tr {
    border-bottom: 1px solid #f0f2ff;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #f7f8ff; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 13px 16px;
    font-size: 13px;
    color: #1a1a2e;
    white-space: nowrap;
  }

  .td-vendor {
    font-weight: 700;
    color: #0000FF;
  }

  .td-invoice {
    font-family: monospace;
    font-size: 12px;
    color: #555;
    background: #f8f9ff;
    border-radius: 4px;
    padding: 2px 8px;
  }

  .td-amount {
    font-weight: 700;
    text-align: right;
  }

  .td-date { color: #666; font-size: 12px; }

  .td-overdue { color: #FF3B3B; font-weight: 700; }
  .td-due-soon { color: #FF9500; font-weight: 700; }

  /* Status Badges */
  .status-badge {
    display: inline-block;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 11px;
  }

  .status-paid      { background: #e6f9ed; color: #34C759; }
  .status-pending   { background: #e8eaff; color: #0000FF; }
  .status-overdue   { background: #ffe6e6; color: #FF3B3B; }
  .status-disputed  { background: #fff0e6; color: #FF6200; }
  .status-scheduled { background: #e6f8ff; color: #06D0FF; }
  .status-partial   { background: #fffbe6; color: #c48d00; }

  /* Aging pill inside table */
  .aging-pill {
    display: inline-block;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 9px;
  }

  .ap-current { background: #e6f9ed; color: #34C759; }
  .ap-1-30    { background: #fff7e6; color: #FF9500; }
  .ap-31-60   { background: #fff0e6; color: #FF6200; }
  .ap-61-90   { background: #ffe6e6; color: #FF3B3B; }
  .ap-90plus  { background: #2a0000; color: #ff6b6b; }

  /* Action Buttons */
  .action-btn {
    background: none;
    border: 1.5px solid #e0e4ff;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #0000FF;
    padding: 4px 10px;
    cursor: pointer;
    margin-right: 4px;
    transition: all 0.15s;
  }

  .action-btn:hover {
    background: #0000FF;
    color: white;
    border-color: #0000FF;
  }

  .action-btn.danger:hover {
    background: #FF3B3B;
    border-color: #FF3B3B;
    color: white;
  }

  /* ─── TABLE FOOTER ─── */
  .table-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid #f0f2ff;
    flex-wrap: wrap;
    gap: 10px;
  }

  .table-footer-info {
    font-size: 12px;
    color: #888;
  }

  .table-footer-total {
    font-size: 14px;
    font-weight: 900;
    color: #0000FF;
  }

  /* ─── FOOTER ─── */
  .page-footer {
    text-align: center;
    padding: 32px 20px;
    border-top: 1px solid #e0e4ff;
    margin-top: 40px;
  }

  .page-footer-logo {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0000FF;
    margin-bottom: 4px;
  }

  .page-footer-tag {
    font-size: 11px;
    color: #aaa;
    font-weight: 300;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .page-footer-contact {
    font-size: 12px;
    color: #666;
  }

  .page-footer-contact a { color: #0000FF; text-decoration: none; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .aging-row { grid-template-columns: repeat(2, 1fr); }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search-wrap { max-width: 100%; }
    .filter-group { justify-content: center; }
    .btn-add { text-align: center; }
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .aging-row { grid-template-columns: 1fr 1fr; }
    .header-wordmark { font-size: 22px; }
  }
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>
