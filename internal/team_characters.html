<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Norris Utilities® Team</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }

    /* ══ HEADER ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 60px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 280px;
    }
    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px);
      z-index: 1;
      opacity: 0.6;
    }
    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }
    .nu-header * { position: relative; z-index: 2; }

    .nu-logo-text {
      font-family: 'Lato', sans-serif;
      font-weight: 900;
      font-size: 3.2rem;
      color: #fff;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-weight: 900;
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .nu-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
    }

    /* ══ CHEVRON ══ */
    .nu-chevron {
      position: relative;
      height: 50px;
      margin-top: -50px;
      z-index: 10;
    }
    .nu-chevron svg { width: 100%; height: 50px; display: block; }

    /* ══ PAGE HEADER ══ */
    .page-header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 40px;
    }

    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--nu-blue);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .page-header h1 span {
      color: var(--nu-cyan);
    }

    .page-header .subtitle {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: 300;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, var(--nu-blue), var(--nu-cyan));
      border-radius: 2px;
      margin: 18px auto 0;
    }

    /* ══ SUBAGENT COUNTER ══ */
    .subagent-counter-wrap {
      text-align: center;
      margin: 28px auto 36px;
    }
    .subagent-counter {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #1a1a3e 0%, #2a2a5e 100%);
      color: #fff;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 20px rgba(0,0,255,0.15);
      animation: counter-glow 2s ease-in-out infinite;
    }
    .subagent-counter .count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--nu-cyan);
      color: var(--nu-navy);
      font-weight: 900;
      font-size: 1.2rem;
    }
    .subagent-counter .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ff88;
      animation: dot-pulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 6px #00ff88;
    }
    @keyframes counter-glow {
      0%, 100% { box-shadow: 0 4px 20px rgba(0,0,255,0.15); }
      50% { box-shadow: 0 4px 30px rgba(6,208,255,0.3); }
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ══ TEAM GRID ══ */
    .team-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
      justify-content: center;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,255,0.08), 0 1px 4px rgba(0,0,0,0.06);
      padding: 32px 24px 28px;
      width: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1.5px solid #f0f0ff;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(0,0,255,0.13), 0 2px 8px rgba(0,0,0,0.08);
    }

    .card.legacy-card {
      border-color: var(--nu-cyan);
      background: linear-gradient(160deg, #f0faff 0%, #fff 100%);
    }

    .card.ghost-card {
      border-color: #ddd;
      background: #fafafa;
      opacity: 0.85;
    }

    /* ══ SUBAGENT CARDS ══ */
    .card.subagent-card {
      width: 200px;
      padding: 24px 18px 22px;
      border-color: var(--nu-cyan);
      background: linear-gradient(160deg, #f0faff 0%, #f8fdff 50%, #fff 100%);
      animation: ride-in 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
      opacity: 0;
      transform: translateX(400px);
    }
    .card.subagent-card:nth-child(5) { animation-delay: 0.3s; }
    .card.subagent-card:nth-child(6) { animation-delay: 0.7s; }
    .card.subagent-card:nth-child(7) { animation-delay: 1.1s; }

    @keyframes ride-in {
      0% {
        opacity: 0;
        transform: translateX(400px) rotate(5deg);
      }
      60% {
        opacity: 1;
        transform: translateX(-10px) rotate(-2deg);
      }
      80% {
        transform: translateX(5px) rotate(1deg);
      }
      100% {
        opacity: 1;
        transform: translateX(0) rotate(0deg);
      }
    }

    .subagent-card .character-wrap {
      width: 140px;
      height: 160px;
    }

    .subagent-label {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--nu-blue), var(--nu-cyan));
      border-radius: 20px;
      padding: 3px 10px;
    }

    .character-wrap {
      width: 180px;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 8px;
    }

    /* === FLOAT ANIMATIONS === */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes float-ghost {
      0%, 100% { transform: translateY(0px) scaleX(1); }
      50%       { transform: translateY(-10px) scaleX(1.02); }
    }
    @keyframes spin-wheel {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px var(--nu-cyan)) drop-shadow(0 0 12px rgba(0,0,255,0.53)); }
      50%       { filter: drop-shadow(0 0 14px var(--nu-cyan)) drop-shadow(0 0 28px rgba(0,0,255,0.67)); }
    }
    @keyframes flame-flicker {
      0%, 100% { transform: scaleY(1) scaleX(1); }
      30%       { transform: scaleY(1.06) scaleX(0.97); }
      70%       { transform: scaleY(0.96) scaleX(1.03); }
    }
    @keyframes ghost-float {
      0%, 100% { transform: translateY(0) rotate(-1deg); opacity: 0.7; }
      50%       { transform: translateY(-12px) rotate(1deg); opacity: 0.9; }
    }
    @keyframes question-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    @keyframes speed-lines {
      0%   { transform: translateX(0); opacity: 0.7; }
      100% { transform: translateX(30px); opacity: 0; }
    }
    @keyframes subagent-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-5px); }
    }
    @keyframes subagent-glow {
      0%, 100% { filter: drop-shadow(0 0 4px var(--nu-cyan)) drop-shadow(0 0 8px rgba(0,0,255,0.3)); }
      50%       { filter: drop-shadow(0 0 10px var(--nu-cyan)) drop-shadow(0 0 16px rgba(0,0,255,0.5)); }
    }
    @keyframes antenna-blink {
      0%, 80%, 100% { fill: var(--nu-cyan); opacity: 0.6; }
      85%, 95%       { fill: #00ff88; opacity: 1; }
    }
    @keyframes data-stream {
      0%   { stroke-dashoffset: 20; opacity: 0.8; }
      100% { stroke-dashoffset: 0; opacity: 0.3; }
    }

    .float-anim   { animation: float 2.8s ease-in-out infinite; }
    .float-slow   { animation: float-slow 3.4s ease-in-out infinite; }
    .float-ghost  { animation: ghost-float 3s ease-in-out infinite; }
    .glow-anim    { animation: glow-pulse 2.2s ease-in-out infinite; }
    .subagent-float { animation: subagent-float 2.2s ease-in-out infinite; }
    .subagent-glow { animation: subagent-glow 2s ease-in-out infinite; }

    /* Name badge */
    .name-badge {
      text-align: center;
      margin-top: 6px;
    }
    .name-badge .name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--nu-blue);
      line-height: 1.2;
    }
    .name-badge .role {
      font-size: 0.82rem;
      font-weight: 400;
      color: #555;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }
    .name-badge .emoji {
      font-size: 1.3rem;
      display: block;
      margin-bottom: 2px;
    }
    .coming-soon {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--nu-cyan);
      border: 1.5px solid var(--nu-cyan);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ══ CONTENT AREA ══ */
    .nu-content-area {
      position: relative;
      background: #fff;
      padding: 0 20px 60px;
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 40px;
      text-align: center;
      font-family: 'Lato', sans-serif;
    }
    .nu-footer-tagline {
      font-style: italic;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 12px;
    }
    .nu-footer-contact {
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 200px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .card { width: 100%; max-width: 260px; }
      .card.subagent-card { width: 100%; max-width: 220px; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
