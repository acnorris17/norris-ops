<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Video Breakdown — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    /* ══ ROOT VARIABLES ══ */
    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --nu-accent-gold: #C9A84C;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
      --status-green: #00C853;
      --status-amber: #FFB300;
      --status-red: #FF3D00;
      --dark-surface: #0A0A1A;
      --dark-card: #111128;
      --dark-card-border: #1E1E3E;
      --dark-text-primary: #E8E8F0;
      --dark-text-secondary: #9999BB;
    }

    /* ══ BASE ══ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--dark-text-primary);
      background: var(--dark-surface);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER — Power Tower Infrastructure Overlay ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 60px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 280px;
    }

    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }

    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }

    .nu-header * { position: relative; z-index: 2; }

    .nu-phoenix-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
    }

    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .nu-tagline {
      font-family: var(--font-primary);
      font-style: italic;
      font-weight: 300;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
    }

    /* ══ DOCUMENT TITLE BAR ══ */
    .doc-title-bar {
      background: linear-gradient(135deg, #0D0D2B 0%, #1A1A4E 100%);
      border-bottom: 2px solid var(--nu-cyan);
      padding: 28px 40px;
      text-align: center;
    }
    .doc-title-bar h1 {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--nu-white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .doc-title-bar .doc-subtitle {
      font-family: var(--font-primary);
      font-weight: 300;
      font-style: italic;
      font-size: 1rem;
      color: var(--nu-cyan);
      letter-spacing: 0.04em;
    }
    .doc-title-bar .doc-date {
      font-size: 0.8rem;
      color: var(--dark-text-secondary);
      margin-top: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ══ WHITE CHEVRON TRANSITION (adapted for dark) ══ */
    .nu-chevron {
      position: relative;
      height: 50px;
      margin-top: -50px;
      z-index: 10;
    }
    .nu-chevron svg {
      width: 100%;
      height: 50px;
      display: block;
    }

    /* ══ CONTENT AREA ══ */
    .nu-content-area {
      position: relative;
      background: var(--dark-surface);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,0,255,0.04) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    .content-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px 60px;
    }

    /* ══ SECTION HEADERS ══ */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      margin-top: 56px;
    }
    .section-header:first-child {
      margin-top: 0;
    }
    .section-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.4rem;
    }
    .section-icon.green { background: rgba(0,200,83,0.15); border: 1px solid rgba(0,200,83,0.3); }
    .section-icon.amber { background: rgba(255,179,0,0.15); border: 1px solid rgba(255,179,0,0.3); }
    .section-icon.red { background: rgba(255,61,0,0.15); border: 1px solid rgba(255,61,0,0.3); }
    .section-icon.blue { background: rgba(0,0,255,0.15); border: 1px solid rgba(0,0,255,0.3); }

    .section-header h2 {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--nu-white);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .section-header h2 span {
      display: block;
      font-weight: 400;
      font-size: 0.85rem;
      color: var(--dark-text-secondary);
      text-transform: none;
      letter-spacing: 0;
      margin-top: 2px;
    }

    /* ══ TABLES ══ */
    .breakdown-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      margin-bottom: 16px;
    }
    .breakdown-table thead th {
      background: linear-gradient(135deg, #1A1A3E 0%, #2A2A5E 100%);
      color: var(--nu-cyan);
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 20px;
      text-align: left;
      border-bottom: 2px solid var(--nu-blue);
    }
    .breakdown-table thead th:first-child { padding-left: 24px; }
    .breakdown-table tbody tr {
      transition: background 0.2s ease;
    }
    .breakdown-table tbody tr:nth-child(odd) {
      background: var(--dark-card);
    }
    .breakdown-table tbody tr:nth-child(even) {
      background: rgba(17,17,40,0.6);
    }
    .breakdown-table tbody tr:hover {
      background: rgba(0,0,255,0.08);
    }
    .breakdown-table tbody td {
      padding: 14px 20px;
      font-size: 0.9rem;
      color: var(--dark-text-primary);
      border-bottom: 1px solid var(--dark-card-border);
      vertical-align: top;
    }
    .breakdown-table tbody td:first-child {
      padding-left: 24px;
      font-weight: 700;
      color: var(--nu-white);
    }
    .breakdown-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* ══ STATUS INDICATORS ══ */
    .status-check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,200,83,0.15);
      color: var(--status-green);
      font-weight: 900;
      font-size: 0.85rem;
      animation: pulseGreen 2.5s ease-in-out infinite;
    }
    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,200,83,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(0,200,83,0); }
    }

    .status-progress {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .progress-bar-wrap {
      width: 80px;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
      position: relative;
    }
    .progress-bar-fill.high {
      background: linear-gradient(90deg, var(--status-green), #00E676);
      animation: shimmer 2s ease-in-out infinite;
    }
    .progress-bar-fill.mid {
      background: linear-gradient(90deg, var(--status-amber), #FFC107);
      animation: shimmer 2.5s ease-in-out infinite;
    }
    .progress-bar-fill.low {
      background: linear-gradient(90deg, var(--status-red), #FF6E40);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .progress-pct {
      font-size: 0.75rem;
      font-weight: 700;
      min-width: 32px;
    }
    .progress-pct.high { color: var(--status-green); }
    .progress-pct.mid { color: var(--status-amber); }
    .progress-pct.low { color: var(--status-red); }

    .status-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,61,0,0.15);
      color: var(--status-red);
      font-weight: 900;
      font-size: 0.85rem;
    }

    /* ══ NOT REAL LIST ══ */
    .not-real-list {
      list-style: none;
      padding: 0;
    }
    .not-real-list li {
      background: var(--dark-card);
      border: 1px solid var(--dark-card-border);
      border-left: 4px solid var(--status-red);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px 16px 20px;
      margin-bottom: 10px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .not-real-list li:hover {
      background: rgba(255,61,0,0.04);
      border-left-color: #FF6E40;
    }
    .not-real-list .claim-icon {
      flex-shrink: 0;
      margin-top: 2px;
    }
    .not-real-list .claim-title {
      font-weight: 700;
      color: var(--nu-white);
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .not-real-list .claim-detail {
      font-size: 0.85rem;
      color: var(--dark-text-secondary);
      line-height: 1.5;
    }

    /* ══ AUTOMATIONS GRID ══ */
    .auto-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }
    .auto-card {
      background: var(--dark-card);
      border: 1px solid var(--dark-card-border);
      border-radius: 12px;
      padding: 20px 22px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .auto-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      border-color: var(--nu-blue);
    }
    .auto-number {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--nu-blue), #0033CC);
      color: var(--nu-white);
      font-weight: 900;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .auto-info {
      flex: 1;
    }
    .auto-title {
      font-weight: 700;
      color: var(--nu-white);
      font-size: 0.95rem;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .auto-desc {
      font-size: 0.82rem;
      color: var(--dark-text-secondary);
      line-height: 1.45;
      margin-bottom: 10px;
    }

    /* ══ STATUS BADGES ══ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-live {
      background: rgba(0,200,83,0.15);
      color: var(--status-green);
      border: 1px solid rgba(0,200,83,0.3);
    }
    .badge-live::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--status-green);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .badge-building {
      background: rgba(255,179,0,0.15);
      color: var(--status-amber);
      border: 1px solid rgba(255,179,0,0.3);
    }
    .badge-building::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--status-amber);
      animation: blink 2s ease-in-out infinite;
    }
    .badge-planned {
      background: rgba(0,0,255,0.12);
      color: #6666FF;
      border: 1px solid rgba(0,0,255,0.25);
    }
    .badge-planned::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6666FF;
      animation: blink 2.5s ease-in-out infinite;
    }
    .badge-blocked {
      background: rgba(255,61,0,0.12);
      color: var(--status-red);
      border: 1px solid rgba(255,61,0,0.25);
    }

    /* ══ SUMMARY STATS ══ */
    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .stat-card {
      flex: 1;
      min-width: 160px;
      background: var(--dark-card);
      border: 1px solid var(--dark-card-border);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
    }
    .stat-number {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-number.green { color: var(--status-green); }
    .stat-number.amber { color: var(--status-amber); }
    .stat-number.red { color: var(--status-red); }
    .stat-number.blue { color: var(--nu-cyan); }
    .stat-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dark-text-secondary);
    }

    /* ══ DIVIDER ══ */
    .section-divider {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dark-card-border), var(--nu-blue), var(--dark-card-border), transparent);
      margin: 48px 0 0;
    }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-style: italic;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 12px;
    }
    .nu-footer-contact {
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }
    .nu-footer-contact a:hover {
      text-decoration: underline;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 200px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .content-wrapper { padding: 32px 16px 48px; }
      .doc-title-bar { padding: 20px 16px; }
      .doc-title-bar h1 { font-size: 1.2rem; }
      .breakdown-table { font-size: 0.85rem; }
      .breakdown-table thead th { padding: 10px 12px; font-size: 0.68rem; }
      .breakdown-table tbody td { padding: 10px 12px; font-size: 0.82rem; }
      .breakdown-table thead th:first-child,
      .breakdown-table tbody td:first-child { padding-left: 12px; }
      .auto-grid { grid-template-columns: 1fr; }
      .stats-bar { flex-direction: column; }
      .section-header h2 { font-size: 1.1rem; }
      .nu-footer { padding: 30px 20px; }
    }

    @media (max-width: 480px) {
      .breakdown-table th:nth-child(3),
      .breakdown-table td:nth-child(3) {
        display: none;
      }
    }

    /* ══ PRINT ══ */
    @media print {
      body { background: #fff; color: #000; }
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .dark-card, .breakdown-table tbody tr { background: #fff !important; }
      .auto-card:hover { transform: none; box-shadow: none; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
