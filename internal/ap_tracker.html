<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts Payable Tracker — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap');
<link rel="stylesheet" href="/css/brand.css">

    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --nu-accent-gold: #C9A84C;
      --nu-green: #28A745;
      --nu-red: #DC3545;
      --nu-orange: #F59E0B;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-light-gray);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 60px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 280px;
    }
    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }
    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }
    .nu-header * { position: relative; z-index: 2; }

    .nu-phoenix-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      fill: var(--nu-white);
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
    }
    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .nu-tagline {
      font-family: var(--font-primary);
      font-style: italic;
      font-weight: 300;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
    }
    .nu-page-title {
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--nu-white);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.25);
      display: inline-block;
    }

    .nu-chevron {
      position: relative;
      height: 50px;
      margin-top: -50px;
      z-index: 10;
    }
    .nu-chevron svg {
      width: 100%;
      height: 50px;
      display: block;
    }

    .nu-content-area {
      position: relative;
      background: var(--nu-light-gray);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    /* ══ DASHBOARD SUMMARY ══ */
    .dashboard-summary {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 40px 0;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 12px;
    }
    .summary-card {
      background: var(--nu-white);
      border-radius: 10px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
      position: relative;
      overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .summary-card.total-owed::before { background: var(--nu-red); }
    .summary-card.total-paid::before { background: var(--nu-green); }
    .summary-card.checks-sent::before { background: var(--nu-orange); }
    .summary-card.vendors-clear::before { background: var(--nu-blue); }

    .summary-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 6px;
    }
    .summary-value {
      font-size: 2rem;
      font-weight: 900;
      color: var(--nu-dark-text);
    }
    .summary-value.red { color: var(--nu-red); }
    .summary-value.green { color: var(--nu-green); }
    .summary-value.orange { color: var(--nu-orange); }
    .summary-value.blue { color: var(--nu-blue); }

    .last-updated {
      text-align: right;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 32px;
    }

    /* ══ VENDOR SECTIONS ══ */
    .vendors-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 60px;
    }

    .vendor-section {
      background: var(--nu-white);
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
      margin-bottom: 28px;
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .vendor-section:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    .vendor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      background: linear-gradient(135deg, #1a1a3e 0%, #2a2a5e 100%);
      color: var(--nu-white);
      cursor: pointer;
      user-select: none;
    }
    .vendor-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .vendor-name {
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
    }
    .vendor-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .vendor-status.owed {
      background: rgba(220, 53, 69, 0.2);
      color: #ff8a8a;
    }
    .vendor-status.clear {
      background: rgba(40, 167, 69, 0.2);
      color: #6dff8a;
    }
    .vendor-status.pending {
      background: rgba(245, 158, 11, 0.2);
      color: #ffd06a;
    }
    .vendor-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .vendor-status.owed .vendor-status-dot { background: #ff8a8a; }
    .vendor-status.clear .vendor-status-dot { background: #6dff8a; }
    .vendor-status.pending .vendor-status-dot { background: #ffd06a; }

    .vendor-total {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--nu-cyan);
    }
    .vendor-total.clear-total {
      color: #6dff8a;
    }

    .vendor-body {
      padding: 0;
    }

    /* ══ INVOICE TABLE ══ */
    .invoice-table-wrap {
      overflow-x: auto;
      padding: 0 24px;
    }
    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .invoice-table thead th {
      padding: 14px 12px;
      text-align: left;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      border-bottom: 2px solid var(--nu-medium-gray);
      white-space: nowrap;
    }
    .invoice-table thead th:last-child {
      text-align: center;
    }
    .invoice-table tbody tr {
      border-bottom: 1px solid #f0f0f3;
      transition: background 0.15s ease;
    }
    .invoice-table tbody tr:hover {
      background: #f8f8ff;
    }
    .invoice-table tbody tr.paid-row {
      background: #f0fff4;
      opacity: 0.7;
    }
    .invoice-table tbody tr.paid-row td {
      text-decoration: line-through;
      text-decoration-color: #aaa;
    }
    .invoice-table tbody tr.paid-row td:last-child,
    .invoice-table tbody tr.paid-row td.no-strike {
      text-decoration: none;
    }
    .invoice-table tbody td {
      padding: 14px 12px;
      vertical-align: middle;
    }
    .invoice-table tbody td:last-child {
      text-align: center;
    }

    .amount-cell {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .amount-cell.owed {
      color: var(--nu-red);
    }
    .amount-cell.paid {
      color: var(--nu-green);
    }

    .payment-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .payment-badge.checks-sent {
      background: #FFF3CD;
      color: #856404;
    }
    .payment-badge.paid-full {
      background: #D4EDDA;
      color: #155724;
    }
    .payment-badge.not-due {
      background: #E8E8EC;
      color: #666;
    }

    /* ══ CHECKBOX ══ */
    .paid-check-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .paid-checkbox {
      width: 22px;
      height: 22px;
      accent-color: var(--nu-green);
      cursor: pointer;
    }
    .paid-date-input {
      width: 110px;
      font-family: var(--font-primary);
      font-size: 0.75rem;
      padding: 3px 6px;
      border: 1px solid var(--nu-medium-gray);
      border-radius: 4px;
      text-align: center;
      color: var(--nu-body-text);
    }
    .paid-date-input:focus {
      outline: none;
      border-color: var(--nu-blue);
      box-shadow: 0 0 0 2px rgba(0,0,255,0.1);
    }

    /* ══ HOW TO PAY BOX ══ */
    .how-to-pay {
      margin: 20px 24px 24px;
      background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
      border: 1px solid #d8e0ff;
      border-radius: 8px;
      padding: 20px 24px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .how-to-pay-title {
      font-weight: 900;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--nu-blue);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .how-to-pay-title svg {
      width: 18px;
      height: 18px;
      fill: var(--nu-blue);
    }
    .remit-block {
      flex: 1;
      min-width: 220px;
    }
    .remit-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 4px;
    }
    .remit-address {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--nu-dark-text);
      font-weight: 400;
    }
    .remit-address strong {
      font-weight: 700;
    }
    .contact-block {
      flex: 1;
      min-width: 220px;
    }
    .contact-detail {
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--nu-body-text);
    }
    .contact-detail a {
      color: var(--nu-blue);
      text-decoration: none;
      font-weight: 700;
    }
    .contact-detail a:hover {
      text-decoration: underline;
    }

    /* ══ NOTES AREA ══ */
    .vendor-notes {
      margin: 0 24px 24px;
      padding: 14px 18px;
      background: #FFFDF0;
      border: 1px solid #F0E8C0;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #7A6B20;
    }
    .vendor-notes strong {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ══ VENDOR SUBTOTAL BAR ══ */
    .vendor-subtotal-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      background: #f8f9fc;
      border-top: 2px solid var(--nu-medium-gray);
    }
    .subtotal-label {
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
    }
    .subtotal-value {
      font-weight: 900;
      font-size: 1.3rem;
      font-variant-numeric: tabular-nums;
    }
    .subtotal-value.owed { color: var(--nu-red); }
    .subtotal-value.clear { color: var(--nu-green); }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-style: italic;
      font-weight: 300;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 12px;
    }
    .nu-footer-contact {
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }
    .nu-footer-contact a:hover {
      text-decoration: underline;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 200px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .nu-page-title { font-size: 1.2rem; }
      .dashboard-summary { padding: 24px 16px 0; }
      .vendors-container { padding: 0 16px 40px; }
      .vendor-header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
      .vendor-header-left {
        flex-direction: column;
        gap: 8px;
      }
      .how-to-pay {
        flex-direction: column;
        gap: 20px;
        margin: 16px 16px 20px;
      }
      .invoice-table-wrap { padding: 0 12px; }
      .vendor-subtotal-bar { padding: 14px 16px; }
      .summary-value { font-size: 1.5rem; }
    }
    @media (max-width: 500px) {
      .summary-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .summary-card { padding: 16px 12px; }
      .summary-value { font-size: 1.3rem; }
    }

    /* ══ PRINT ══ */
    @media print {
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .vendor-header { background: #1a1a3e !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .vendor-section { box-shadow: none; border: 1px solid #ccc; }
      body { background: white; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

<script src="/celebrations.js"></script>
</body>
</html>
