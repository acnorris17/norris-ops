<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Dashboard — Caroline Butler — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    /* ══ GOOGLE FONTS ══ */
    @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap');
<link rel="stylesheet" href="/css/brand.css">

    /* ══ ROOT VARIABLES ══ */
    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --nu-accent-gold: #C9A84C;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ══ BASE ══ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER — Power Tower Infrastructure Overlay ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 48px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 280px;
    }

    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }

    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }

    .nu-header * { position: relative; z-index: 2; }

    /* ══ LIVE DATE PILL ══ */
    .nu-date-pill {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 20px;
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
    }

    /* ══ LOGO AREA ══ */
    .nu-phoenix-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
    }
    .nu-phoenix-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.3));
    }

    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .nu-tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .nu-page-title {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--nu-white);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      display: inline-block;
      padding: 8px 28px;
      border-radius: 4px;
      margin-top: 4px;
    }

    /* ══ WHITE CHEVRON TRANSITION ══ */
    .nu-chevron {
      position: relative;
      height: 50px;
      margin-top: -50px;
      z-index: 10;
    }
    .nu-chevron svg {
      width: 100%;
      height: 50px;
      display: block;
    }

    /* ══ GHOST PHOENIX WATERMARK ══ */
    .nu-content-area {
      position: relative;
      background: var(--nu-white);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    /* ══ CONTENT LAYOUT ══ */
    .cb-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 40px 60px;
    }

    /* ══ SECTION HEADERS ══ */
    .nu-section-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--nu-blue);
      margin-bottom: 8px;
    }
    .nu-section-title span {
      color: var(--nu-dark-text);
      font-weight: 700;
    }

    /* ══ STATS ROW ══ */
    .cb-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .cb-stat-card {
      background: var(--nu-white);
      border-radius: 8px;
      padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .cb-stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .cb-stat-number {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 2.4rem;
      color: var(--nu-blue);
      line-height: 1;
      margin-bottom: 6px;
    }
    .cb-stat-number.urgent {
      color: #CC3300;
    }
    .cb-stat-number.good {
      color: #28a745;
    }
    .cb-stat-label {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.85rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ══ DASHBOARD GRID ══ */
    .cb-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }
    .cb-panel {
      background: var(--nu-white);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
    }
    .cb-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--nu-light-gray);
    }
    .cb-panel-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--nu-dark-text);
    }
    .cb-panel-title svg {
      width: 20px;
      height: 20px;
      vertical-align: -3px;
      margin-right: 8px;
    }
    .cb-panel-count {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--nu-white);
      background: var(--nu-blue);
      border-radius: 12px;
      padding: 2px 10px;
      letter-spacing: 0.03em;
    }
    .cb-panel-count.alert {
      background: #CC3300;
    }

    /* ══ TASK LIST ══ */
    .cb-task {
      display: flex;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--nu-light-gray);
    }
    .cb-task:last-child {
      border-bottom: none;
    }
    .cb-task input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--nu-blue);
      border-radius: 4px;
      margin-right: 12px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s ease;
    }
    .cb-task input[type="checkbox"]:checked {
      background: var(--nu-blue);
    }
    .cb-task input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .cb-task-content {
      flex: 1;
    }
    .cb-task-text {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.95rem;
      color: var(--nu-dark-text);
      line-height: 1.4;
    }
    .cb-task input[type="checkbox"]:checked + .cb-task-content .cb-task-text {
      text-decoration: line-through;
      color: #999;
    }
    .cb-task-meta {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.8rem;
      color: #999;
      margin-top: 2px;
    }
    .cb-priority {
      display: inline-block;
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1px 8px;
      border-radius: 3px;
      margin-left: 8px;
      vertical-align: 1px;
    }
    .cb-priority.high {
      background: #FFECEC;
      color: #CC3300;
    }
    .cb-priority.medium {
      background: #FFF3E0;
      color: #E67E22;
    }
    .cb-priority.normal {
      background: #E8F5E9;
      color: #2E7D32;
    }

    /* ══ SHIPPING TABLE ══ */
    .cb-ship-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--nu-light-gray);
    }
    .cb-ship-row:last-child {
      border-bottom: none;
    }
    .cb-ship-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .cb-ship-status.pending { background: #E67E22; }
    .cb-ship-status.shipped { background: #28a745; }
    .cb-ship-status.delayed { background: #CC3300; }
    .cb-ship-info {
      flex: 1;
    }
    .cb-ship-customer {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--nu-dark-text);
    }
    .cb-ship-detail {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.82rem;
      color: #777;
    }
    .cb-ship-action {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.78rem;
      color: var(--nu-blue);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: none;
      border: 1px solid var(--nu-blue);
      padding: 4px 12px;
      border-radius: 4px;
      transition: all 0.15s ease;
    }
    .cb-ship-action:hover {
      background: var(--nu-blue);
      color: var(--nu-white);
    }

    /* ══ INVOICE REMINDERS ══ */
    .cb-invoice-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--nu-light-gray);
    }
    .cb-invoice-row:last-child {
      border-bottom: none;
    }
    .cb-invoice-customer {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--nu-dark-text);
    }
    .cb-invoice-detail {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.82rem;
      color: #777;
    }
    .cb-invoice-amount {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1rem;
      color: var(--nu-dark-text);
      text-align: right;
    }
    .cb-days-overdue {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.75rem;
      color: #CC3300;
    }

    /* ══ INBOX MONITOR ══ */
    .cb-inbox-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--nu-light-gray);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .cb-inbox-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cb-inbox-dot.active {
      background: #28a745;
      box-shadow: 0 0 6px rgba(40, 167, 69, 0.4);
      animation: pulse 2s infinite;
    }
    .cb-inbox-dot.idle {
      background: #999;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .cb-inbox-label {
      font-family: var(--font-primary);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--nu-dark-text);
    }
    .cb-inbox-sublabel {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.8rem;
      color: #777;
    }

    /* ══ FULL-WIDTH PANEL ══ */
    .cb-full-panel {
      background: var(--nu-white);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--nu-medium-gray);
      margin-bottom: 40px;
    }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 12px;
    }
    .nu-footer-contact {
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }
    .nu-footer-contact a:hover {
      text-decoration: underline;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .cb-stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .cb-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 200px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .cb-container { padding: 24px 16px 40px; }
      .cb-stats { grid-template-columns: 1fr 1fr; gap: 12px; }
      .cb-stat-number { font-size: 1.8rem; }
      .cb-panel { padding: 20px; }
    }
    @media (max-width: 480px) {
      .cb-stats { grid-template-columns: 1fr; }
      .nu-page-title { font-size: 0.9rem; padding: 6px 16px; }
    }

    /* ══ PRINT ══ */
    @media print {
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .cb-panel, .cb-stat-card, .cb-full-panel { box-shadow: none; border: 1px solid #ccc; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
