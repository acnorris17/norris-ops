<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSS Expense Report — Aaron C. Norris | Norris Utilities</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap');
<link rel="stylesheet" href="/css/brand.css">

    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER ══ */
    .report-header {
      position: relative;
      background: linear-gradient(135deg, #0a0e5c 0%, #0033cc 35%, #0066ee 60%, #00aaff 85%, var(--nu-cyan) 100%);
      padding: 40px 48px;
      overflow: hidden;
    }
    .report-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px);
      background-size: 40px 40px, 40px 40px, 60px 60px;
      z-index: 1;
      opacity: 0.6;
    }
    .report-header * { position: relative; z-index: 2; }
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 20px;
    }
    .header-left .company-name {
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--nu-white);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .header-left .doc-title {
      font-weight: 300;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-right {
      text-align: right;
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
      line-height: 1.7;
    }
    .header-right strong { color: var(--nu-white); font-weight: 700; }

    /* ══ CHEVRON ══ */
    .chevron { position: relative; height: 40px; margin-top: -40px; z-index: 10; }
    .chevron svg { width: 100%; height: 40px; display: block; }

    /* ══ CONTENT ══ */
    .content { max-width: 860px; margin: 0 auto; padding: 40px 32px; }

    /* ══ SUMMARY BAR ══ */
    .summary-bar {
      display: flex;
      gap: 0;
      margin-bottom: 36px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .summary-item {
      flex: 1;
      padding: 20px 16px;
      text-align: center;
      background: var(--nu-white);
      border-right: 1px solid var(--nu-medium-gray);
    }
    .summary-item:last-child { border-right: none; }
    .summary-item.highlight {
      background: var(--nu-navy);
      color: var(--nu-white);
    }
    .summary-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 4px;
    }
    .summary-item.highlight .summary-label { color: rgba(255,255,255,0.6); }
    .summary-value {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--nu-dark-text);
    }
    .summary-item.highlight .summary-value { color: var(--nu-cyan); }

    /* ══ GROUP ══ */
    .group {
      margin-bottom: 32px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .group-header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .group-header.bss { background: linear-gradient(135deg, var(--nu-blue), #0033cc); }
    .group-header.nu { background: linear-gradient(135deg, #444, #666); }
    .group-header.pending { background: linear-gradient(135deg, #cc6600, #ff9933); }
    .group-title {
      color: var(--nu-white);
      font-weight: 900;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .group-total {
      color: var(--nu-white);
      font-weight: 900;
      font-size: 1.2rem;
    }
    .group-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 0.75rem;
      font-weight: 400;
      margin-top: 2px;
    }

    /* ══ TABLE ══ */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--nu-white);
    }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 700;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      background: var(--nu-light-gray);
      border-bottom: 2px solid var(--nu-medium-gray);
    }
    thead th:last-child { text-align: right; }
    tbody td {
      padding: 12px 16px;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    tbody td:last-child {
      text-align: right;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    .category-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .cat-meals { background: #e8f5e9; color: #2e7d32; }
    .cat-travel { background: #e3f2fd; color: #1565c0; }
    .cat-fuel { background: #fff3e0; color: #e65100; }
    .cat-misc { background: #f3e5f5; color: #7b1fa2; }
    .cat-lodging { background: #fce4ec; color: #c62828; }

    .row-subtotal td {
      font-weight: 900;
      background: var(--nu-light-gray);
      border-top: 2px solid var(--nu-medium-gray);
      border-bottom: none;
    }

    /* ══ PENDING ══ */
    .pending-note {
      padding: 16px 24px;
      background: #fff8e1;
      border-left: 4px solid #ff9900;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .pending-note strong { color: #cc6600; }

    /* ══ NOT-BSS NOTE ══ */
    .not-bss-note {
      padding: 12px 24px;
      background: #f5f5f5;
      font-size: 0.8rem;
      color: #888;
      font-style: italic;
    }

    /* ══ SIGNATURE ══ */
    .signature-area {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--nu-medium-gray);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .sig-block label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }
    .sig-line {
      border-bottom: 1px solid var(--nu-body-text);
      height: 32px;
      margin-bottom: 4px;
    }
    .sig-hint {
      font-size: 0.75rem;
      color: #aaa;
    }

    /* ══ FOOTER ══ */
    .report-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #001133 100%);
      padding: 32px 24px;
      text-align: center;
    }
    .footer-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--nu-cyan);
      margin-bottom: 10px;
    }
    .footer-info {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
    }

    /* ══ PRINT ══ */
    @media print {
      body { font-size: 11pt; }
      .report-header { padding: 24px 32px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .content { padding: 24px; }
      .group-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .summary-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .summary-item.highlight { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .category-tag { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .report-footer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .chevron { display: none; }
      .signature-area { page-break-inside: avoid; }
    }

    @media (max-width: 640px) {
      .report-header { padding: 24px 16px; }
      .header-flex { flex-direction: column; }
      .header-right { text-align: left; }
      .content { padding: 20px 12px; }
      .summary-bar { flex-direction: column; }
      .summary-item { border-right: none; border-bottom: 1px solid var(--nu-medium-gray); }
      .signature-area { grid-template-columns: 1fr; }
      thead th, tbody td { padding: 8px 10px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
