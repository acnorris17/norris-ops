<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Document — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    /* ══ ROOT VARIABLES ══ */
    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --nu-accent-gold: #C9A84C;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ══ BASE ══ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 28px 40px 44px;
      text-align: center;
      overflow: hidden;
      min-height: 120px;
    }
    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }
    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }
    .nu-header * { position: relative; z-index: 2; }

    .header-layout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1000px;
      margin: 0 auto;
    }

    .logo-block {
      text-align: left;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nu-phoenix-icon svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.25));
    }
    .logo-text-block { text-align: left; }
    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 2.4rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-shadow: 0 2px 16px rgba(0,0,0,0.25);
      line-height: 1.1;
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
    }
    .nu-tagline {
      font-family: var(--font-primary);
      font-style: italic;
      font-weight: 300;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .doc-type-block {
      text-align: right;
    }
    .doc-type-label {
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--nu-white);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,0.2);
    }
    .doc-type-sub {
      font-weight: 400;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.05em;
    }

    /* ══ CHEVRON ══ */
    .nu-chevron {
      position: relative;
      height: 36px;
      margin-top: -36px;
      z-index: 10;
    }
    .nu-chevron svg {
      width: 100%;
      height: 36px;
      display: block;
    }

    /* ══ CONTENT AREA ══ */
    .nu-content-area {
      position: relative;
      background: var(--nu-white);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,0,255,0.015) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    .doc-body {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 40px 40px;
    }

    /* ══ INFO GRID ══ */
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .info-block {
      border: 1px solid var(--nu-medium-gray);
      border-radius: 6px;
      overflow: hidden;
    }
    .info-block-header {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #1a1a5e 100%);
      color: var(--nu-white);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 14px;
    }
    .info-block-body {
      padding: 14px;
      min-height: 90px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .detail-field {
      border: 1px solid var(--nu-medium-gray);
      border-radius: 6px;
      overflow: hidden;
    }
    .detail-label {
      background: var(--nu-light-gray);
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--nu-blue);
      padding: 6px 12px;
      border-bottom: 1px solid var(--nu-medium-gray);
    }
    .detail-value {
      padding: 10px 12px;
      font-size: 0.9rem;
      min-height: 38px;
      color: var(--nu-dark-text);
    }

    /* ══ PRODUCT TABLE ══ */
    .product-section {
      margin: 28px 0;
    }
    .product-section-header {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #1a1a5e 100%);
      color: var(--nu-white);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 14px;
      border-radius: 6px 6px 0 0;
    }

    .product-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--nu-medium-gray);
      border-top: none;
    }
    .product-table thead th {
      background: var(--nu-light-gray);
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--nu-blue);
      padding: 10px 14px;
      text-align: left;
      border-bottom: 2px solid var(--nu-medium-gray);
    }
    .product-table thead th:last-child {
      text-align: center;
      width: 100px;
    }
    .product-table tbody td {
      padding: 12px 14px;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--nu-medium-gray);
      color: var(--nu-dark-text);
      vertical-align: top;
    }
    .product-table tbody td:last-child {
      text-align: center;
      font-weight: 700;
    }
    .product-table tbody td:first-child {
      font-family: var(--font-primary);
      font-weight: 700;
      color: var(--nu-blue);
      white-space: nowrap;
    }
    .product-table tbody tr:nth-child(even) {
      background: rgba(0, 0, 255, 0.012);
    }
    .product-table tbody tr.empty-row td {
      height: 38px;
      color: transparent;
    }
    .product-table tfoot td {
      border-top: 2px solid var(--nu-navy);
      padding: 8px 14px;
    }

    /* ══ PERSONNEL ROW ══ */
    .personnel-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 24px 0;
    }

    /* ══ INTERNAL NOTES ══ */
    .internal-section {
      margin-top: 28px;
      border: 2px dashed #CC0000;
      border-radius: 6px;
      overflow: hidden;
      page-break-inside: avoid;
    }
    .internal-header {
      background: linear-gradient(135deg, #CC0000 0%, #990000 100%);
      color: var(--nu-white);
      font-weight: 900;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .internal-header svg {
      width: 16px;
      height: 16px;
      fill: var(--nu-white);
      flex-shrink: 0;
    }
    .internal-body {
      padding: 16px;
      min-height: 80px;
      background: #FFF8F8;
      font-size: 0.85rem;
      color: #660000;
      line-height: 1.7;
    }
    .internal-body .qb-note {
      font-size: 0.72rem;
      color: #999;
      font-style: italic;
      margin-top: 8px;
    }

    /* ══ SIGNATURE ROW ══ */
    .signature-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
      padding-top: 20px;
    }
    .signature-block {
      border-top: 2px solid var(--nu-navy);
      padding-top: 8px;
    }
    .signature-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--nu-blue);
    }
    .signature-sub {
      font-size: 0.7rem;
      color: #999;
      margin-top: 2px;
    }

    /* ══ FOOTER DIVIDER ══ */
    .footer-divider {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .footer-divider-line {
      height: 3px;
      background: linear-gradient(90deg, var(--nu-blue) 0%, var(--nu-cyan) 50%, var(--nu-blue) 100%);
      border-radius: 2px;
    }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.8);
      padding: 24px 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-style: italic;
      font-weight: 300;
      font-size: 0.95rem;
      color: var(--nu-cyan);
      margin-bottom: 6px;
    }
    .nu-footer-motto {
      font-weight: 400;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .nu-footer-contact {
      font-size: 0.78rem;
      line-height: 1.7;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .nu-header { padding: 20px 16px 36px; }
      .header-layout { flex-direction: column; text-align: center; gap: 12px; }
      .logo-block { flex-direction: column; text-align: center; }
      .logo-text-block { text-align: center; }
      .doc-type-block { text-align: center; }
      .nu-logo-text { font-size: 1.8rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 0.8rem; letter-spacing: 0.5em; }
      .doc-body { padding: 20px 16px; }
      .info-row { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
      .personnel-grid { grid-template-columns: 1fr 1fr; }
      .signature-row { grid-template-columns: 1fr; }
    }

    /* ══ PRINT ══ */
    @media print {
      @page {
        size: letter;
        margin: 0.4in;
      }
      html { font-size: 14px; }
      body { background: white; }

      .nu-header {
        background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        padding: 20px 28px 32px;
        min-height: auto;
      }
      .nu-header::before,
      .nu-header::after {
        display: none;
      }

      .nu-chevron { height: 24px; margin-top: -24px; }
      .nu-chevron svg { height: 24px; }

      .doc-body { padding: 20px 0; }

      .info-block-header,
      .product-section-header {
        background: var(--nu-navy) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .product-table thead th {
        background: var(--nu-light-gray) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .product-table tbody tr:nth-child(even) {
        background: #f9f9fb !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .detail-label {
        background: var(--nu-light-gray) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .nu-card { box-shadow: none; border: 1px solid #ccc; }

      .internal-section {
        border-color: #CC0000 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .internal-header {
        background: #CC0000 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .internal-body {
        background: #FFF8F8 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .nu-footer {
        background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%) !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        padding: 16px 28px;
      }

      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
