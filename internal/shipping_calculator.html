<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norris Utilities&reg; &mdash; UPS Shipping Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/css/brand.css">
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#f5f6fa;color:#1a1a1a;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%);padding:32px 24px;text-align:center;position:relative;overflow:hidden}
.header-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50%;max-width:400px;opacity:0.06;pointer-events:none}
.header h1{font-weight:900;font-size:22px;color:#fff;letter-spacing:2px;position:relative;z-index:2}
.header p{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px;margin-top:4px;position:relative;z-index:2}

/* CHEVRON */
.chevron{position:relative;margin-top:-1px;z-index:10;line-height:0}
.chevron svg{display:block;width:100%}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:32px 20px 80px}

/* CARD */
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid #eee;margin-bottom:24px}

/* FORMULA BOX */
.formula-box{background:linear-gradient(135deg,#0a0e5c,#0033cc);border-radius:12px;padding:20px 24px;margin-bottom:24px;text-align:center}
.formula-box .label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#06D0FF;margin-bottom:6px}
.formula-box .formula{font-size:16px;font-weight:700;color:#fff;font-family:'Lato',sans-serif}
.formula-box .sacred{font-size:10px;color:rgba(255,255,255,0.4);margin-top:6px;letter-spacing:1px;text-transform:uppercase}

/* FORM */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:700;color:#555;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:'Lato',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus{border-color:#0033cc}
.form-input.money{font-size:20px;font-weight:700;color:#0033cc}

/* CALCULATE BTN */
.calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff;border:none;border-radius:10px;font-family:'Lato',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:transform .15s,box-shadow .15s}
.calc-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,51,204,0.35)}
.calc-btn:active{transform:translateY(0)}

/* RESULTS */
.results{display:none;animation:fadeIn .3s ease}
.results.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.result-item{text-align:center;padding:20px 12px;background:#f8f9fc;border-radius:12px}
.result-item .label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:6px}
.result-item .value{font-size:24px;font-weight:900}
.result-item .value.cost{color:#666}
.result-item .value.markup{color:#00802b}
.result-item .value.charge{color:#0033cc}
.result-customer{text-align:center;font-size:14px;color:#666;margin-bottom:16px}
.result-customer strong{color:#1a1a1a}

/* COPY BTN */
.copy-btn{width:100%;padding:14px;background:#fff;color:#0033cc;border:2px solid #0033cc;border-radius:10px;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.copy-btn:hover{background:#0033cc;color:#fff}
.copy-btn.copied{background:#00802b;color:#fff;border-color:#00802b}

/* LOG */
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.log-header h3{font-size:16px;font-weight:700;color:#0a0e5c}
.clear-btn{background:none;border:none;color:#cc0000;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase}
.clear-btn:hover{text-decoration:underline}
.log-table{width:100%;border-collapse:collapse;font-size:13px}
.log-table thead{background:linear-gradient(135deg,#0a0e5c,#0033cc);color:#fff}
.log-table th{padding:10px 12px;text-align:left;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase}
.log-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
.log-table tr:hover{background:#f8f9ff}
.log-empty{text-align:center;padding:24px;color:#aaa;font-size:14px}
.log-total{background:#f0f4ff;font-weight:700}
.log-total td{border-bottom:none}

/* FOOTER */
.footer{background:linear-gradient(135deg,#050824,#0a0e5c);padding:24px;text-align:center}
.footer p{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px}
.footer .copy{color:rgba(255,255,255,0.3);font-size:11px;margin-top:6px}

@media(max-width:500px){
  .result-grid{grid-template-columns:1fr}
  .result-item .value{font-size:20px}
  .log-table{font-size:11px}
  .log-table th,.log-table td{padding:8px 6px}
}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
