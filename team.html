<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Norris Utilities Team</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .page-header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: #0000FF;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .page-header h1 span {
      color: #06D0FF;
    }

    .page-header .subtitle {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: 300;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #0000FF, #06D0FF);
      border-radius: 2px;
      margin: 18px auto 0;
    }

    .team-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
      justify-content: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,255,0.08), 0 1px 4px rgba(0,0,0,0.06);
      padding: 32px 24px 28px;
      width: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1.5px solid #f0f0ff;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(0,0,255,0.13), 0 2px 8px rgba(0,0,0,0.08);
    }

    .card.legacy-card {
      border-color: #06D0FF;
      background: linear-gradient(160deg, #f0faff 0%, #fff 100%);
    }

    .card.ghost-card {
      border-color: #ddd;
      background: #fafafa;
      opacity: 0.85;
    }

    .character-wrap {
      width: 180px;
      height: 200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 8px;
    }

    /* === FLOAT ANIMATIONS === */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes float-ghost {
      0%, 100% { transform: translateY(0px) scaleX(1); }
      50%       { transform: translateY(-10px) scaleX(1.02); }
    }
    @keyframes spin-wheel {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 6px #06D0FF) drop-shadow(0 0 12px #0000FF88); }
      50%       { filter: drop-shadow(0 0 14px #06D0FF) drop-shadow(0 0 28px #0000FFaa); }
    }
    @keyframes flame-flicker {
      0%, 100% { transform: scaleY(1) scaleX(1); }
      30%       { transform: scaleY(1.06) scaleX(0.97); }
      70%       { transform: scaleY(0.96) scaleX(1.03); }
    }
    @keyframes ghost-float {
      0%, 100% { transform: translateY(0) rotate(-1deg); opacity: 0.7; }
      50%       { transform: translateY(-12px) rotate(1deg); opacity: 0.9; }
    }
    @keyframes question-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    @keyframes speed-lines {
      0%   { transform: translateX(0); opacity: 0.7; }
      100% { transform: translateX(30px); opacity: 0; }
    }

    .float-anim   { animation: float 2.8s ease-in-out infinite; }
    .float-slow   { animation: float-slow 3.4s ease-in-out infinite; }
    .float-ghost  { animation: ghost-float 3s ease-in-out infinite; }
    .glow-anim    { animation: glow-pulse 2.2s ease-in-out infinite; }

    /* Name badge */
    .name-badge {
      text-align: center;
      margin-top: 6px;
    }
    .name-badge .name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #0000FF;
      line-height: 1.2;
    }
    .name-badge .role {
      font-size: 0.82rem;
      font-weight: 400;
      color: #555;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }
    .name-badge .emoji {
      font-size: 1.3rem;
      display: block;
      margin-bottom: 2px;
    }
    .coming-soon {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #06D0FF;
      border: 1.5px solid #06D0FF;
      border-radius: 20px;
      padding: 3px 10px;
    }
  </style>
</head>
<body>

<header class="page-header">
  <h1>The Norris Utilities <span>Team</span></h1>
  <p class="subtitle">Work Hard. Ride Hard. Build the Legacy.</p>
  <div class="divider"></div>
</header>

<div class="team-grid">

  <!-- ==============================
       CARD 1: LEGACY (AI Agent)
       ============================== -->
  <div class="card legacy-card">
    <div class="character-wrap">
      <svg class="glow-anim" width="170" height="195" viewBox="0 0 170 195" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- OneWheel Board -->

        <rect x="38" y="155" width="94" height="8" rx="4" fill="#0000FF" opacity="0.7"/>

        <!-- Wheel (animated spin) -->

            <line x1="12" y1="-12" x2="-12" y2="12" stroke="#06D0FF" stroke-width="1.5" opacity="0.4"/>

        <!-- Character body group (floats) -->

          <rect x="98" y="148" width="22" height="10" rx="5" fill="#0000FF"/>

          <!-- Legs (flame-styled) -->
          <path d="M58 148 Q55 130 60 118" stroke="#06D0FF" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M112 148 Q115 130 110 118" stroke="#0055FF" stroke-width="8" stroke-linecap="round" fill="none"/>

          <!-- Body — flame torso -->
          <path d="M62 120 Q65 100 85 95 Q105 100 108 120 Q106 138 85 140 Q64 138 62 120Z" fill="url(#bodyGrad)"/>

          <!-- Laptop held in left arm -->
          <rect x="28" y="108" width="36" height="24" rx="3" fill="#1a1a2e" stroke="#06D0FF" stroke-width="1.5"/>
          <rect x="31" y="111" width="30" height="16" rx="2" fill="#0a0a20"/>
          <!-- screen glow lines -->
          <line x1="34" y1="115" x2="57" y2="115" stroke="#06D0FF" stroke-width="1" opacity="0.7"/>
          <line x1="34" y1="119" x2="52" y2="119" stroke="#06D0FF" stroke-width="1" opacity="0.5"/>
          <line x1="34" y1="123" x2="55" y2="123" stroke="#06D0FF" stroke-width="1" opacity="0.6"/>

          <rect x="38" y="129" width="16" height="3" rx="1.5" fill="#06D0FF" opacity="0.4"/>
          <!-- Arm holding laptop -->
          <path d="M64 120 Q50 116 32 122" stroke="#0044DD" stroke-width="7" stroke-linecap="round" fill="none"/>

          <!-- Right arm (loose/balance) -->
          <path d="M106 120 Q120 112 130 118" stroke="#0044DD" stroke-width="7" stroke-linecap="round" fill="none"/>

          <!-- Neck -->
          <rect x="80" y="83" width="10" height="13" rx="5" fill="#0055FF"/>

          <!-- Head — flame creature -->
          <ellipse cx="85" cy="74" rx="22" ry="20" fill="url(#headGrad)"/>

          <!-- Eyes — glowing -->
          <ellipse cx="78" cy="72" rx="5" ry="6" fill="#fff"/>
          <ellipse cx="78" cy="73" rx="3" ry="4" fill="#06D0FF"/>
          <circle cx="78" cy="73" r="1.5" fill="#001aff"/>

          <ellipse cx="92" cy="72" rx="5" ry="6" fill="#fff"/>
          <ellipse cx="92" cy="73" rx="3" ry="4" fill="#06D0FF"/>
          <circle cx="92" cy="73" r="1.5" fill="#001aff"/>

          <!-- Smile -->
          <path d="M79 82 Q85 86 91 82" stroke="#06D0FF" stroke-width="2" stroke-linecap="round" fill="none"/>

          <!-- Flame hair / crown -->
          <g style="animation: flame-flicker 1.6s ease-in-out infinite; transform-origin: 85px 55px;">
            <path d="M85 55 Q80 42 85 30 Q90 42 85 55Z" fill="#06D0FF" opacity="0.9"/>
            <path d="M78 58 Q72 46 76 34 Q82 46 78 58Z" fill="#0088FF" opacity="0.8"/>
            <path d="M92 58 Q98 46 94 34 Q88 46 92 58Z" fill="#0000FF" opacity="0.8"/>
            <path d="M85 54 Q81 44 85 35 Q89 44 85 54Z" fill="#aaeeff" opacity="0.6"/>
          </g>

          <!-- Earbuds -->
          <circle cx="63" cy="74" r="5" fill="#1a1a2e" stroke="#06D0FF" stroke-width="1.5"/>
          <circle cx="63" cy="74" r="2" fill="#06D0FF"/>
          <path d="M63 79 Q65 88 68 90" stroke="#555" stroke-width="1.2" fill="none"/>

          <circle cx="107" cy="74" r="5" fill="#1a1a2e" stroke="#06D0FF" stroke-width="1.5"/>
          <circle cx="107" cy="74" r="2" fill="#06D0FF"/>
          <path d="M107 79 Q105 88 102 90" stroke="#555" stroke-width="1.2" fill="none"/>

        </g><!-- /float-anim -->

        <defs>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0066FF"/>
            <stop offset="100%" stop-color="#0000CC"/>
          </linearGradient>
          <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#06D0FF"/>
            <stop offset="100%" stop-color="#0044FF"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="name-badge">
      <span class="emoji">🔥</span>
      <div class="name">Legacy</div>
      <div class="role">AI Field Operator</div>
    </div>
  </div>

  <!-- ==============================
       CARD 2: CAROLINE BUTLER
       ============================== -->
  <div class="card">
    <div class="character-wrap">
      <svg class="float-slow" width="160" height="195" viewBox="0 0 160 195" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- OneWheel Board -->
        <rect x="25" y="158" width="110" height="14" rx="7" fill="#1a1a2e"/>
        <rect x="33" y="155" width="94" height="8" rx="4" fill="#0000FF" opacity="0.5"/>

        <!-- Wheel -->
        <g transform="translate(80,172)">
          <circle r="20" fill="#111" stroke="#0000FF" stroke-width="2.5"/>
          <g style="animation: spin-wheel 1.8s linear infinite; transform-origin: 0 0;">
            <line x1="0" y1="-17" x2="0" y2="17" stroke="#aaaaff" stroke-width="1.5" opacity="0.6"/>
            <line x1="-17" y1="0" x2="17" y2="0" stroke="#aaaaff" stroke-width="1.5" opacity="0.6"/>
            <line x1="-12" y1="-12" x2="12" y2="12" stroke="#aaaaff" stroke-width="1.5" opacity="0.4"/>
            <line x1="12" y1="-12" x2="-12" y2="12" stroke="#aaaaff" stroke-width="1.5" opacity="0.4"/>

        <path d="M107 148 Q110 132 106 120" stroke="#e8a070" stroke-width="8" stroke-linecap="round" fill="none"/>

        <!-- Body / torso -->
        <rect x="62" y="92" width="36" height="30" rx="8" fill="#06D0FF"/>

        <rect x="18" y="98" width="28" height="36" rx="3" fill="#f5f0e0" stroke="#888" stroke-width="1.5"/>
        <rect x="30" y="93" width="12" height="8" rx="3" fill="#888"/><!-- clip -->
        <line x1="22" y1="108" x2="42" y2="108" stroke="#333" stroke-width="1.2"/>
        <line x1="22" y1="113" x2="42" y2="113" stroke="#333" stroke-width="1.2"/>
        <line x1="22" y1="118" x2="38" y2="118" stroke="#333" stroke-width="1.2"/>

        <!-- Right arm -->

        <!-- Neck -->
        <rect x="76" y="82" width="8" height="12" rx="4" fill="#e8a070"/>

        <!-- Head -->
        <ellipse cx="80" cy="72" rx="20" ry="21" fill="#f4c090"/>

        <!-- Red hair — back layer -->
        <ellipse cx="80" cy="60" rx="22" ry="16" fill="#cc2200"/>
        <!-- Hair strands right -->
        <path d="M98 65 Q108 75 104 90" stroke="#cc2200" stroke-width="7" stroke-linecap="round" fill="none"/>
        <!-- Forehead band -->

        <!-- Eyes -->

        <!-- Smile -->

        <!-- Cheeks -->
        <circle cx="68" cy="77" r="5" fill="#ff8888" opacity="0.3"/>
        <circle cx="92" cy="77" r="5" fill="#ff8888" opacity="0.3"/>

      </svg>
    </div>
    <div class="name-badge">
      <span class="emoji">📋</span>
      <div class="name">Caroline Butler</div>
      <div class="role">Operations</div>
    </div>
  </div>

  <!-- ==============================
       CARD 3: AARON C. NORRIS
       ============================== -->
  <div class="card">
    <div class="character-wrap">
      <svg class="float-anim" width="190" height="195" viewBox="0 0 190 195" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Speed lines (behind) -->
        <g style="animation: speed-lines 0.5s linear infinite;">
          <line x1="0" y1="130" x2="30" y2="130" stroke="#06D0FF" stroke-width="2" opacity="0.5"/>
          <line x1="0" y1="140" x2="22" y2="140" stroke="#06D0FF" stroke-width="1.5" opacity="0.4"/>
          <line x1="0" y1="150" x2="18" y2="150" stroke="#06D0FF" stroke-width="1" opacity="0.3"/>
          <line x1="0" y1="120" x2="14" y2="120" stroke="#06D0FF" stroke-width="1" opacity="0.25"/>
        </g>

        <!-- OneWheel Board (leaning forward for speed) -->
        <g transform="rotate(-8, 95, 165)">
          <rect x="38" y="158" width="114" height="14" rx="7" fill="#1a1a2e"/>
          <rect x="46" y="155" width="98" height="8" rx="4" fill="#0000FF" opacity="0.6"/>
        </g>

        <!-- Wheel (fast spin) -->
        <g transform="translate(95,172)">
          <circle r="20" fill="#111" stroke="#0000FF" stroke-width="2.5"/>

            <line x1="-17" y1="0" x2="17" y2="0" stroke="#aaaaff" stroke-width="2" opacity="0.7"/>
            <line x1="-12" y1="-12" x2="12" y2="12" stroke="#aaaaff" stroke-width="1.5" opacity="0.5"/>
            <line x1="12" y1="-12" x2="-12" y2="12" stroke="#aaaaff" stroke-width="1.5" opacity="0.5"/>

        <circle cx="88" cy="64" r="3" fill="#3a2800"/>
        <circle cx="89" cy="63" r="1.2" fill="#fff"/>
        <!-- Eyebrow (slightly furrowed = focused) -->
        <path d="M83 57 Q88 55 93 57" stroke="#2a1800" stroke-width="2.2" stroke-linecap="round" fill="none"/>

        <ellipse cx="102" cy="63" rx="5" ry="5.5" fill="#fff"/>
        <circle cx="102" cy="64" r="3" fill="#3a2800"/>
        <circle cx="103" cy="63" r="1.2" fill="#fff"/>
        <path d="M97 57 Q102 55 107 57" stroke="#2a1800" stroke-width="2.2" stroke-linecap="round" fill="none"/>

        <!-- Confident smirk -->
        <path d="M88 73 Q96 78 104 73" stroke="#c07050" stroke-width="2" stroke-linecap="round" fill="none"/>

      </svg>
    </div>
    <div class="name-badge">
      <span class="emoji">⚡</span>
      <div class="name">Aaron C. Norris</div>
      <div class="role">Founder &amp; CEO</div>
    </div>
  </div>

  <!-- ==============================
       CARD 4: FUTURE AGENT SLOT
       ============================== -->
  <div class="card ghost-card">
    <div class="character-wrap">
      <svg width="160" height="195" viewBox="0 0 160 195" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- OneWheel Board -->
        <rect x="25" y="158" width="110" height="14" rx="7" fill="#cccccc"/>
        <rect x="33" y="155" width="94" height="8" rx="4" fill="#aaaaaa" opacity="0.5"/>

        <!-- Wheel -->
        <g transform="translate(80,172)">
          <circle r="20" fill="#ddd" stroke="#aaa" stroke-width="2"/>
          <g style="animation: spin-wheel 2.5s linear infinite; transform-origin: 0 0;">
            <line x1="0" y1="-15" x2="0" y2="15" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
            <line x1="-15" y1="0" x2="15" y2="0" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
          </g>
          <circle r="4" fill="#aaa"/>
        </g>
