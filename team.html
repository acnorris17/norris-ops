<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Team — Norris Utilities®</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
  <style>
    /* ══ ROOT VARIABLES ══ */
    :root {
      --nu-blue: #0000FF;
      --nu-cyan: #06D0FF;
      --nu-navy: #000033;
      --nu-white: #FFFFFF;
      --nu-light-gray: #F5F5F7;
      --nu-medium-gray: #E8E8EC;
      --nu-dark-text: #1A1A2E;
      --nu-body-text: #333333;
      --font-primary: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ══ BASE ══ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-primary);
      color: var(--nu-body-text);
      background: var(--nu-white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ HEADER ══ */
    .nu-header {
      position: relative;
      background: linear-gradient(135deg, var(--nu-blue) 0%, #0033CC 40%, var(--nu-cyan) 100%);
      padding: 60px 40px 80px;
      text-align: center;
      overflow: hidden;
      min-height: 300px;
    }
    .nu-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.03) 75%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 80px);
      background-size: 40px 40px, 40px 40px, 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      z-index: 1;
      opacity: 0.6;
    }
    .nu-header::after {
      content: '';
      position: absolute;
      top: -50%; right: -20%;
      width: 80%; height: 200%;
      background: radial-gradient(ellipse, rgba(6, 208, 255, 0.15) 0%, transparent 70%);
      z-index: 1;
    }
    .nu-header * { position: relative; z-index: 2; }

    .nu-phoenix-icon { width: 80px; height: 80px; margin: 0 auto 16px; }
    .nu-phoenix-icon svg { width: 100%; height: 100%; }
    .nu-logo-text {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 3.2rem;
      color: var(--nu-white);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .nu-logo-subtitle {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--nu-white);
      letter-spacing: 0.8em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .nu-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.3rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.05em;
    }
    .header-page-title {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--nu-white);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 24px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .header-page-subtitle {
      font-family: var(--font-primary);
      font-weight: 300;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.08em;
      margin-top: 6px;
    }

    /* ══ CHEVRON ══ */
    .nu-chevron { position: relative; height: 50px; margin-top: -50px; z-index: 10; }
    .nu-chevron svg { width: 100%; height: 50px; display: block; }

    /* ══ CONTENT AREA ══ */
    .nu-content-area {
      position: relative;
      background: var(--nu-white);
    }
    .nu-content-area::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,0,255,0.02) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .nu-content-area > * { position: relative; z-index: 1; }

    /* ══ TEAM GRID ══ */
    .team-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px 40px;
    }
    .section-label {
      text-align: center;
      margin-bottom: 48px;
    }
    .section-label h2 {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.6rem;
      color: var(--nu-blue);
      letter-spacing: 0.08em;
    }
    .section-label h2 span { color: var(--nu-dark-text); font-weight: 700; }
    .section-label .accent-line {
      width: 80px; height: 4px;
      background: linear-gradient(90deg, var(--nu-blue), var(--nu-cyan));
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 36px;
      justify-items: center;
    }

    /* ══ CARDS ══ */
    .team-card {
      background: var(--nu-white);
      border-radius: 16px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 24px rgba(0,0,255,0.06), 0 1px 4px rgba(0,0,0,0.04);
      border: 1.5px solid var(--nu-medium-gray);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .team-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,255,0.12), 0 4px 12px rgba(0,0,0,0.06);
    }
    .team-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--nu-blue), var(--nu-cyan));
      border-radius: 16px 16px 0 0;
    }

    .team-card.featured { border-color: var(--nu-cyan); }
    .team-card.featured::before {
      height: 5px;
      background: linear-gradient(90deg, var(--nu-cyan), var(--nu-blue), var(--nu-cyan));
    }
    .team-card.ghost {
      border-color: #ddd;
      background: linear-gradient(180deg, #fafafa 0%, #f0f0f2 100%);
      opacity: 0.9;
    }
    .team-card.ghost::before {
      background: linear-gradient(90deg, #ccc, #ddd, #ccc);
    }

    .character-stage {
      width: 220px;
      height: 240px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 16px;
    }

    .member-info {
      text-align: center;
    }
    .member-name {
      font-family: var(--font-primary);
      font-weight: 900;
      font-size: 1.15rem;
      color: var(--nu-blue);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .member-role {
      font-family: var(--font-primary);
      font-weight: 400;
      font-size: 0.92rem;
      color: #666;
      letter-spacing: 0.02em;
    }
    .member-detail {
      font-size: 0.82rem;
      font-weight: 300;
      color: #888;
      margin-top: 8px;
      line-height: 1.5;
    }
    .badge-tag {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--nu-cyan);
      border: 1.5px solid var(--nu-cyan);
      border-radius: 20px;
      padding: 4px 14px;
    }
    .badge-tag.ghost-tag {
      color: #aaa;
      border-color: #ccc;
    }

    /* ══ ANIMATIONS ══ */
    @keyframes ride {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-6px) rotate(-0.5deg); }
      50% { transform: translateY(-10px) rotate(0deg); }
      75% { transform: translateY(-6px) rotate(0.5deg); }
    }
    @keyframes ride-fast {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      30% { transform: translateY(-8px) rotate(0deg); }
      60% { transform: translateY(-12px) rotate(1deg); }
      80% { transform: translateY(-5px) rotate(0deg); }
    }
    @keyframes ride-smooth {
      0%, 100% { transform: translateY(0) rotate(0.3deg); }
      50% { transform: translateY(-7px) rotate(-0.3deg); }
    }
    @keyframes spin-wheel {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(6,208,255,0.4)) drop-shadow(0 0 16px rgba(0,0,255,0.2)); }
      50% { filter: drop-shadow(0 0 16px rgba(6,208,255,0.7)) drop-shadow(0 0 32px rgba(0,0,255,0.4)); }
    }
    @keyframes flame-dance {
      0%, 100% { transform: scaleY(1) scaleX(1) translateY(0); }
      20% { transform: scaleY(1.08) scaleX(0.95) translateY(-2px); }
      40% { transform: scaleY(0.94) scaleX(1.05) translateY(1px); }
      60% { transform: scaleY(1.06) scaleX(0.97) translateY(-1px); }
      80% { transform: scaleY(0.97) scaleX(1.02) translateY(0); }
    }
    @keyframes steam-rise {
      0% { transform: translateY(0) scaleX(1); opacity: 0.5; }
      50% { transform: translateY(-8px) scaleX(1.3); opacity: 0.3; }
      100% { transform: translateY(-16px) scaleX(1.6); opacity: 0; }
    }
    @keyframes speed-trail {
      0% { transform: translateX(0); opacity: 0.6; }
      100% { transform: translateX(35px); opacity: 0; }
    }
    @keyframes ghost-drift {
      0%, 100% { transform: translateY(0) rotate(-1deg); opacity: 0.6; }
      50% { transform: translateY(-14px) rotate(1deg); opacity: 0.85; }
    }
    @keyframes question-blink {
      0%, 40%, 100% { opacity: 0.25; }
      50%, 90% { opacity: 0.7; }
    }
    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.08); opacity: 0.05; }
    }
    @keyframes clipboard-check {
      0%, 80%, 100% { transform: rotate(0deg); }
      85% { transform: rotate(-3deg); }
      90% { transform: rotate(2deg); }
      95% { transform: rotate(-1deg); }
    }
    @keyframes hair-blow {
      0%, 100% { transform: rotate(0deg) scaleX(1); }
      30% { transform: rotate(2deg) scaleX(1.02); }
      70% { transform: rotate(-1deg) scaleX(0.98); }
    }
    @keyframes data-scroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-10px); }
    }
    @keyframes blink-eyes {
      0%, 46%, 50%, 100% { transform: scaleY(1); }
      48% { transform: scaleY(0.1); }
    }

    .anim-ride { animation: ride 3s ease-in-out infinite; }
    .anim-ride-fast { animation: ride-fast 2.4s ease-in-out infinite; }
    .anim-ride-smooth { animation: ride-smooth 3.6s ease-in-out infinite; }
    .anim-glow { animation: glow-pulse 2.5s ease-in-out infinite; }
    .anim-ghost { animation: ghost-drift 3.2s ease-in-out infinite; }

    /* ══ GROUND SHADOWS ══ */
    .ground-shadow {
      fill: rgba(0,0,0,0.08);
    }
    @keyframes shadow-pulse {
      0%, 100% { rx: 40; ry: 6; opacity: 0.08; }
      50% { rx: 35; ry: 5; opacity: 0.04; }
    }

    /* ══ FOOTER ══ */
    .nu-footer {
      background: linear-gradient(135deg, var(--nu-navy) 0%, #000066 100%);
      color: rgba(255,255,255,0.85);
      padding: 48px 40px;
      text-align: center;
      font-family: var(--font-primary);
    }
    .nu-footer-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.3rem;
      color: var(--nu-cyan);
      margin-bottom: 16px;
    }
    .nu-footer-contact {
      font-size: 1.05rem;
      line-height: 2;
    }
    .nu-footer-contact a {
      color: var(--nu-cyan);
      text-decoration: none;
    }
    .nu-footer-contact a:hover {
      text-decoration: underline;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 768px) {
      .nu-header { padding: 40px 20px 60px; min-height: 240px; }
      .nu-logo-text { font-size: 2rem; letter-spacing: 0.2em; }
      .nu-logo-subtitle { font-size: 1rem; letter-spacing: 0.5em; }
      .nu-tagline { font-size: 1rem; }
      .header-page-title { font-size: 1.3rem; }
      .team-section { padding: 40px 20px 20px; }
      .team-grid { grid-template-columns: 1fr; gap: 28px; }
      .team-card { max-width: 340px; }
      .nu-footer { padding: 36px 20px; }
      .nu-footer-contact { font-size: 0.95rem; }
    }

    /* ══ PRINT ══ */
    @media print {
      .nu-header { background: var(--nu-blue) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .team-card { box-shadow: none; border: 1px solid #ccc; }
      .nu-footer { background: var(--nu-navy) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
