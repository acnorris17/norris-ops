<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SD-2026-LINETEC-0402</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Lato',sans-serif; color:#1a1a2e; background:#fff; max-width:850px; margin:0 auto; padding:36px; }
.header { display:flex; align-items:flex-end; justify-content:space-between; gap:24px; padding-bottom:16px; margin-bottom:20px; border-bottom:1px solid #ccc; }
.header-logo { flex:0 0 55%; }
.header-logo img { width:100%; height:auto; display:block; }
.header-info { flex:1; text-align:right; font-size:11px; color:#555; line-height:2; padding-bottom:2px; }
.header-info strong { font-size:13px; font-weight:900; color:#1a1a2e; display:block; margin-bottom:4px; }
.doc-title-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px; }
.doc-title { font-size:20px; font-weight:900; letter-spacing:3px; text-transform:uppercase; }
.doc-meta { text-align:right; font-size:11px; color:#555; line-height:2.1; }
.address-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px; }
.addr-block { border:1px solid #ccc; border-radius:4px; overflow:hidden; }
.addr-head { background:#f2f2f2; border-bottom:1px solid #ccc; padding:6px 12px; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.addr-body { padding:12px; font-size:12px; line-height:1.9; }
.meta-grid { display:grid; grid-template-columns:repeat(4,1fr); border:1px solid #ccc; border-radius:4px; overflow:hidden; margin-bottom:14px; }
.meta-cell { padding:9px 12px; border-right:1px solid #ccc; }
.meta-cell:last-child { border-right:none; }
.meta-label { font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#888; margin-bottom:3px; }
.meta-val { font-size:12px; font-weight:700; }
table.items { width:100%; border-collapse:collapse; border:1px solid #ccc; border-radius:4px; overflow:hidden; margin-bottom:14px; font-size:12px; }
table.items thead tr { background:#f2f2f2; }
table.items thead th { padding:9px 12px; text-align:left; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; border-bottom:1px solid #ccc; }
table.items thead th.qty { text-align:center; width:70px; }
table.items tbody tr { border-bottom:1px solid #eee; }
table.items tbody tr:last-child { border-bottom:none; }
table.items tbody td { padding:13px 12px; vertical-align:top; }
table.items tbody td.qty { text-align:center; font-weight:900; font-size:22px; vertical-align:middle; }
.sku { font-size:10px; font-weight:700; background:#eee; border-radius:3px; padding:2px 6px; display:inline-block; margin-bottom:4px; }
.pname { font-weight:700; font-size:13px; margin-bottom:2px; }
.pdesc { font-size:11px; color:#777; }
.thankyou { text-align:center; padding:14px 0; font-size:12px; color:#555; font-style:italic; line-height:1.9; border-top:1px solid #eee; margin-bottom:18px; }
.footer { display:flex; justify-content:space-between; align-items:center; padding-top:12px; border-top:1px solid #ddd; }
.footer img { height:34px; }
.footer-tag { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; }
@media print { @page { margin:0.5in; size:letter; } }
</style>
</head>
<body>
</body>
</html>
