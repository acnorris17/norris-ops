<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping Documents — Norris Utilities</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Lato,sans-serif;background:#fff;color:#1a1a2e}
.sticky-nav{position:sticky;top:0;z-index:1000;background:rgba(0,0,80,0.95);backdrop-filter:blur(8px);display:flex;justify-content:center;gap:0;border-bottom:2px solid #06D0FF}
.sticky-nav a{color:#fff;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:14px 20px;transition:background .2s,color .2s}
.sticky-nav a:hover,.sticky-nav a.active{background:rgba(6,208,255,0.15);color:#06D0FF}
.header{position:relative;background:linear-gradient(135deg,#0000FF 0%,#0033CC 40%,#06D0FF 100%);padding:50px 40px 70px;text-align:center;overflow:hidden}
.header-logo{height:60px;position:relative;z-index:2;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3))}
.chevron-wrapper{position:relative;margin-top:-1px;z-index:10;line-height:0}
.chevron-wrapper svg{display:block;width:100%}
.content{max-width:900px;margin:0 auto;padding:48px 32px 80px}
h1{font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#0000FF;margin-bottom:32px}
h1::after{content:'';display:block;width:40px;height:3px;background:linear-gradient(90deg,#0000FF,#06D0FF);margin-top:10px;border-radius:2px}
.sd-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.sd-list a{display:flex;align-items:center;gap:14px;padding:18px 22px;background:#f8f9fc;border:1px solid #e8eaf0;border-radius:10px;text-decoration:none;color:#1a1a2e;font-weight:700;font-size:14px;transition:all .2s}
.sd-list a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,255,0.08);border-color:#06D0FF}
.sd-list a span.icon{font-size:20px}
.footer{background:linear-gradient(135deg,#0000FF 0%,#0033CC 40%,#06D0FF 100%);padding:32px;text-align:center}
.footer-logo{height:40px;opacity:0.9}
.footer-text{color:rgba(255,255,255,0.6);font-size:11px;margin-top:10px;letter-spacing:1px}
@media(max-width:768px){.content{padding:32px 16px 60px}.sticky-nav{flex-wrap:wrap}.sticky-nav a{padding:10px 14px;font-size:11px}}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
