<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legacy Agent — Task Calendar &amp; Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/brand.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-dark: #0000FF;
      --blue-light: #06D0FF;
      --white: #ffffff;
      --gray-bg: #f4f6fb;
      --gray-border: #dde3ef;
      --text-dark: #1a1a2e;
      --text-mid: #3a4060;
      --shadow: 0 2px 12px rgba(0,0,191,0.10);
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--gray-bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
      position: relative;
      overflow: hidden;
      padding: 48px 40px 80px;
      text-align: center;
    }

    .header-svg-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.07;
      pointer-events: none;
    }

    .header-logo {
      display: block;
      margin: 0 auto 20px;
      max-width: 320px;
      height: auto;
      position: relative;
      z-index: 2;
    }

    .header-title {
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0,0,100,0.25);
    }

    .header-subtitle {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      margin-top: 8px;
      letter-spacing: 0.08em;
      position: relative;
      z-index: 2;
    }

    /* ===== CHEVRON TRANSITION ===== */
    .chevron-transition {
      display: block;
      width: 100%;
      margin-top: -2px;
      line-height: 0;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ===== SECTION HEADING ===== */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      margin-top: 48px;
    }

    .section-heading:first-child {
      margin-top: 0;
    }

    .section-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0000FF, #06D0FF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.4rem;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0,0,255,0.22);
    }

    .section-heading h2 {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--blue-dark);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .section-heading .section-sub {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-mid);
      margin-top: 2px;
    }

    /* ===== SECTION 1: HORIZONTAL TIMELINE ===== */
    .timeline-scroll {
      overflow-x: auto;
      padding-bottom: 12px;
    }

    .timeline-track {
      display: flex;
      align-items: flex-start;
      gap: 0;
      position: relative;
      min-width: 900px;
      padding: 24px 0 12px;
    }

    .timeline-track::before {
      content: '';
      position: absolute;
      top: 36px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #0000FF, #06D0FF);
      border-radius: 3px;
    }

    .timeline-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .timeline-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0000FF, #06D0FF);
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px #0000FF;
      z-index: 2;
      margin-bottom: 10px;
      margin-top: 0;
    }

    .timeline-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 10px 10px;
      text-align: center;
      max-width: 110px;
      margin: 0 4px;
      border-top: 3px solid var(--blue-dark);
    }

    .timeline-time {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--blue-light);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .timeline-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.3;
    }

    /* ===== SECTION 2: WEEK CARDS ===== */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .week-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 18px 16px;
      border-left: 4px solid var(--blue-dark);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .week-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,255,0.15);
    }

    .week-card.critical {
      border-left-color: #FF2D55;
      background: #fff5f7;
    }

    .week-card-date {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--blue-light);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    .week-card.critical .week-card-date {
      color: #FF2D55;
    }

    .week-card-tasks {
      list-style: none;
      padding: 0;
    }

    .week-card-tasks li {
      font-size: 0.84rem;
      color: var(--text-dark);
      padding: 4px 0;
      border-bottom: 1px solid var(--gray-border);
      line-height: 1.4;
    }

    .week-card-tasks li:last-child {
      border-bottom: none;
    }

    .badge-critical {
      display: inline-block;
      background: #FF2D55;
      color: #fff;
      font-size: 0.62rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ===== SECTION 3: KANBAN ===== */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) {
      .kanban-board { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 550px) {
      .kanban-board { grid-template-columns: 1fr; }
    }

    .kanban-col {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .kanban-col-header {
      padding: 14px 16px;
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kanban-col-header .col-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .col-planning .kanban-col-header { background: #e8eeff; color: #0000FF; }
    .col-inprogress .kanban-col-header { background: #fff3e0; color: #e67e00; }
    .col-nearlydone .kanban-col-header { background: #e8f7ff; color: #008ecf; }
    .col-done .kanban-col-header { background: #e8fef0; color: #19a449; }

    .kanban-items {
      background: #fff;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 200px;
    }

    .kanban-item {
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.83rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-dark);
      border-left: 3px solid;
    }

    .col-planning .kanban-item { background: #f4f6ff; border-color: #0000FF; }
    .col-inprogress .kanban-item { background: #fff8f0; border-color: #e67e00; }
    .col-nearlydone .kanban-item { background: #f0faff; border-color: #06D0FF; }
    .col-done .kanban-item { background: #f0fef5; border-color: #19a449; color: #555; }

    .col-done .kanban-item {
      text-decoration: line-through;
      opacity: 0.75;
    }

    /* ===== SECTION 4: JOURNAL ===== */
    .journal-card {
      background: #fffff8;
      border: 1px solid #e8e2c0;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,100,0.06);
      padding: 36px 40px;
      position: relative;
      overflow: hidden;
    }

    .journal-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #0000FF, #06D0FF);
      border-radius: 4px 0 0 4px;
    }

    .journal-lines {
      background-image: repeating-linear-gradient(
        transparent,
        transparent 31px,
        #e8e2c0 31px,
        #e8e2c0 32px
      );
      padding: 4px 0;
    }

    .journal-date {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      font-weight: 600;
      color: #0000FF;
      margin-bottom: 14px;
    }

    .journal-text {
      font-family: 'Caveat', cursive;
      font-size: 1.35rem;
      line-height: 2rem;
      color: #2a2a2a;
    }

    .journal-signature {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      font-weight: 600;
      color: #0000FF;
      margin-top: 18px;
      text-align: right;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: linear-gradient(135deg, #0000FF 0%, #06D0FF 100%);
      padding: 32px 40px;
      text-align: center;
      margin-top: 60px;
    }

    .footer-logo {
      display: block;
      margin: 0 auto 14px;
      max-width: 200px;
      height: auto;
    }

    .footer-tagline {
      color: rgba(255,255,255,0.85);
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .footer-built {
      color: rgba(255,255,255,0.55);
      font-size: 0.72rem;
      margin-top: 10px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){var r=sessionStorage.getItem('nu_role');if(sessionStorage.getItem('nu_auth_2026')==='granted'&&(r==='aaron'||r==='cb')){document.getElementById('auth-wall').style.display='none';if(r==='cb'){document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else if(p==='legacy2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','cb');document.getElementById('auth-wall').style.display='none';document.querySelectorAll('.aaron-only').forEach(function(el){el.style.display='none'})}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

<!-- HEADER -->
<div class="header">
  <div class="header-title">NORRIS UTILITIES&reg;</div>
  <div class="header-subtitle">Task Calendar &amp; Timeline</div>
</div>
<div class="chevron-transition">
  <svg viewBox="0 0 1440 50" preserveAspectRatio="none" style="width:100%;height:50px;display:block;"><polygon fill="#f4f6fb" points="0,50 548,0 1440,50"/></svg>
</div>

<div class="main-content" style="text-align:center;">
  <div style="background:#fff;border-radius:12px;padding:48px 32px;box-shadow:0 2px 12px rgba(0,0,191,0.10);border-top:3px solid #0000FF;">
    <div style="font-size:3rem;margin-bottom:16px;">📅</div>
    <h2 style="font-weight:900;font-size:1.4rem;color:#1a1a2e;margin-bottom:12px;">Coming Soon</h2>
    <p style="color:#666;font-size:1rem;line-height:1.6;max-width:500px;margin:0 auto 24px;">
      The full calendar and timeline view is being built. View scheduled tasks, deadlines, and upcoming milestones here.
    </p>
    <a href="/" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#0000FF,#06D0FF);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Back to Portal</a>
  </div>
</div>

<div class="footer">
  <div class="footer-tagline">A Legacy of Commitment&reg;</div>
  <div class="footer-built">Norris Utilities, LLC &mdash; Birmingham, Alabama</div>
</div>

</body>
</html>
