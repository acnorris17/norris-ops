<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mississippi Power — Rope Ordering Portal | Norris Utilities&reg;</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/css/brand.css">
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/brand.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:#f5f6fa;color:#1a1a1a;min-height:100vh}

/* LOGIN */
.login-overlay{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%)}
.login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:44px 36px;width:92%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0000FF,#06D0FF)}
.login-logo{height:50px;margin:0 auto 12px}
.login-title{font-weight:900;font-size:18px;color:#0a0e5c;margin-bottom:2px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.login-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;font-family:'Lato',sans-serif;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#0033cc}
.login-input.error{border-color:#cc0000;animation:shake .4s}
.login-btn{width:100%;padding:14px;margin-top:14px;background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,51,204,0.35)}
.login-error{color:#cc0000;font-size:13px;font-weight:700;margin-top:10px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-4px)}}

/* HEADER */
.header{position:relative;background:linear-gradient(135deg,#0a0e5c 0%,#0033cc 30%,#0066ee 50%,#00aaff 75%,#06D0FF 100%);padding:28px 20px 48px;text-align:center;overflow:hidden}
.header-wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55%;max-width:500px;opacity:0.06;pointer-events:none}
.header-content{position:relative;z-index:2}
.header-logo{height:48px;margin:0 auto 8px}
.header-title{font-weight:900;font-size:14px;color:rgba(255,255,255,0.7);letter-spacing:3px;text-transform:uppercase}
.header-tagline{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px;margin-top:4px}

/* CHEVRON */
.chev{position:relative;margin-top:-1px;z-index:10;line-height:0}
.chev svg{display:block;width:100%}

/* TABS */
.tab-bar{position:sticky;top:0;z-index:900;background:rgba(10,14,92,0.97);backdrop-filter:blur(12px);display:flex;justify-content:center;gap:0;border-bottom:2px solid #06D0FF}
.tab-bar button{background:none;border:none;color:#fff;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:14px 24px;cursor:pointer;transition:background .2s,color .2s;white-space:nowrap}
.tab-bar button:hover,.tab-bar button.active{background:rgba(6,208,255,0.15);color:#06D0FF}

/* MAIN */
.main{max-width:800px;margin:0 auto;padding:32px 20px 80px}
.tab-pane{display:none;animation:fadeIn .3s ease}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SECTION */
.sec-title{font-size:20px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:3px solid transparent;border-image:linear-gradient(90deg,#0033cc,#06D0FF) 1}
.sec-title .blue{color:#0033cc}

/* CARD */
.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid #eee}

/* FORM */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#555;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;font-family:'Lato',sans-serif;outline:none;transition:border-color .2s;background:#fff}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#0033cc}
.form-textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:2.5fr 1fr auto;gap:10px;align-items:end}
.required::after{content:' *';color:#cc0000}

/* LINE ITEMS */
.line-items{margin-bottom:20px}
.li-row{display:grid;grid-template-columns:1fr 80px 1fr 40px;gap:10px;align-items:end;margin-bottom:10px}
.li-header{font-size:11px;font-weight:700;color:#888;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.remove-btn{width:36px;height:42px;background:#fde8e8;color:#cc0000;border:none;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.remove-btn:hover{background:#cc0000;color:#fff}
.add-line{background:none;border:2px dashed #ccc;border-radius:8px;padding:10px;width:100%;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;color:#888;cursor:pointer;transition:all .2s}
.add-line:hover{border-color:#0033cc;color:#0033cc}

/* SUBMIT */
.submit-btn{width:100%;padding:18px;background:linear-gradient(135deg,#0033cc,#06D0FF);color:#fff;border:none;border-radius:10px;font-family:'Lato',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:transform .15s,box-shadow .15s}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,51,204,0.35)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

/* CONFIRMATION */
.confirm-screen{display:none;text-align:center;padding:48px 24px}
.confirm-screen.show{display:block}
.confirm-icon{font-size:64px;margin-bottom:16px}
.confirm-po{font-size:28px;font-weight:900;color:#0033cc;margin:12px 0 8px;letter-spacing:1px}
.confirm-msg{font-size:15px;color:#666;margin-bottom:24px;line-height:1.6}
.btn-outline{display:inline-block;padding:12px 28px;border:2px solid #0033cc;color:#0033cc;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;background:none;font-family:'Lato',sans-serif;transition:all .2s}
.btn-outline:hover{background:#0033cc;color:#fff}

/* HISTORY */
.order-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid #eee}
.order-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.order-po{font-size:16px;font-weight:900;color:#0033cc}
.order-date{font-size:12px;color:#888}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.badge-submitted{background:#fff8e1;color:#b38600}
.badge-confirmed{background:#e8f0ff;color:#0033cc}
.badge-shipped{background:#e6f9ee;color:#00802b}
.badge-delivered{background:#f0f0f0;color:#555}
.order-items{font-size:13px;color:#555;line-height:1.7}
.order-contact{font-size:12px;color:#888;margin-top:8px}
.status-select{padding:4px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:'Lato',sans-serif;cursor:pointer}
.empty-state{text-align:center;padding:40px;color:#aaa;font-size:14px}

/* CC RULE */
.cc-rule{background:linear-gradient(135deg,#0a0e5c,#0033cc);color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;font-weight:700;text-align:center}
.cc-rule span{color:#06D0FF}

/* FOOTER */
.footer{background:linear-gradient(135deg,#050824,#0a0e5c);padding:28px 20px;text-align:center}
.footer-tagline{font-family:'Playfair Display',serif;font-style:italic;color:#06D0FF;font-size:14px}
.footer-copy{color:rgba(255,255,255,0.3);font-size:11px;margin-top:6px}

/* RESPONSIVE */
@media(max-width:600px){
  .header{padding:24px 16px 36px}
  .main{padding:20px 14px 60px}
  .li-row{grid-template-columns:1fr;gap:6px}
  .li-row .li-header{display:none}
  .form-row{grid-template-columns:1fr}
  .card{padding:18px}
  .tab-bar button{font-size:11px;padding:12px 14px}
  .remove-btn{width:100%;height:36px}
}
</style>
</head>
<body>
<div id="auth-wall" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e5c;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column">
<img src="/logo-white.png" alt="Norris Utilities" style="width:120px;margin-bottom:24px" onerror="this.style.display='none'">
<h2 style="color:white;font-family:Lato,sans-serif;margin-bottom:16px">Norris Utilities&reg;</h2>
<input type="password" id="auth-input" placeholder="Enter access code" style="padding:12px 20px;font-size:16px;border:2px solid #0066ee;border-radius:8px;text-align:center;width:280px;font-family:Lato,sans-serif" autofocus>
<button onclick="checkAuth()" style="margin-top:12px;padding:10px 32px;background:#0033cc;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-family:Lato,sans-serif">ACCESS PORTAL</button>
<p id="auth-error" style="color:#ff4444;margin-top:12px;display:none;font-family:Lato,sans-serif">Invalid access code</p>
</div>
<script>
(function(){if(sessionStorage.getItem('nu_auth_2026')==='granted'&&sessionStorage.getItem('nu_role')==='aaron'){document.getElementById('auth-wall').style.display='none'}})();
function checkAuth(){var p=document.getElementById('auth-input').value;if(p==='norris2026'){sessionStorage.setItem('nu_auth_2026','granted');sessionStorage.setItem('nu_role','aaron');document.getElementById('auth-wall').style.display='none'}else{document.getElementById('auth-error').style.display='block'}}
document.getElementById('auth-input').addEventListener('keypress',function(e){if(e.key==='Enter')checkAuth()});
</script>

</body>
</html>
