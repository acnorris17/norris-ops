<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Norris Utilities Operations Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#fff;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{position:relative;background:linear-gradient(135deg,#0000FF 0%,#0033CC 40%,#06D0FF 100%);padding:60px 40px 80px;text-align:center;overflow:hidden}
.header-bg{position:absolute;inset:0;opacity:0.10;pointer-events:none}
.header-logo{height:80px;position:relative;z-index:2;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3))}
.header-tagline{color:rgba(255,255,255,0.9);font-style:italic;font-size:16px;font-weight:300;letter-spacing:2px;margin-top:14px;position:relative;z-index:2}

/* SIGNATURE CHEVRON */
.chevron-wrapper{position:relative;margin-top:-1px;z-index:10;line-height:0}
.chevron-wrapper svg{display:block;width:100%}

/* LOGIN CONTAINER */
.login-container{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;background:linear-gradient(180deg,#f8f9fa 0%,#fff 100%)}
.login-box{background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,80,0.12);padding:48px 40px;max-width:420px;width:100%;text-align:center}
.login-title{font-size:22px;font-weight:700;color:#0000FF;margin-bottom:8px;letter-spacing:0.5px}
.login-subtitle{font-size:14px;color:#666;margin-bottom:32px}

/* FORM */
.form-group{margin-bottom:24px;text-align:left}
.form-label{display:block;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#333;margin-bottom:8px}
.form-input{width:100%;padding:14px 16px;font-size:16px;font-family:'Lato',sans-serif;border:2px solid #e0e0e0;border-radius:8px;transition:border-color .2s,box-shadow .2s;outline:none}
.form-input:focus{border-color:#0000FF;box-shadow:0 0 0 3px rgba(0,0,255,0.1)}
.form-input.error{border-color:#ff4444;animation:shake 0.5s ease-in-out}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  10%,30%,50%,70%,90%{transform:translateX(-8px)}
  20%,40%,60%,80%{transform:translateX(8px)}
}

.btn-login{width:100%;padding:16px;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#0000FF 0%,#0033CC 100%);border:none;border-radius:8px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,255,0.3)}
.btn-login:active{transform:translateY(0)}

.error-msg{color:#ff4444;font-size:13px;font-weight:600;margin-top:16px;min-height:20px}
.hint{font-size:12px;color:#999;margin-top:24px;font-style:italic}

/* FOOTER */
.footer{background:rgba(0,0,80,0.97);color:rgba(255,255,255,0.7);padding:20px;text-align:center;font-size:12px}

@media(max-width:480px){
  .login-box{padding:32px 24px}
  .header{padding:40px 20px 60px}
}
</style>
</head>

<div class="chevron-wrapper">

<!-- LOGIN FORM -->
<main class="login-container">
  <div class="login-box">
    <h1 class="login-title">Norris Utilities Operations Portal</h1>
    <p class="login-subtitle">Internal access for authorized personnel</p>
    
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter access code" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Log In</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>
    
    <p class="hint">Authorized personnel only</p>
  </div>
</main>

<script>
// Check if already authenticated
(function() {
  if (window.NorrisAuth && window.NorrisAuth.isAuthenticated()) {
    window.location.href = '/norris-ops/index.html';
  }
})();

async function handleLogin(e) {
  e.preventDefault();
  var password = document.getElementById('password').value;
  var input = document.getElementById('password');
  var errorMsg = document.getElementById('errorMsg');
  
  input.classList.remove('error');
  errorMsg.textContent = '';
  
  var success = await window.NorrisAuth.authenticate(password);
  
  if (success) {
    window.location.href = '/norris-ops/index.html';
  } else {
    input.classList.add('error');
    errorMsg.textContent = 'Access denied';
    input.value = '';
    input.focus();
    setTimeout(function() {
      input.classList.remove('error');
    }, 500);
  }
  
  return false;
}
</script>
